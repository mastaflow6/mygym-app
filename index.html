<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MyGym" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<title>MyGym</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #131316;
    --surface-2: #1c1c20;
    --surface-3: #26262b;
    --border: #2a2a30;
    --text: #fafafa;
    --text-muted: #8e8e96;
    --text-dim: #5a5a62;
    --accent: #fb923c;
    --accent-strong: #f97316;
    --accent-soft: rgba(251, 146, 60, 0.12);
    --success: #22c55e;
    --success-soft: rgba(34, 197, 94, 0.12);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --danger: #ef4444;
    --danger-soft: rgba(239, 68, 68, 0.12);
    --pr: #facc15;
    --pr-soft: rgba(250, 204, 21, 0.15);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --tab-h: 68px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  input, button, select, textarea { font-family: inherit; color: inherit; }
  button { border: none; background: none; cursor: pointer; padding: 0; }

  .app {
    min-height: 100vh;
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
    max-width: 540px;
    margin: 0 auto;
  }
  header.topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background: rgba(10,10,11,0.82);
    backdrop-filter: saturate(140%) blur(16px);
    -webkit-backdrop-filter: saturate(140%) blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .topbar .pill {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft); padding: 6px 10px; border-radius: 999px;
  }
  main { padding: 16px 16px 24px; }

  nav.tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(10,10,11,0.92);
    backdrop-filter: saturate(140%) blur(20px);
    -webkit-backdrop-filter: saturate(140%) blur(20px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 40;
  }
  nav.tabs .inner {
    max-width: 540px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: repeat(5, 1fr);
  }
  nav.tabs button {
    color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 11px; font-weight: 500; height: var(--tab-h);
    transition: color 0.15s;
  }
  nav.tabs button.active { color: var(--accent); }
  nav.tabs svg { width: 22px; height: 22px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px;
  }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .grow { flex: 1; }
  .muted { color: var(--text-muted); }
  .dim { color: var(--text-dim); }
  .small { font-size: 12px; }
  .bold { font-weight: 600; }
  .center { text-align: center; }

  .hero {
    background: linear-gradient(155deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 20px; margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; width: 200px; height: 200px;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    top: -80px; right: -60px; pointer-events: none;
  }
  .hero .day-name { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
  .hero h2 { margin: 6px 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .hero .focus { color: var(--text-muted); font-size: 14px; }
  .hero .meta { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }

  .chip {
    font-size: 11px; font-weight: 600; padding: 5px 9px; border-radius: 8px;
    background: var(--surface-3); color: var(--text-muted);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .chip.accent { background: var(--accent-soft); color: var(--accent); }
  .chip.warn { background: var(--warn-soft); color: var(--warn); }
  .chip.success { background: var(--success-soft); color: var(--success); }
  .chip.pr { background: var(--pr-soft); color: var(--pr); }

  .progress { margin-top: 14px; }
  .progress-bar {
    height: 6px; background: var(--surface-3); border-radius: 999px;
    overflow: hidden; position: relative;
  }
  .progress-bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), #fbbf24);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
  }
  .progress-meta {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--text-muted);
  }

  .coach-note {
    background: var(--accent-soft); border: 1px solid rgba(251, 146, 60, 0.25);
    border-radius: 14px; padding: 12px 14px; color: #fed7aa; font-size: 13px;
    margin-bottom: 14px; display: flex; gap: 10px; align-items: flex-start;
  }
  .coach-note.warn { background: var(--warn-soft); border-color: rgba(245, 158, 11, 0.3); color: #fde68a; }
  .coach-note.info { background: rgba(96, 165, 250, 0.1); border-color: rgba(96, 165, 250, 0.3); color: #bfdbfe; }
  .coach-note svg { flex-shrink: 0; margin-top: 2px; }
  .coach-note button { margin-left: auto; color: inherit; opacity: 0.8; font-weight: 600; padding: 0 4px; }

  /* Phase timer (lab) */
  .lab-timer {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px; margin-bottom: 12px;
  }
  .lab-timer .phases {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px;
  }
  .phase-btn {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 8px; text-align: center; transition: all 0.18s;
    display: flex; flex-direction: column; gap: 2px; align-items: center;
  }
  .phase-btn .lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .phase-btn .t { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .phase-btn.active { background: var(--accent-soft); border-color: var(--accent); }
  .phase-btn.active .lbl { color: var(--accent); }
  .phase-btn.done .t { color: var(--success); }

  /* Exercise card */
  .exercise {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 14px 14px 8px;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  .exercise.complete { border-color: rgba(34, 197, 94, 0.3); }
  .exercise.has-pr { border-color: rgba(250, 204, 21, 0.3); }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
  .ex-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 6px; }
  .ex-target { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .ex-target .alt { color: var(--text-dim); }
  .ex-spec { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .ex-spec b { color: var(--text); font-weight: 600; }
  .ex-icons { display: flex; gap: 6px; margin-top: 4px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px; background: var(--surface-2);
    color: var(--text-muted); display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }
  .icon-btn.has-data { color: var(--accent); border-color: rgba(251, 146, 60, 0.3); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 14px; height: 14px; }

  .last-info {
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px;
    background: var(--surface-2); padding: 7px 10px; border-radius: 8px;
    display: flex; gap: 6px; align-items: center;
  }
  .last-info b { color: var(--text); }

  .sets { display: flex; flex-direction: column; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 44px;
    gap: 8px; align-items: center; padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .set-row:first-child { border-top: none; }
  .set-row.done .set-num { background: var(--success); color: white; }
  .set-row.pr .set-num { background: var(--pr); color: #1c1c20; }
  .set-num {
    width: 28px; height: 28px; border-radius: 8px; background: var(--surface-3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-muted); transition: all 0.2s;
  }
  .set-input {
    background: var(--surface-2); border: 1px solid transparent; border-radius: 10px;
    padding: 9px 10px; font-size: 15px; font-weight: 600;
    color: var(--text); width: 100%; text-align: center;
    transition: all 0.15s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); background: var(--bg); }
  .set-input::placeholder { color: var(--text-dim); font-weight: 500; }
  .input-wrap { position: relative; }
  .input-wrap .unit {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--text-dim); pointer-events: none; font-weight: 500;
  }
  .check-btn {
    width: 44px; height: 38px; border-radius: 10px;
    background: var(--surface-2); color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; border: 1px solid var(--border);
  }
  .check-btn:active { transform: scale(0.92); }
  .check-btn.done { background: var(--success); color: white; border-color: var(--success); }
  .add-set {
    width: 100%; padding: 10px; margin-top: 4px;
    color: var(--accent); font-size: 13px; font-weight: 600;
    border-radius: 10px; background: transparent;
  }
  .add-set:active { background: var(--accent-soft); }

  .btn {
    width: 100%; padding: 14px; border-radius: 14px;
    background: var(--accent); color: white; font-weight: 700; font-size: 16px;
    transition: all 0.15s; letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn.success { background: var(--success); }
  .btn.danger { background: var(--surface-2); color: var(--danger); border: 1px solid var(--border); }
  .btn.small { padding: 9px 14px; font-size: 13px; width: auto; }

  /* Plan */
  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .day-card .header {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .day-card.rest .header { color: var(--text-dim); }
  .day-card .header b { font-size: 15px; }
  .day-card .body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .day-card .ex-line {
    padding: 10px 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 12px; font-size: 13px;
    align-items: center; cursor: pointer;
  }
  .day-card .ex-line:last-child { border-bottom: none; }
  .day-card .ex-line .name { font-weight: 500; flex: 1; }
  .day-card .ex-line .spec { color: var(--text-muted); white-space: nowrap; }

  /* Progress */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
  }
  .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.02em; }
  .stat .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .phase-track { display: flex; flex-direction: column; gap: 12px; }
  .phase-step { display: flex; gap: 12px; align-items: flex-start; }
  .phase-step .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--surface-3); margin-top: 4px;
    border: 2px solid var(--border); flex-shrink: 0;
  }
  .phase-step.current .dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .phase-step.done .dot { background: var(--success); border-color: var(--success); }
  .phase-step .info { flex: 1; }
  .phase-step .info b { font-size: 14px; }
  .phase-step .info .when { color: var(--text-muted); font-size: 12px; }
  .phase-step .info .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .chart { height: 140px; position: relative; margin: 12px 0 8px; }
  .chart svg { width: 100%; height: 100%; }
  .chart .line { fill: none; stroke: var(--accent); stroke-width: 2; }
  .chart .area { fill: url(#areaGrad); }
  .chart .dot { fill: var(--accent); }
  .chart .axis-text { fill: var(--text-dim); font-size: 10px; }
  .empty { color: var(--text-dim); text-align: center; padding: 24px; font-size: 13px; }

  /* Bars */
  .bar-row {
    display: grid; grid-template-columns: 88px 1fr 36px;
    gap: 10px; align-items: center; padding: 5px 0;
  }
  .bar-row .lbl { font-size: 12px; color: var(--text-muted); text-transform: capitalize; }
  .bar-row .bar { height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
  .bar-row .bar > span {
    display: block; height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-row .v { font-size: 12px; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

  /* Month bars */
  .month-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; align-items: end;
    height: 110px; margin: 12px 0 4px;
  }
  .month-grid .col { display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .month-grid .col .bar {
    width: 100%; flex: 1; background: var(--surface-3); border-radius: 6px;
    position: relative; overflow: hidden; max-height: 80px;
    display: flex; align-items: flex-end;
  }
  .month-grid .col .bar > span {
    display: block; width: 100%; background: linear-gradient(180deg, var(--accent), var(--accent-strong));
    border-radius: 6px; transition: height 0.4s;
  }
  .month-grid .col .lbl { font-size: 10px; color: var(--text-dim); }
  .month-grid .col .v { font-size: 11px; font-weight: 700; }
  .month-grid .col.current .v { color: var(--accent); }

  /* Macros */
  .macro-ring {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .macro {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 8px; text-align: center;
  }
  .macro .v { font-size: 18px; font-weight: 700; }
  .macro .l { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .macro.kcal .v { color: var(--accent); }
  .macro.p .v { color: #f87171; }
  .macro.c .v { color: #60a5fa; }
  .macro.f .v { color: #fbbf24; }

  .checklist { list-style: none; padding: 0; margin: 0; }
  .checklist li {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer;
  }
  .checklist li:first-child { border-top: none; }
  .checklist .box {
    width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--border);
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .checklist li.done .box { background: var(--success); border-color: var(--success); }
  .checklist li.done .box svg { display: block; }
  .checklist .box svg { display: none; width: 14px; height: 14px; color: white; }
  .checklist li.done .text { color: var(--text-muted); text-decoration: line-through; }
  .checklist .text b { display: block; font-size: 14px; margin-bottom: 2px; }
  .checklist .text .meta { font-size: 12px; color: var(--text-muted); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 50; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-bg.show { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface); width: 100%; max-width: 540px;
    border-radius: 24px 24px 0 0; padding: 22px 20px calc(28px + var(--safe-bottom));
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto;
  }
  .modal-bg.show .modal { transform: translateY(0); }
  .modal h3 { margin: 0 0 12px; font-size: 18px; }
  .modal-grip {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: -8px auto 14px;
  }
  .modal input[type=number], .modal input[type=date], .modal input[type=time], .modal textarea {
    width: 100%; padding: 14px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 16px; margin-bottom: 12px; resize: vertical;
  }
  .modal textarea { min-height: 100px; font-family: inherit; }
  .modal label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Floating timer */
  .rest-timer {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: white;
    padding: 10px 16px; border-radius: 999px;
    box-shadow: 0 8px 24px rgba(251, 146, 60, 0.35);
    font-weight: 700; font-size: 14px;
    display: flex; align-items: center; gap: 10px;
    z-index: 35; opacity: 0; pointer-events: none; transition: all 0.25s;
  }
  .rest-timer.show {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .rest-timer .secs { font-variant-numeric: tabular-nums; min-width: 30px; }
  .rest-timer button { color: white; opacity: 0.85; font-weight: 600; padding: 0 4px; font-size: 13px; }

  /* Routine */
  .routine-row {
    display: grid; grid-template-columns: 56px 1fr;
    padding: 10px 0; border-top: 1px solid var(--border); gap: 10px; font-size: 13px;
  }
  .routine-row:first-child { border-top: none; }
  .routine-row .time { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }

  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 70px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface-3); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 500; z-index: 60;
    opacity: 0; pointer-events: none; transition: all 0.25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--border); cursor: pointer; gap: 12px;
  }
  .list-item:first-child { border-top: none; }
  .list-item .right { color: var(--text-muted); font-size: 13px; display: flex; align-items: center; gap: 6px; }

  /* Photo grid */
  .photo-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px;
  }
  .photo-grid .ph {

/* Idempotent seed for past 10 sessions (Apr 7 - Apr 25, 2026).
   Skips dates that already exist; runs every load to repair missing data. */
function seedPastSessions() {
  const seed = [
    // Week 1 (Apr 7-13): 3 sessions, low rep range
    { date: '2026-04-07', dayKey: 2, repFloor: 'min' },
    { date: '2026-04-11', dayKey: 6, repFloor: 'min' },
    { date: '2026-04-13', dayKey: 1, repFloor: 'min' },
    // Week 2 (Apr 14-20): 3 sessions
    { date: '2026-04-14', dayKey: 2, repFloor: 'min' },
    { date: '2026-04-16', dayKey: 4, repFloor: 'min' },
    { date: '2026-04-18', dayKey: 6, repFloor: 'min' },
    // Week 3 (Apr 20-26): 4 sessions, target reps
    { date: '2026-04-20', dayKey: 1, repFloor: 'target' },
    { date: '2026-04-21', dayKey: 2, repFloor: 'target' },
    { date: '2026-04-23', dayKey: 4, repFloor: 'target' },
    { date: '2026-04-25', dayKey: 6, repFloor: 'target' }
  ];
  let added = 0;
  for (const s of seed) {
    if (state.workouts[s.date]) continue;
    const day = DAYS[s.dayKey]; if (!day) continue;
    const logs = {};
    for (const ex of day.exercises) {
      const reps = s.repFloor === 'target' ? ex.repsMin + Math.floor((ex.repsMax - ex.repsMin) / 2) : ex.repsMin;
      const weight = ex.bw ? '' : String(ex.weight);
      logs[ex.id] = [];
      for (let i = 0; i < ex.sets; i++) {
        logs[ex.id].push({ w: weight, r: String(reps), d: true });
      }
    }
    const start = new Date(s.date + 'T15:00:00').getTime();
    state.workouts[s.date] = {
      dayKey: s.dayKey, logs, notes: {}, swaps: {},
      started: start, finished: start + 60 * 60 * 1000,
      timers: { warmup: 5 * 60 * 1000, workout: 55 * 60 * 1000, cooldown: 0 },
      activePhase: null, phaseStart: null
    };
    added++;
  }
  state.settings.seededPastSessions = true;
  if (added > 0) {
    save();
    setTimeout(() => toast(`Restored ${added} past sessions`), 200);
  }
}
seedPastSessions();

// One-time migration: pad seeded 2-set logs to 3 sets after we made all exercises 3-set
function migrateThreeSets() {
  if (state.settings.migratedThreeSets) return;
  for (const [date, w] of Object.entries(state.workouts)) {
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      if (!w.logs[ex.id]) continue;
      while (w.logs[ex.id].length < ex.sets) {
        const last = w.logs[ex.id][w.logs[ex.id].length - 1];
        if (last && last.d) {
          w.logs[ex.id].push({ w: last.w, r: last.r, d: true });
        } else break;
      }
    }
  }
  state.settings.migratedThreeSets = true;
  save();
}
migrateThreeSets();

/* =========== HELPERS =========== */
function $(id) { return document.getElementById(id); }
function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'style') e.style.cssText = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of [].concat(children)) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function today() { return new Date().toISOString().slice(0,10); }
function todayDow() { return new Date().getDay(); }
function diffDays(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(d) {
  const dt = new Date(d);
  return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]} ${dt.getDate()}`;
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function currentWeek() { return Math.floor(diffDays(PROGRAM_START, today()) / 7) + 1; }
function currentPhase() {
  const t = today();
  for (const p of PHASES) if (t >= p.start && t <= p.end) return p;
  if (t < PHASES[0].start) return PHASES[0];
  if (t < PHASES[1].start) return PHASES[0];
  if (t < PHASES[2].start) return PHASES[1];
  if (t < PHASES[3].start) return PHASES[2];
  return PHASES[3];
}
function nextPhase() {
  const cur = currentPhase();
  return PHASES[Math.min(cur.num, PHASES.length - 1)] === cur && cur.num < PHASES.length
    ? PHASES[cur.num]
    : null;
}
function daysToNextPhase() {
  const np = nextPhase();
  if (!np) return null;
  return diffDays(today(), np.start);
}

function ensureWorkout(date, dayKey) {
  if (!state.workouts[date]) {
    state.workouts[date] = {
      dayKey, logs: {}, notes: {}, swaps: {},
      started: null, finished: null,
      timers: { warmup: 0, workout: 0, cooldown: 0 },
      activePhase: null, phaseStart: null
    };
  } else {
    if (dayKey != null && state.workouts[date].dayKey !== dayKey) state.workouts[date].dayKey = dayKey;
    if (!state.workouts[date].timers) state.workouts[date].timers = { warmup: 0, workout: 0, cooldown: 0 };
    if (!state.workouts[date].notes) state.workouts[date].notes = {};
    if (!state.workouts[date].swaps) state.workouts[date].swaps = {};
  }
  return state.workouts[date];
}
function getSetLogs(date, dayKey, ex) {
  const w = ensureWorkout(date, dayKey);
  if (!w.logs[ex.id]) w.logs[ex.id] = Array(ex.sets).fill(0).map(() => ({ w: '', r: '', d: false }));
  while (w.logs[ex.id].length < ex.sets) w.logs[ex.id].push({ w: '', r: '', d: false });
  return w.logs[ex.id];
}

function getLastSession(exId, beforeDate) {
  const dates = Object.keys(state.workouts)
    .filter(d => d < beforeDate && state.workouts[d].finished && (state.workouts[d].logs[exId] || []).some(s => s.d))
    .sort()
    .reverse();
  if (!dates.length) return null;
  const date = dates[0];
  const sets = (state.workouts[date].logs[exId] || []).filter(s => s.d);
  return { date, sets };
}

function epley(w, r) {
  w = parseFloat(w) || 0; r = parseFloat(r) || 0;
  if (!w || !r) return 0;
  return w * (1 + r / 30);
}

function getPR(exId, exceptDate) {
  let best = null;
  for (const [date, w] of Object.entries(state.workouts)) {
    if (date === exceptDate) continue;
    const logs = w.logs[exId] || [];
    for (const s of logs) {
      if (!s.d) continue;
      const e = epley(s.w, s.r);
      if (e <= 0) continue;
      if (!best || e > best.e) best = { date, w: parseFloat(s.w), r: parseFloat(s.r), e };
    }
  }
  return best;
}

function isCurrentSetPR(exId, date, currentSet) {
  if (!currentSet.d) return false;
  const e = epley(currentSet.w, currentSet.r);
  if (e <= 0) return false;
  const pr = getPR(exId, date);
  return !pr || e > pr.e;
}

function workoutProgress(date, dayKey) {
  const day = DAYS[dayKey]; if (!day) return { done: 0, total: 0 };
  let total = 0, done = 0;
  for (const ex of day.exercises) {
    total += ex.sets;
    const logs = state.workouts[date]?.logs?.[ex.id] || [];
    done += logs.filter(s => s.d).length;
  }
  return { done, total };
}

function sessionsInWeek(monday) {
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    if (state.workouts[k]?.finished) count++;
  }
  return count;
}
function getStreak() {
  // count consecutive completed weeks (4+ sessions) going back from this week
  // we don't include this week unless it's already complete
  const TARGET = 4;
  const t = new Date(); const dow = t.getDay() || 7;
  let monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  // start from previous monday
  let streak = 0;
  // also count current week if already at target
  if (sessionsInWeek(monday) >= TARGET) streak++;
  monday.setDate(monday.getDate() - 7);
  while (monday >= new Date(PROGRAM_START)) {
    if (sessionsInWeek(monday) >= TARGET) {
      streak++;
      monday.setDate(monday.getDate() - 7);
    } else break;
  }
  return streak;
}

function sessionsThisWeek() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    if (state.workouts[k]?.finished) count++;
  }
  return count;
}
function totalSessions() {
  return Object.values(state.workouts).filter(w => w.finished).length;
}

function getWeeklyVolume() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  const result = {}; for (const m of MUSCLES) result[m] = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const w = state.workouts[k]; if (!w || !w.finished) continue;
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      const done = (w.logs[ex.id] || []).filter(s => s.d).length;
      for (const m of (ex.muscles || [])) result[m] = (result[m] || 0) + done;
    }
  }
  return result;
}

function getMonthlyStats() {
  const months = {};
  for (const [date, w] of Object.entries(state.workouts)) {
    if (!w.finished) continue;
    const m = date.slice(0, 7);
    if (!months[m]) months[m] = { sessions: 0, sets: 0, volume: 0 };
    months[m].sessions++;
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      const logs = (w.logs[ex.id] || []).filter(s => s.d);
      months[m].sets += logs.length;
      for (const s of logs) months[m].volume += (parseFloat(s.w) || 0) * (parseFloat(s.r) || 0);
    }
  }
  return months;
}

function getStrengthHistory(exId) {
  const out = [];
  for (const [date, w] of Object.entries(state.workouts)) {
    const logs = (w.logs[exId] || []).filter(s => s.d);
    if (!logs.length) continue;
    let best = { w: 0, r: 0, e: 0 };
    for (const s of logs) {
      const e = epley(s.w, s.r);
      if (e > best.e) best = { w: parseFloat(s.w), r: parseFloat(s.r), e };
    }
    out.push({ date, ...best });
  }
  return out.sort((a, b) => a.date.localeCompare(b.date));
}

function lastBodyWeight() { return state.bodyWeight[state.bodyWeight.length - 1] || null; }
function lastMeasurement() { return state.measurements[state.measurements.length - 1] || null; }
function prevMeasurement() { return state.measurements.length > 1 ? state.measurements[state.measurements.length - 2] : null; }
function lastSleep() { return state.sleep[state.sleep.length - 1] || null; }
function todaysSleep() { return state.sleep.find(s => s.date === today()); }
function todaysWater() { return state.water[today()] || 0; }

/* =========== TIMERS =========== */
let activeTab = 'home';
let activeDayKey = null;
let expandedExId = null;     // null = auto-expand first incomplete; 'none' = all collapsed; ex.id = manual
let editingSetKey = null;    // `${exId}-${setIdx}` while inline-editing a set
let restTimer = null;
let restEndAt = 0;
let phaseTickInterval = null;

/* === v0.3 helpers: alternatives, swaps, accordion === */
function getAlternatives(ex) {
  if (Array.isArray(ex.alternatives)) return ex.alternatives;
  return (ex.alt || '').split('/').map(s => s.trim()).filter(Boolean);
}
function getDisplaySwap(ex, date) {
  return state.workouts[date]?.swaps?.[ex.id] || 0;
}
function getDisplayName(ex, date) {
  const swap = getDisplaySwap(ex, date);
  if (!swap) return ex.name;
  const alts = getAlternatives(ex);
  return alts[swap - 1] || ex.name;
}
function getActiveExId(date, dayKey) {
  const day = DAYS[dayKey]; if (!day) return null;
  if (expandedExId === 'none') return null;
  if (expandedExId && day.exercises.some(e => e.id === expandedExId)) return expandedExId;
  for (const ex of day.exercises) {
    const logs = state.workouts[date]?.logs?.[ex.id] || [];
    if (logs.filter(s => s.d).length < ex.sets) return ex.id;
  }
  return null;
}

function startRest(secs) {
  secs = secs || state.settings.restSec;
  restEndAt = Date.now() + secs * 1000;
  $('restTimer').classList.add('show');
  if (restTimer) clearInterval(restTimer);
  restTimer = setInterval(updateRest, 250);
  updateRest();
}
function updateRest() {
  const left = Math.max(0, Math.round((restEndAt - Date.now()) / 1000));
  const m = Math.floor(left / 60), s = left % 60;
  $('restSecs').textContent = `${m}:${String(s).padStart(2, '0')}`;
  if (left <= 0) {
    stopRest();
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    toast('Rest done — next set');
    if (state.settings.notifications && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('Rest done', { body: 'Hit your next set' });
    }
  }
}
function stopRest() { if (restTimer) clearInterval(restTimer); restTimer = null; $('restTimer').classList.remove('show'); }
$('restSkip').onclick = stopRest;
$('restAdd').onclick = () => { restEndAt += 15000; updateRest(); };

function setPhase(date, phase) {
  const w = ensureWorkout(date, activeDayKey ?? todayDow());
  const now = Date.now();
  if (w.activePhase && w.phaseStart) {
    w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (now - w.phaseStart);
  }
  if (w.activePhase === phase) {
    w.activePhase = null; w.phaseStart = null;
  } else {
    w.activePhase = phase; w.phaseStart = now;
    if (!w.started) w.started = now;
  }
  save();
  startPhaseTick();
  render();
}

function startPhaseTick() {
  if (phaseTickInterval) clearInterval(phaseTickInterval);
  phaseTickInterval = setInterval(() => {
    const w = state.workouts[today()];
    if (w && w.activePhase && activeTab === 'today') {
      const els = document.querySelectorAll('.phase-btn .t');
      const phases = ['warmup', 'workout'];
      const now = Date.now();
      els.forEach((node, i) => {
        const p = phases[i];
        let ms = w.timers[p] || 0;
        if (w.activePhase === p && w.phaseStart) ms += now - w.phaseStart;
        node.textContent = fmtTime(ms);
      });
    }
  }, 500);
}

/* =========== TOAST + MODAL =========== */
function toast(msg, kind) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  t.classList.toggle('celebrate', kind === 'celebrate');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.classList.remove('show'); t.classList.remove('celebrate'); }, kind === 'celebrate' ? 2800 : 1700);
}
function openModal(node) {
  $('modalContent').innerHTML = '';
  if (typeof node === 'string') $('modalContent').innerHTML = node;
  else $('modalContent').appendChild(node);
  $('modalBg').classList.add('show');
}
function closeModal() { $('modalBg').classList.remove('show'); }
$('modalBg').addEventListener('click', e => { if (e.target === $('modalBg')) closeModal(); });

/* =========== ROOT RENDER =========== */
function render() {
  $('view').innerHTML = '';
  if (activeTab === 'home') renderHome();
  if (activeTab === 'today') renderToday();
  if (activeTab === 'plan') renderPlan();
  if (activeTab === 'progress') renderProgress();
  if (activeTab === 'more') renderMore();

  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === activeTab);
  });
  $('topPhase').textContent = `Phase ${currentPhase().num}`;
  $('topTitle').textContent = ({ home: 'Dashboard', today: 'Workout', plan: 'Plan', progress: 'Progress', more: 'More' })[activeTab];
}

/* =========== HOME =========== */
function getDailyQuote() {
  const d = new Date();
  const dayNum = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return QUOTES[((dayNum % QUOTES.length) + QUOTES.length) % QUOTES.length];
}

function getNudges() {
  const out = [];
  const bw = lastBodyWeight();
  if (bw) {
    const days = diffDays(bw.date, today());
    if (days >= 5) out.push({ icon: '⚖️', text: `${days} days since last weight log`, action: openWeightModal });
  }
  const dl = daysToNextPhase(); const np = nextPhase();
  if (np && dl !== null && dl >= 0 && dl <= 7) {
    out.push({ icon: '🚀', text: `Phase ${np.num} starts in ${dl}d — review easy sets`, action: () => { activeTab = 'progress'; render(); } });
  }
  const wc = todaysWater();
  if (wc < state.settings.waterTarget && new Date().getHours() >= 14) {
    out.push({ icon: '💧', text: `Water: ${wc}/${state.settings.waterTarget} cups today`, action: () => { activeTab = 'more'; render(); } });
  }
  const ls = lastSleep();
  if (!ls || diffDays(ls.date, today()) >= 2) {
    out.push({ icon: '😴', text: 'Log last night\'s sleep', action: openSleepModal });
  }
  return out.slice(0, 3);
}

function buildRing(opts) {
  // opts: { value, total, percent, color, valueLabel, subLabel }
  const pct = Math.min(1, opts.percent != null ? opts.percent : (opts.total > 0 ? opts.value / opts.total : 0));
  const r = 22, c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const color = opts.color || 'var(--accent)';
  const card = el('div', { class: 'ring-card' });
  const ring = el('div', { class: 'ring' });
  ring.innerHTML = `
    <svg viewBox="0 0 56 56" width="56" height="56">
      <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
      <circle class="ring-fg" cx="28" cy="28" r="${r}" style="stroke:${color}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <span class="ring-label" style="color:${color}">${Math.round(pct * 100)}%</span>`;
  card.appendChild(ring);
  card.appendChild(el('div', { class: 'ring-info' }, [
    el('div', { class: 'num' }, opts.valueLabel),
    el('div', { class: 'lbl' }, opts.subLabel)
  ]));
  return card;
}

function buildRingsRow() {
  const row = el('div', { class: 'rings-row' });

  // Phase progress
  const total = totalSessions();
  const ph = currentPhase();
  const PHASE_TARGETS = { 1: 16, 2: 24, 3: 32, 4: 48 };
  const phaseTarget = PHASE_TARGETS[ph.num] || 16;
  row.appendChild(buildRing({
    value: total, total: phaseTarget,
    color: 'var(--accent)',
    valueLabel: `${total} / ${phaseTarget}`,
    subLabel: `Phase ${ph.num}`
  }));

  // This week
  const sw = sessionsThisWeek();
  row.appendChild(buildRing({
    value: sw, total: 4,
    color: '#22c55e',
    valueLabel: `${sw} / 4`,
    subLabel: 'This week'
  }));

  // Sleep avg over last 7 nights / target
  const sleepAvg = getSleepAvgLast7();
  const sleepTarget = state.settings.sleepTarget || 8;
  row.appendChild(buildRing({
    percent: sleepAvg ? Math.min(1, sleepAvg / sleepTarget) : 0,
    color: '#818cf8',
    valueLabel: sleepAvg ? `${sleepAvg.toFixed(1)} h` : '—',
    subLabel: 'Sleep avg'
  }));

  return row;
}

function getSleepAvgLast7() {
  if (!state.sleep.length) return null;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutKey = cutoff.toISOString().slice(0, 10);
  const recent = state.sleep.filter(s => s.date >= cutKey);
  if (!recent.length) return null;
  return recent.reduce((a, s) => a + s.hours, 0) / recent.length;
}

function totalTimeThisWeek() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  let total = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const w = state.workouts[k];
    if (w?.finished) total += (w.timers?.warmup || 0) + (w.timers?.workout || 0);
  }
  return total;
}

function makeQuickBtn(label, icon, onclick) {
  return el('button', { class: 'quick-btn', onclick }, [
    el('div', { class: 'quick-icon' }, icon),
    el('div', { class: 'quick-label' }, label)
  ]);
}

/* =========== TODAY =========== */
function renderToday() {
  const v = $('view');
  const dow = todayDow();

  const dayKey = activeDayKey ?? (DAYS[dow] ? dow : null);

      el('div', { class: 'day-name' }, DAY_LABELS[dow]),
      el('h2', {}, 'Rest day'),
      el('div', { class: 'focus' }, 'Recover. Walk. Sleep early.'),

    ]));

    const dl = daysToNextPhase();
    if (dl !== null && dl >= 0 && dl <= 7) {
      v.appendChild(makePhaseAlert());
    }

function makePhaseAlert() {

function buildLabTimer(date, w) {
  const card = el('div', { class: 'lab-timer' });
  card.appendChild(el('div', { class: 'card-title', style: 'margin:0 0 4px;' }, 'Workout timer'));
  card.appendChild(el('div', { class: 'small muted' }, w.activePhase ? `Tracking: ${w.activePhase}` : 'Tap a phase to start tracking time'));
  const phases = el('div', { class: 'phases', style: 'grid-template-columns: repeat(2, 1fr);' });
  ['warmup', 'workout'].forEach(p => {
    let ms = w.timers[p] || 0;
    if (w.activePhase === p && w.phaseStart) ms += Date.now() - w.phaseStart;
    const isActive = w.activePhase === p;
    const isDone = !isActive && ms > 0;
    phases.appendChild(el('button', {
      class: 'phase-btn' + (isActive ? ' active' : '') + (isDone ? ' done' : ''),
      onclick: () => setPhase(date, p)
    }, [
      el('span', { class: 'lbl' }, p),
      el('span', { class: 't' }, fmtTime(ms))
    ]));
  });
  card.appendChild(phases);

  // Add session note
  const noteRow = el('div', { class: 'row', style: 'margin-top:10px;gap:8px;' });
  noteRow.appendChild(el('button', {
    class: 'btn secondary small',
    style: 'flex:1;',
    onclick: () => openSessionNoteModal(date)
  }, w.sessionNote ? '✎ Edit session note' : '+ Add session note'));
  if (w.sessionNote) {
    noteRow.appendChild(el('span', { class: 'chip accent' }, 'Has note'));
  }
  card.appendChild(noteRow);
  return card;
}

function renderExercise(ex, date, dayKey) {
  const logs = getSetLogs(date, dayKey, ex);
  const allDone = logs.every(s => s.d);
  const lastSession = getLastSession(ex.id, date);
  const w = ensureWorkout(date, dayKey);
  const note = w.notes[ex.id] || '';
  const hasPRThisSession = logs.some(s => isCurrentSetPR(ex.id, date, s));
  const isExpanded = getActiveExId(date, dayKey) === ex.id;
  const displayName = getDisplayName(ex, date);
  const swapIdx = getDisplaySwap(ex, date);
  const doneCount = logs.filter(s => s.d).length;

  const card = el('div', {
    class: 'exercise ' + (isExpanded ? 'expanded' : 'collapsed') +
      (allDone ? ' complete' : '') + (hasPRThisSession ? ' has-pr' : '')
  });

  // Clickable header (always visible)
  const header = el('button', {
    class: 'ex-header-clickable',
    onclick: () => {
      expandedExId = isExpanded ? 'none' : ex.id;
      editingSetKey = null;
      render();
    }
  });
  const headerLeft = el('div', { class: 'grow', style: 'min-width:0;' });
  const nameEl = el('div', { class: 'ex-name' });
  nameEl.appendChild(document.createTextNode(displayName));
  if (swapIdx > 0) nameEl.appendChild(el('span', { class: 'chip', style: 'margin-left:6px;font-size:10px;' }, 'swapped'));
  if (hasPRThisSession) nameEl.appendChild(el('span', { class: 'chip pr', style: 'margin-left:6px;' }, '★ PR'));
  headerLeft.appendChild(nameEl);
  headerLeft.appendChild(el('div', { class: 'ex-target' }, ex.target));
  header.appendChild(headerLeft);

  const headerRight = el('div', { class: 'ex-status' });
  headerRight.appendChild(el('span', {
    class: 'sets-count' + (allDone ? ' all-done' : '')
  }, `${doneCount}/${ex.sets}`));
  headerRight.appendChild(el('span', { class: 'chevron' + (isExpanded ? ' open' : '') }, '›'));
  header.appendChild(headerRight);
  card.appendChild(header);

  if (!isExpanded) return card;

  // Expanded body
  const body = el('div', { class: 'ex-body' });

  // Action icon row
  const icons = el('div', { class: 'ex-icons-row' });
  icons.appendChild(makeActionBtn('Demo',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
    () => openVideoSearch(ex)));
  icons.appendChild(makeActionBtn('Swap',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4v16M17 20V4M3 8l4-4 4 4M21 16l-4 4-4-4"/></svg>',
    () => openSwapModal(ex, date),
    swapIdx > 0));
  icons.appendChild(makeActionBtn('Image',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
    () => openImageModal(displayName)));
  icons.appendChild(makeActionBtn('Note',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>',
    () => openExerciseNoteModal(date, dayKey, ex),
    !!note));
  icons.appendChild(makeActionBtn('History',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/></svg>',
    () => openStrengthChart(ex)));
  body.appendChild(icons);

  // Spec line
  body.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:6px;', html:
    `<b style="color:var(--text)">${ex.sets}</b> sets × <b style="color:var(--text)">${ex.timed ? `${ex.repsMin}–${ex.repsMax}s` : `${ex.repsMin}–${ex.repsMax}`}</b> reps · target <b style="color:var(--text)">${ex.bw ? 'BW' : ex.weight + 'kg'}</b>`
  }));

  if (ex.warn) {
    body.appendChild(el('div', { class: 'coach-note warn', style: 'font-size:12px;padding:8px 10px;margin:6px 0;' }, [el('span', {}, '⚠ ' + ex.warn)]));
  }

  const setsCont = el('div', { class: 'sets-v2' });
  logs.forEach((_, i) => setsCont.appendChild(renderSetRow(ex, date, dayKey, logs, i, lastSession)));
  body.appendChild(setsCont);

  body.appendChild(el('button', {
    class: 'add-set',
    onclick: e => { e.stopPropagation(); logs.push({ w: '', r: '', d: false }); save(); render(); }
  }, '+ Add set'));

  card.appendChild(body);
  return card;
}

function renderSetRow(ex, date, dayKey, logs, i, lastSession) {
  const s = logs[i];
  const setKey = `${ex.id}-${i}`;
  const isEditing = editingSetKey === setKey;
  const lastSet = lastSession?.sets[i];
  const w = ensureWorkout(date, dayKey);
  const isPR = s.d && isCurrentSetPR(ex.id, date, s);

  const row = el('div', {
    class: 'set-v2' + (s.d ? ' done' : '') + (isPR ? ' pr' : '') + (isEditing ? ' editing' : '')
  });
  row.appendChild(el('div', { class: 'set-badge' }, s.d ? '✓' : (isPR ? '★' : String(i + 1))));

  const body = el('div', { class: 'set-body' });

  if (isEditing) {
    if (!s.w && !ex.bw) s.w = String(lastSet?.w ?? ex.weight);
    if (!s.r) s.r = String(lastSet?.r ?? ex.repsMin);

    if (!ex.bw && !ex.timed) {
      body.appendChild(makeStepperRow('kg', s.w, 2.5, val => { logs[i].w = val; save(); render(); }));
    }
    body.appendChild(makeStepperRow(ex.timed ? 'sec' : 'reps', s.r, 1, val => { logs[i].r = val; save(); render(); }));
    body.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:4px;padding:11px;font-size:14px;',
      onclick: e => {
        e.stopPropagation();
        const prevPR = getPR(ex.id, date);
        logs[i].d = true;
        editingSetKey = null;
        if (!w.started) w.started = Date.now();
        save(); render();
        startRest();
        if (navigator.vibrate) navigator.vibrate(20);
        const e1 = epley(logs[i].w, logs[i].r);
        if (e1 > 0 && (!prevPR || e1 > prevPR.e)) {
          const lift = ex.bw ? `BW × ${logs[i].r}` : `${logs[i].w}kg × ${logs[i].r}`;
          toast(`★ NEW PR · ${lift}`, 'celebrate');
          if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 100]);
        }
      }
    }, s.d ? 'Save' : 'Log set'));
  } else if (s.d) {
    const lbl = ex.bw ? `BW × ${s.r}${ex.timed ? 's' : ''}` : `${s.w} kg × ${s.r}${ex.timed ? 's' : ''}`;
    body.appendChild(el('div', { class: 'set-summary' }, lbl));
    if (isPR) body.appendChild(el('span', { class: 'small', style: 'color:var(--pr);font-weight:700;' }, '★ Personal record'));
  } else {
    if (lastSet) {
      body.appendChild(el('div', { class: 'last-hint' }, `Last: ${ex.bw ? 'BW' : lastSet.w + 'kg'} × ${lastSet.r}${ex.timed ? 's' : ''}`));
    }
    const tapW = parseFloat(s.w) || lastSet?.w || ex.weight;
    const tapR = parseFloat(s.r) || lastSet?.r || ex.repsMin;
    const tapVal = ex.bw ? `BW × ${tapR}${ex.timed ? 's' : ''}` : `${tapW} kg × ${tapR}${ex.timed ? 's' : ''}`;
    body.appendChild(el('button', {
      class: 'tap-to-log',
      onclick: e => {
        e.stopPropagation();
        if (!logs[i].w && !ex.bw) logs[i].w = String(tapW);
        if (!logs[i].r) logs[i].r = String(tapR);
        // capture PR state BEFORE marking done (PR check excludes current date)
        const prevPR = getPR(ex.id, date);
        logs[i].d = true;
        if (!w.started) w.started = Date.now();
        save(); render();
        startRest();
        if (navigator.vibrate) navigator.vibrate(20);
        // Celebrate if new PR
        const e1 = epley(logs[i].w, logs[i].r);
        if (e1 > 0 && (!prevPR || e1 > prevPR.e)) {
          const lift = ex.bw ? `BW × ${logs[i].r}` : `${logs[i].w}kg × ${logs[i].r}`;
          toast(`★ NEW PR · ${lift}`, 'celebrate');
          if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 100]);
        }
      }
    }, [
      el('span', { class: 'tap-label' }, 'Tap to log'),
      el('span', { class: 'tap-value' }, tapVal)
    ]));
  }
  row.appendChild(body);

  const actions = el('div', { class: 'set-actions' });
  if (isEditing) {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = null; render(); },
      title: 'Cancel',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    }));
  } else {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = setKey; render(); },
      title: 'Edit',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>'
    }));
    if (s.d) {
      actions.appendChild(el('button', {
        class: 'icon-btn',
        onclick: e => { e.stopPropagation(); logs[i].d = false; save(); render(); },
        title: 'Undo',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M4 9h11a5 5 0 015 5v0a5 5 0 01-5 5H8"/></svg>'
      }));
    }
    // Delete button for user-added extra sets only
    if (i >= ex.sets) {
      actions.appendChild(el('button', {
        class: 'icon-btn delete-set',
        onclick: e => {
          e.stopPropagation();
          logs.splice(i, 1);
          save(); render();
          toast('Set removed');
        },
        title: 'Remove set',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>'
      }));
    }
  }
  row.appendChild(actions);

  return row;
}

function makeStepperRow(label, value, step, onChange) {
  return el('div', { class: 'stepper-row' }, [
    el('span', { class: 'stepper-label' }, label),
    el('button', {
      class: 'stepper-btn',
      onclick: e => {
        e.stopPropagation();
        const cur = parseFloat(value) || 0;
        onChange(String(Math.max(0, +(cur - step).toFixed(2))));
      }
    }, '−'),
    el('div', { class: 'stepper-value' }, String(value)),
    el('button', {
      class: 'stepper-btn',
      onclick: e => {
        e.stopPropagation();
        const cur = parseFloat(value) || 0;
        onChange(String(+(cur + step).toFixed(2)));
      }
    }, '+')
  ]);
}

function openSwapModal(ex, date) {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Swap exercise'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:14px;' },
    'Pick a different version. Logged sets stay tracked against this exercise so progress doesn\'t reset.'));
  const alts = [ex.name, ...getAlternatives(ex)];
  const cur = getDisplaySwap(ex, date);
  alts.forEach((name, i) => {
    const isMain = i === 0;
    const isActive = i === cur;
    const opt = el('button', {
      class: 'swap-option' + (isActive ? ' active' : ''),
      onclick: () => {
        const w = ensureWorkout(date, activeDayKey ?? todayDow());
        if (!w.swaps) w.swaps = {};
        if (i === 0) delete w.swaps[ex.id];
        else w.swaps[ex.id] = i;
        save(); closeModal(); render();
        toast(i === 0 ? 'Reset to main' : 'Swapped');
      }
    });
    opt.appendChild(el('div', { class: 'swap-name' }, name));
    opt.appendChild(el('div', { class: 'swap-tag' }, isMain ? 'Main exercise' : 'Alternative'));
    if (isActive) opt.appendChild(el('span', { class: 'chip accent', style: 'position:absolute;top:14px;right:14px;' }, '✓'));
    m.appendChild(opt);
  });
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
}

        const v = parseFloat(inputs[k].value);
        if (!isNaN(v)) { next[k] = v; any = true; }
      }
      if (!any) { toast('Enter at least one'); return; }
      state.measurements = state.measurements.filter(x => x.date !== originalDate && x.date !== d.value);
      state.measurements.push(next);
      state.measurements.sort((a, b) => a.date.localeCompare(b.date));
      save(); closeModal(); render(); toast('Updated');
    }
  }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: () => { closeModal(); openMeasurementsHistoryModal(); } }, 'Back'));
  openModal(m);
}

function buildMonthlyChart() {
  const months = getMonthlyStats();
  const now = new Date();
  const cols = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const k = d.toISOString().slice(0, 7);
    cols.push({ key: k, label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()], data: months[k] });
  }
  const totalAcross = cols.reduce((a, c) => a + (c.data?.sessions || 0), 0);
  if (totalAcross === 0) {
    const empty = el('div', { class: 'empty' }, 'Finish a workout to see monthly stats.');
    return empty;
  }
  const max = Math.max(1, ...cols.map(c => c.data?.sessions || 0));
  const grid = el('div', { class: 'month-grid' });
  cols.forEach((c, i) => {
    const sessions = c.data?.sessions || 0;
    const isCurrent = i === cols.length - 1;
    const col = el('div', { class: 'col' + (isCurrent ? ' current' : '') });
    col.appendChild(el('div', { class: 'v' }, String(sessions)));
    col.appendChild(el('div', { class: 'bar' }, [el('span', { style: `height:${sessions / max * 100}%` })]));
    col.appendChild(el('div', { class: 'lbl' }, c.label));
    grid.appendChild(col);
  });
  return grid;
}

function buildLineChart(data, unit) {
  const wrap = el('div', { class: 'chart' });
  const W = 320, H = 140;
  let points = data.slice(-30);
  if (!points.length) {
    wrap.appendChild(el('div', { class: 'empty' }, 'No data'));
    return wrap;
  }
  if (points.length === 1) points.unshift({ ...points[0] });
  const min = Math.min(...points.map(p => p.value)) - 0.5;
  const max = Math.max(...points.map(p => p.value)) + 0.5;
  const range = Math.max(0.5, max - min);
  const pad = 12;
  const xs = points.map((p, i) => pad + (i / (points.length - 1)) * (W - pad * 2));
  const ys = points.map(p => H - pad - ((p.value - min) / range) * (H - pad * 2));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[xs.length - 1].toFixed(1)},${H - pad} L${xs[0].toFixed(1)},${H - pad} Z`;
  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#fb923c" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path class="area" d="${area}"/>
      <path class="line" d="${path}"/>
      ${xs.map((x, i) => `<circle class="dot" cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3"/>`).join('')}
      <text x="${pad}" y="${H - 2}" class="axis-text">${escapeHtml(points[0].date)}</text>
      <text x="${W - pad - 50}" y="${H - 2}" class="axis-text">${escapeHtml(points[points.length - 1].date)}</text>
    </svg>`;
  return wrap;
}

    el('div', {}, 'Default rest timer'),
    el('div', { class: 'right' }, [el('span', {}, state.settings.restSec + 's'), el('span', {}, '›')])
  ]));
  set.appendChild(el('div', {
    class: 'list-item',
    onclick: () => {
      const cur = state.settings.waterTarget;
      const next = cur === 6 ? 8 : cur === 8 ? 10 : cur === 10 ? 12 : 6;
      state.settings.waterTarget = next; save(); render();
    }
  }, [
    el('div', {}, 'Water target'),
    el('div', { class: 'right' }, [el('span', {}, state.settings.waterTarget + ' cups'), el('span', {}, '›')])
  ]));
  set.appendChild(el('div', {
    class: 'list-item',
    onclick: async () => {
      if (!('Notification' in window)) { toast('Not supported'); return; }
      if (Notification.permission !== 'granted') {
        const r = await Notification.requestPermission();
        state.settings.notifications = (r === 'granted'); save(); render();
        if (r === 'granted') toast('Notifications enabled');
      } else {
        state.settings.notifications = !state.settings.notifications; save(); render();
      }
    }
  }, [
    el('div', {}, 'Browser notifications'),
    el('div', { class: 'right' }, [el('span', {}, state.settings.notifications ? 'On' : 'Off'), el('span', {}, '›')])
  ]));
  set.appendChild(el('div', {
    class: 'list-item',
    onclick: () => {
      if (!confirm('Clear all logged data? This cannot be undone.')) return;
      state = structuredClone(defaultState);
      seedPastSessions();
      save(); render();
      toast('Reset complete');
    }
  }, [
    el('div', { style: 'color:var(--danger)' }, 'Reset all data'),
    el('div', { class: 'right' }, [el('span', {}, '›')])
  ]));
  v.appendChild(set);

  v.appendChild(el('div', {
    class: 'center small dim', style: 'margin-top:18px;padding:8px;'
  }, `MyGym · v1.1 · Started ${PROGRAM_START}`));
}

/* =========== MODALS =========== */
function openWeightModal() {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Log body weight'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, 'Track once a week, same time of day.'));
  m.appendChild(el('label', {}, 'Weight (kg)'));
  const inp = el('input', { type: 'number', step: '0.1', placeholder: 'e.g. 70.2' });
  m.appendChild(inp);
  m.appendChild(el('label', {}, 'Date'));
  const d = el('input', { type: 'date', value: today() });
  m.appendChild(d);
  m.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      const v = parseFloat(inp.value); if (!v) { toast('Enter weight'); return; }
      state.bodyWeight = state.bodyWeight.filter(x => x.date !== d.value);
      state.bodyWeight.push({ date: d.value, weight: v });
      state.bodyWeight.sort((a, b) => a.date.localeCompare(b.date));
      save(); closeModal(); render(); toast('Body weight logged');
    }
  }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
  setTimeout(() => inp.focus(), 100);
}

function openMeasurementsModal() {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Log measurements (cm)'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, 'Take all measurements relaxed, same time of day.'));
  const fields = [
    ['waist', 'Waist (at navel)'],
    ['chest', 'Chest (across nipples)'],
    ['arms', 'Arms (flexed, biggest)'],
    ['thighs', 'Thighs (largest)']
  ];
  const inputs = {};
  fields.forEach(([k, label]) => {
    m.appendChild(el('label', {}, label));
    const i = el('input', { type: 'number', step: '0.1', placeholder: '—' });
    const last = lastMeasurement();
    if (last && last[k] != null) i.placeholder = `was ${last[k]}`;
    inputs[k] = i; m.appendChild(i);
  });
  m.appendChild(el('label', {}, 'Date'));
  const d = el('input', { type: 'date', value: today() });
  m.appendChild(d);
  m.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      const entry = { date: d.value };
      let any = false;
      for (const k of Object.keys(inputs)) {
        const v = parseFloat(inputs[k].value);
        if (!isNaN(v)) { entry[k] = v; any = true; }
      }
      if (!any) { toast('Enter at least one'); return; }
      state.measurements = state.measurements.filter(x => x.date !== d.value);
      state.measurements.push(entry);
      state.measurements.sort((a, b) => a.date.localeCompare(b.date));
      save(); closeModal(); render(); toast('Measurements saved');
    }
  }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
}

function openSleepModal() {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Log last night'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, 'Use the time you actually slept, not the time you went to bed.'));
  m.appendChild(el('label', {}, 'Bedtime'));
  const bed = el('input', { type: 'time', value: '23:00' });
  m.appendChild(bed);
  m.appendChild(el('label', {}, 'Wake time'));
  const wake = el('input', { type: 'time', value: '07:00' });
  m.appendChild(wake);
  m.appendChild(el('label', {}, 'Date (the morning you woke up)'));
  const d = el('input', { type: 'date', value: today() });
  m.appendChild(d);
  m.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      const [bh, bm] = bed.value.split(':').map(Number);
      const [wh, wm] = wake.value.split(':').map(Number);
      let mins = (wh * 60 + wm) - (bh * 60 + bm);
      if (mins < 0) mins += 24 * 60;
      const hours = mins / 60;
      state.sleep = state.sleep.filter(x => x.date !== d.value);
      state.sleep.push({ date: d.value, bedtime: bed.value, waketime: wake.value, hours });
      state.sleep.sort((a, b) => a.date.localeCompare(b.date));
      save(); closeModal(); render(); toast(`${hours.toFixed(1)}h logged`);
    }
  }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
}

function openExerciseNoteModal(date, dayKey, ex) {
  const m = el('div');
  m.appendChild(el('h3', {}, `Note · ${ex.name}`));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, 'Form felt, machine #, twinges, anything to remember.'));
  const w = ensureWorkout(date, dayKey);
  const ta = el('textarea', { placeholder: 'e.g. Machine 3, seat height 5, knee felt fine.' });
  ta.value = w.notes[ex.id] || '';
  m.appendChild(ta);
  m.appendChild(el('button', { class: 'btn', onclick: () => {
    w.notes[ex.id] = ta.value.trim();
    if (!w.notes[ex.id]) delete w.notes[ex.id];
    save(); closeModal(); render(); toast('Note saved');
  } }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
  setTimeout(() => ta.focus(), 100);
}

function openSessionNoteModal(date) {
  const w = ensureWorkout(date, activeDayKey ?? todayDow());
  const m = el('div');
  m.appendChild(el('h3', {}, 'Session note'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, 'How did this session feel overall? Energy, focus, sleep impact.'));
  const ta = el('textarea', { placeholder: 'e.g. Tired today, slept 6h, still hit all sets.' });
  ta.value = w.sessionNote || '';
  m.appendChild(ta);
  m.appendChild(el('button', { class: 'btn', onclick: () => {
    w.sessionNote = ta.value.trim();
    if (!w.sessionNote) delete w.sessionNote;
    save(); closeModal(); render(); toast('Note saved');
  } }, 'Save'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
  setTimeout(() => ta.focus(), 100);
}

function openStrengthChart(ex) {
  const m = el('div');
  m.appendChild(el('h3', {}, ex.name));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:8px;' }, `${ex.target} · ${ex.alt}`));
  const history = getStrengthHistory(ex.id);
  if (!history.length) {
    m.appendChild(el('div', { class: 'empty' }, 'Log this exercise to see history.'));
  } else {
    m.appendChild(buildLineChart(history.map(h => ({ date: h.date, value: h.e })), 'est 1RM'));
    const list = el('div', { style: 'margin-top:8px;' });
    history.slice().reverse().slice(0, 8).forEach(h => {
      list.appendChild(el('div', { class: 'list-item' }, [
        el('div', {}, [
          el('div', { class: 'bold' }, `${h.w}kg × ${h.r}`),
          el('div', { class: 'small muted' }, h.date)
        ]),
        el('div', { class: 'right' }, [el('span', { class: 'chip' }, `e1RM ${h.e.toFixed(1)}kg`)])
      ]));
    });
    m.appendChild(list);
  }
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
}

function openPlateModal(initial) {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Plate calculator'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, `Standard barbell ${BAR_WEIGHT}kg. Plates per side.`));
  m.appendChild(el('label', {}, 'Target weight (kg)'));
  const inp = el('input', { type: 'number', step: '0.5', placeholder: 'e.g. 60' });
  if (initial) inp.value = initial;
  m.appendChild(inp);
  const result = el('div', { class: 'plate-result' });
  m.appendChild(result);

  function calc() {
    const target = parseFloat(inp.value);
    result.innerHTML = '';
    if (!target || target < BAR_WEIGHT) {
      result.appendChild(el('div', { class: 'small muted' }, target ? `Below bar weight (${BAR_WEIGHT}kg)` : 'Enter weight'));
      return;
    }
    let perSide = (target - BAR_WEIGHT) / 2;
    const used = [];
    for (const p of PLATES) {
      while (perSide >= p - 0.001) { used.push(p); perSide -= p; }
    }
    if (perSide > 0.05) {
      result.appendChild(el('div', { class: 'small muted' }, `Closest: ${target - perSide * 2}kg (off by ${(perSide * 2).toFixed(1)}kg)`));
    }
    if (!used.length) {
      result.appendChild(el('div', { class: 'small muted' }, 'Just the bar'));
      return;
    }
    used.forEach(p => {
      const cls = p >= 25 ? 'p25' : p >= 20 ? 'p20' : p >= 15 ? 'p15' : p >= 10 ? 'p10' : p >= 5 ? 'p5' : p >= 2.5 ? 'p2' : 'p1';
      result.appendChild(el('span', { class: 'plate ' + cls }, `${p}`));
    });
  }
  inp.addEventListener('input', calc);
  calc();

  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
  setTimeout(() => inp.focus(), 100);
}

/* photo handling */
function addPhoto(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const W = 480, H = Math.round(W * img.height / img.width);
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      c.getContext('2d').drawImage(img, 0, 0, W, H);
      const dataUrl = c.toDataURL('image/jpeg', 0.7);
      state.photos.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), date: today(), dataUrl });
      try { save(); toast('Photo added'); render(); }
      catch (err) { toast('Storage full — delete old photos'); }
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function openPhotoView(id) {
  const photo = state.photos.find(p => p.id === id); if (!photo) return;
  const m = el('div');
  m.appendChild(el('h3', {}, `Photo · ${photo.date}`));
  m.appendChild(el('img', { src: photo.dataUrl, style: 'width:100%;border-radius:12px;margin-bottom:12px;' }));
  m.appendChild(el('button', {
    class: 'btn danger',
    onclick: () => {
      if (!confirm('Delete this photo?')) return;
      state.photos = state.photos.filter(p => p.id !== id);
      save(); closeModal(); render(); toast('Deleted');
    }
  }, 'Delete'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Close'));
  openModal(m);
}

/* export / import */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mygym-${today()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('Replace current data with imported file?')) return;
        state = { ...structuredClone(defaultState), ...data };
        for (const k of Object.keys(defaultState)) if (state[k] === undefined) state[k] = defaultState[k];
        seedPastSessions();
        save(); render(); toast('Imported');
      } catch (err) { alert('Invalid file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* =========== INIT =========== */
document.querySelectorAll('nav.tabs button').forEach(b => {
  b.addEventListener('click', () => {
    activeTab = b.dataset.tab;
    activeDayKey = null;
    expandedExId = null;
    editingSetKey = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

render();
