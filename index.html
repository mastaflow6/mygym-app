    }

    v.appendChild(el('div', { class: 'card' }, [
      el('div', { class: 'card-title' }, 'Train a different day?'),
      el('div', { class: 'row wrap', style: 'gap:8px;' },
        Object.entries(DAYS).map(([k, d]) =>
          el('button', { class: 'btn secondary', style: 'flex:1;min-width:42%;', onclick: () => { activeDayKey = +k; expandedExId = null; editingSetKey = null; render(); } }, d.name)
        )
      )
    ]));
    return;
  }

  const prog = workoutProgress(date, dayKey);
  const pct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;
  const w = ensureWorkout(date, dayKey);

  // Hero
  const hero = el('div', { class: 'hero' });
  hero.appendChild(el('div', { class: 'day-name' }, `${DAY_LABELS[dow]} · ${date}`));
  hero.appendChild(el('h2', {}, day.name));
  hero.appendChild(el('div', { class: 'focus' }, day.focus));
  const meta = el('div', { class: 'meta' });
  meta.appendChild(el('span', { class: 'chip accent' }, `Week ${currentWeek()}`));
  meta.appendChild(el('span', { class: 'chip' }, `${day.exercises.length} exercises`));
  if (w.finished) meta.appendChild(el('span', { class: 'chip success' }, '✓ Done'));
  hero.appendChild(meta);

  const progEl = el('div', { class: 'progress' });
  progEl.appendChild(el('div', { class: 'progress-bar' }, [el('span', { style: `width:${pct}%` })]));
  progEl.appendChild(el('div', { class: 'progress-meta' }, [
    el('span', {}, `${prog.done}/${prog.total} sets`),
    el('span', {}, `${pct}%`)
  ]));
  hero.appendChild(progEl);
  v.appendChild(hero);

  // Phase alert
  const dl = daysToNextPhase();
  if (dl !== null && dl >= 0 && dl <= 7) v.appendChild(makePhaseAlert());

  // Coach note
  v.appendChild(el('div', { class: 'coach-note' + (day.warn ? ' warn' : ''), html: `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <span>${escapeHtml(day.note)}</span>` }));

  // Lab timer
  v.appendChild(buildLabTimer(date, w));

  // Day switcher
  const sw = el('div', { class: 'row', style: 'gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;' });
  Object.entries(DAYS).forEach(([k, d]) => {
    sw.appendChild(el('button', {
      class: 'chip' + (+k === dayKey ? ' accent' : ''),
      style: 'padding:8px 12px;font-size:12px;flex-shrink:0;',
      onclick: () => { activeDayKey = +k; expandedExId = null; editingSetKey = null; render(); }
    }, d.name));
  });
  v.appendChild(sw);

  // Reset today (only when there's something to reset)
  const hasProgress = prog.done > 0 || w.started || w.activePhase ||
    (w.timers && (w.timers.warmup || w.timers.workout || w.timers.cooldown));
  if (hasProgress && !w.finished) {
    v.appendChild(el('div', { class: 'row', style: 'justify-content:flex-end;margin-bottom:8px;' }, [
      el('button', {
        class: 'btn secondary',
        style: 'font-size:12px;padding:6px 12px;color:var(--danger);',
        onclick: resetTodayWorkout
      }, '↺ Reset today')
    ]));
  }

  // Exercises
  day.exercises.forEach(ex => v.appendChild(renderExercise(ex, date, dayKey)));

  // Action row: log how you feel + add custom exercise
  v.appendChild(el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;' }, [
    el('button', {
      class: 'btn secondary',
      style: 'display:flex;align-items:center;justify-content:center;gap:6px;',
      onclick: openFeelLogModal
    }, [
      el('span', { style: 'font-size:14px;' }, '🫀'),
      el('span', {}, 'How I feel')
    ]),
    el('button', {
      class: 'btn secondary',
      style: 'display:flex;align-items:center;justify-content:center;gap:6px;',
      onclick: () => openAddExerciseModal(dayKey)
    }, [
      el('span', { style: 'font-size:18px;line-height:1;' }, '+'),
      el('span', {}, 'Add exercise')
    ])
  ]));

  // Finish button
  if (!w.finished) {
    v.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:16px;',
      onclick: () => {
        if (w.activePhase && w.phaseStart) {
          w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (Date.now() - w.phaseStart);
          w.activePhase = null; w.phaseStart = null;
        }
        w.finished = Date.now();
        save(); toast('Workout saved 🎯'); stopRest();
        if (phaseTickInterval) clearInterval(phaseTickInterval);
        releaseWakeLock();
        render();
      }
    }, prog.done === prog.total ? 'Finish workout' : `Finish (${prog.done}/${prog.total} sets)`));
  } else {
    v.appendChild(el('button', {
      class: 'btn secondary', style: 'margin-top:16px;',
      onclick: () => { w.finished = null; save(); render(); }
    }, 'Reopen workout'));
  }

  if (w.activePhase) startPhaseTick();
}

function makePhaseAlert() {
  const dl = daysToNextPhase();
  const np = nextPhase();
  if (!np) return null;
  return el('div', { class: 'coach-note info', html: `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>
    <span><b>Phase ${np.num} starts in ${dl} day${dl === 1 ? '' : 's'}</b> — ${escapeHtml(np.desc)}. Have all sets felt easy for 2 weeks?</span>
  ` });
}

function buildLabTimer(date, w) {
  const card = el('div', { class: 'lab-timer' });
  card.appendChild(el('div', { class: 'card-title', style: 'margin:0 0 4px;' }, 'Workout timer'));
  card.appendChild(el('div', { class: 'small muted' }, w.activePhase ? `Tracking: ${w.activePhase}` : 'Tap a phase to start tracking time'));
  const phases = el('div', { class: 'phases', style: 'grid-template-columns: repeat(2, 1fr);' });
  ['warmup', 'workout'].forEach(p => {
    let ms = w.timers[p] || 0;
    if (w.activePhase === p && w.phaseStart) ms += Date.now() - w.phaseStart;
    const isActive = w.activePhase === p;
    const isDone = !isActive && ms > 0;
    phases.appendChild(el('button', {
      class: 'phase-btn' + (isActive ? ' active' : '') + (isDone ? ' done' : ''),
      onclick: () => setPhase(date, p)
    }, [
      el('span', { class: 'lbl' }, p),
      el('span', { class: 't' }, fmtTime(ms))
    ]));
  });
  card.appendChild(phases);

  // Add session note
  const noteRow = el('div', { class: 'row', style: 'margin-top:10px;gap:8px;' });
  noteRow.appendChild(el('button', {
    class: 'btn secondary small',
    style: 'flex:1;',
    onclick: () => openSessionNoteModal(date)
  }, w.sessionNote ? '✎ Edit session note' : '+ Add session note'));
  if (w.sessionNote) {
    noteRow.appendChild(el('span', { class: 'chip accent' }, 'Has note'));
  }
  card.appendChild(noteRow);
  return card;
}

function renderExercise(ex, date, dayKey) {
  const logs = getSetLogs(date, dayKey, ex);
  const allDone = logs.every(s => s.d);
  const lastSession = getLastSession(ex.id, date);
  const w = ensureWorkout(date, dayKey);
  const note = w.notes[ex.id] || '';
  const hasPRThisSession = logs.some(s => isCurrentSetPR(ex.id, date, s));
  const isExpanded = getActiveExId(date, dayKey) === ex.id;
  const displayName = getDisplayName(ex, date);
  const swapIdx = getDisplaySwap(ex, date);
  const doneCount = logs.filter(s => s.d).length;

  const card = el('div', {
    class: 'exercise ' + (isExpanded ? 'expanded' : 'collapsed') +
      (allDone ? ' complete' : '') + (hasPRThisSession ? ' has-pr' : '')
  });

  // Clickable header (always visible)
  const header = el('button', {
    class: 'ex-header-clickable',
    onclick: () => {
      expandedExId = isExpanded ? 'none' : ex.id;
      editingSetKey = null;
      render();
    }
  });
  const headerLeft = el('div', { class: 'grow', style: 'min-width:0;' });
  const nameEl = el('div', { class: 'ex-name' });
  nameEl.appendChild(document.createTextNode(displayName));
  if (swapIdx > 0) nameEl.appendChild(el('span', { class: 'chip', style: 'margin-left:6px;font-size:10px;' }, 'swapped'));
  if (hasPRThisSession) nameEl.appendChild(el('span', { class: 'chip pr', style: 'margin-left:6px;' }, '★ PR'));
  const exVariant = (w.variants && w.variants[ex.id]) ? String(w.variants[ex.id]).trim() : '';
  if (exVariant) {
    nameEl.appendChild(el('span', {
      class: 'chip',
      style: 'margin-left:6px;font-size:10px;background:var(--info-soft);color:var(--info);border:1px solid rgba(96,165,250,0.35);'
    }, '🏷 ' + exVariant));
  }
  headerLeft.appendChild(nameEl);
  headerLeft.appendChild(el('div', { class: 'ex-target' }, ex.target));
  header.appendChild(headerLeft);

  const headerRight = el('div', { class: 'ex-status' });
  headerRight.appendChild(el('span', {
    class: 'sets-count' + (allDone ? ' all-done' : '')
  }, `${doneCount}/${ex.sets}`));
  headerRight.appendChild(el('span', { class: 'chevron' + (isExpanded ? ' open' : '') }, '›'));
  header.appendChild(headerRight);
  card.appendChild(header);

  if (!isExpanded) return card;

  // Expanded body
  const body = el('div', { class: 'ex-body' });

  // Action icon row
  const icons = el('div', { class: 'ex-icons-row' });
  icons.appendChild(makeActionBtn('Demo',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
    () => openVideoSearch(displayName)));
  icons.appendChild(makeActionBtn('Swap',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4v16M17 20V4M3 8l4-4 4 4M21 16l-4 4-4-4"/></svg>',
    () => openSwapModal(ex, date),
    swapIdx > 0));
  icons.appendChild(makeActionBtn('Ask',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/><path d="M19 16l.7 1.8L21.5 18l-1.8.7L19 20l-.7-1.3L17 18l1.7-.5z"/></svg>',
    () => askCoachAboutExercise(ex, date)));
  icons.appendChild(makeActionBtn('Image',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
    () => openImageModal(displayName)));
  icons.appendChild(makeActionBtn('Note',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>',
    () => openExerciseNoteModal(date, dayKey, ex),
    !!note));
  icons.appendChild(makeActionBtn('History',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/></svg>',
    () => openStrengthChart(ex)));
  body.appendChild(icons);

  if (ex.warn) {
    body.appendChild(el('div', { class: 'coach-note warn', style: 'font-size:12px;padding:8px 10px;margin:6px 0;' }, [el('span', {}, '⚠ ' + ex.warn)]));
  }

  const setsCont = el('div', { class: 'sets-v2' });
  logs.forEach((_, i) => setsCont.appendChild(renderSetRow(ex, date, dayKey, logs, i, lastSession)));
  body.appendChild(setsCont);

  body.appendChild(el('button', {
    class: 'add-set',
    onclick: e => { e.stopPropagation(); logs.push({ w: '', r: '', d: false }); save(); render(); }
  }, '+ Add set'));

  return card;

function askCoachAboutExercise(ex, date) {
  if (!state.settings.anthropicApiKey) { openAIKeyModal(() => askCoachAboutExercise(ex, date)); return; }
  const displayName = getDisplayName(ex, date);
  const muscles = (ex.muscles || []).join(', ');
  const alts = getAlternatives(ex);
  const altStr = alts.length ? alts.join(', ') : '(none listed)';

  let pickedDataUrl = null;

  const m = el('div');
  m.appendChild(el('h3', {}, '✨ Ask about ' + displayName));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:10px;' },
    'Ask in text, attach a photo (machine / form / setup), or both. One-shot answer — no chat thread.'));

  const ta = el('textarea', {
    class: 'ai-textarea',
    style: 'min-height:90px;',
    placeholder: 'e.g. "Does this fit my plan?", "Form check", "Is +1kg OK?", or leave blank if the photo says it all.'
  });
  m.appendChild(ta);

  // Photo picker (optional)
  const photoRow = el('div', { style: 'display:flex;align-items:center;gap:10px;margin-top:10px;' });
  const fileInp = el('input', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display:none' });
  const photoBtn = el('button', { class: 'btn secondary', type: 'button', style: 'padding:8px 14px;font-size:13px;' }, '📷 Add photo (optional)');
  const photoStatus = el('span', { class: 'small muted' }, '');
  photoBtn.onclick = () => fileInp.click();
  fileInp.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      pickedDataUrl = await resizeImageToDataUrl(f, 1100, 0.8);
      photoStatus.textContent = '✓ Photo attached · tap to replace';
      photoStatus.style.color = 'var(--success)';
      photoBtn.textContent = '📷 Replace photo';
    } catch (err) {
      photoStatus.textContent = 'Bad image';
      photoStatus.style.color = 'var(--danger)';
    }
  };
  photoRow.appendChild(photoBtn);
  photoRow.appendChild(photoStatus);
  m.appendChild(fileInp);
  m.appendChild(photoRow);

  const status = el('div', { style: 'min-height:24px;margin:10px 0;' });
  m.appendChild(status);

  // Reply container
  const replyBox = el('div', {
    style: 'margin-top:10px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--surface-3);border-radius:12px;line-height:1.55;font-size:14px;white-space:pre-wrap;display:none;'
  });
  m.appendChild(replyBox);

  const askBtn = el('button', {
    class: 'btn',
    onclick: async () => {
      const text = ta.value.trim();
      if (!text && !pickedDataUrl) { toast('Type a question or attach a photo'); return; }
      askBtn.disabled = true;
      askBtn.style.opacity = '0.5';
      status.innerHTML = '<div class="ai-loading"><span class="spinner"></span><span>Asking Claude…</span></div>';
      replyBox.style.display = 'none';

      const sys = `You are MyGym Coach. The user is asking about ONE specific exercise during their session. Answer in one short, practical block (2-5 sentences). Tone: clear, friendly, actionable. No emoji spam. Don't invent numbers.

The exercise in question:
- Name: ${displayName}
- Target muscles: ${muscles || '(unspecified)'}
- Programmed: ${ex.sets}×${ex.repsMin}-${ex.repsMax}${ex.timed ? 's' : ''} @ ${ex.bw ? 'BW' : ex.weight + 'kg'}
- Listed alternatives: ${altStr}

Always include:
1) A short opinion on whether this exercise fits the user's plan TODAY.
2) Any caution flags relevant to their data (recovery, soreness, form risk).
3) One concrete suggestion (weight bump, swap idea, tempo cue, or "keep as planned").

Wider context for grounding:

${buildCoachContext()}`;

      const userText = text || 'Look at this image and give feedback on this exercise.';
      try {
        let raw;
        if (pickedDataUrl) {
          raw = await callAnthropicVision({
            system: sys,
            userText,
            imageDataUrl: pickedDataUrl,
            maxTokens: 600
          });
        } else {
          raw = await callAnthropic({
            system: sys,
            messages: [{ role: 'user', content: userText }],
            maxTokens: 600
          });
        }
        status.innerHTML = '';
        replyBox.textContent = String(raw || '').trim();
        replyBox.style.display = 'block';
      } catch (err) {
        status.innerHTML = '<div class="small" style="color:var(--danger);">' + escapeHtml(String(err.message || 'Failed').slice(0, 200)) + '</div>';
      } finally {
        askBtn.disabled = false;
        askBtn.style.opacity = '1';
      }
    }
  }, 'Ask');
  m.appendChild(askBtn);
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Close'));

  openModal(m);
  setTimeout(() => ta.focus(), 80);
}

function makeActionBtn(label, svgHtml, onclick, hasData) {
  return el('button', {
    class: 'icon-btn-labeled' + (hasData ? ' has-data' : ''),
    onclick: e => { e.stopPropagation(); onclick(); }
  }, [
    el('span', { class: 'icon', html: svgHtml }),
    el('span', { class: 'label' }, label)
  ]);
}

function renderSetRow(ex, date, dayKey, logs, i, lastSession) {
  const s = logs[i];
  const setKey = `${ex.id}-${i}`;
  const isEditing = editingSetKey === setKey;
  const lastSet = lastSession?.sets[i];
  const w = ensureWorkout(date, dayKey);
  const isPR = s.d && isCurrentSetPR(ex.id, date, s);

  const row = el('div', {
    class: 'set-v2' + (s.d ? ' done' : '') + (isPR ? ' pr' : '') + (isEditing ? ' editing' : '')
  });
  row.appendChild(el('div', { class: 'set-badge' }, s.d ? '✓' : (isPR ? '★' : String(i + 1))));

  const body = el('div', { class: 'set-body' });

  if (isEditing) {
    if (!s.w && !ex.bw) s.w = String(lastSet?.w ?? ex.weight);
    if (!s.r) s.r = String(lastSet?.r ?? getSetTargets(ex)[i] ?? ex.repsMin);

    if (!ex.bw && !ex.timed) {
      if (ex.barbell) {
        body.appendChild(makeStepperRow('kg', s.w, 2.5, val => { logs[i].w = val; save(); render(); }));
      } else {
        body.appendChild(makeWeightPickerRow(s.w, val => { logs[i].w = val; save(); render(); }));
      }
    }
    body.appendChild(makeStepperRow(ex.timed ? 'sec' : 'reps', s.r, 1, val => { logs[i].r = val; save(); render(); }));
    body.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:4px;padding:11px;font-size:14px;',
      onclick: e => {
        e.stopPropagation();
        const prevPR = getPR(ex.id, date);
        logs[i].d = true;
        editingSetKey = null;
        if (!w.started) w.started = Date.now();
        // Promote the active swap to the global default once the user logs a set with it.
        if (!state.exerciseSwaps) state.exerciseSwaps = {};
        const swapNow = w.swaps?.[ex.id];
        if (swapNow) state.exerciseSwaps[ex.id] = swapNow;
        // Auto-finish: if EVERY exercise in today's plan has all its sets marked done, mark workout finished.
        if (!w.finished) {
          const day = DAYS[dayKey];
          const allExercisesDone = day && day.exercises.length > 0 && day.exercises.every(ex2 => {
            const arr = (w.logs && w.logs[ex2.id]) || [];
            if (arr.length < ex2.sets) return false;
            return arr.every(s2 => s2 && s2.d);
          });
          if (allExercisesDone) {
            if (w.activePhase && w.phaseStart) {
              w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (Date.now() - w.phaseStart);
              w.activePhase = null; w.phaseStart = null;
            }
            w.finished = Date.now();
            stopRest();
            if (typeof phaseTickInterval !== 'undefined' && phaseTickInterval) clearInterval(phaseTickInterval);
            if (typeof releaseWakeLock === 'function') releaseWakeLock();
            if (typeof homeFocusExited !== 'undefined') homeFocusExited = false;
            if (navigator.vibrate) navigator.vibrate([100, 60, 100, 60, 200]);
            toast('🎯 Workout auto-finished — all sets done', 'celebrate');
            save(); render();
            return;
          }
        }
        save(); render();
        startRest();
        if (navigator.vibrate) navigator.vibrate(20);
        const e1 = epley(logs[i].w, logs[i].r);
        if (e1 > 0 && (!prevPR || e1 > prevPR.e)) {
          const lift = ex.bw ? `BW × ${logs[i].r}` : `${logs[i].w}kg × ${logs[i].r}`;
          toast(`★ NEW PR · ${lift}`, 'celebrate');
          if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 100]);
        }
      }
    }, s.d ? 'Save' : 'Log set'));
  } else if (s.d) {
    const lbl = ex.bw ? `BW × ${s.r}${ex.timed ? 's' : ''}` : `${s.w} kg × ${s.r}${ex.timed ? 's' : ''}`;

    if (isPR) body.appendChild(el('span', { class: 'small', style: 'color:var(--pr);font-weight:700;' }, '★ Personal record'));
  } else {
    if (lastSet) {
      body.appendChild(el('div', { class: 'last-hint' }, `Last: ${ex.bw ? 'BW' : lastSet.w + 'kg'} × ${lastSet.r}${ex.timed ? 's' : ''}`));
    }
    const tapW = parseFloat(s.w) || lastSet?.w || ex.weight;
    const tapR = parseFloat(s.r) || lastSet?.r || getSetTargets(ex)[i] || ex.repsMin;
    const tapVal = ex.bw ? `BW × ${tapR}${ex.timed ? 's' : ''}` : `${tapW} kg × ${tapR}${ex.timed ? 's' : ''}`;
    body.appendChild(el('button', {
      class: 'tap-to-log',
      onclick: e => {
        e.stopPropagation();
        if (!logs[i].w && !ex.bw) logs[i].w = String(tapW);
        if (!logs[i].r) logs[i].r = String(tapR);

      }
    }, [
      el('span', { class: 'tap-label' }, 'Tap to edit'),
      el('span', { class: 'tap-value' }, tapVal)
    ]));
  }
  row.appendChild(body);

  const actions = el('div', { class: 'set-actions' });
  if (isEditing) {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = null; render(); },
      title: 'Cancel',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    }));
  } else {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = setKey; render(); },
      title: 'Edit',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>'
    }));
    if (s.d) {
      actions.appendChild(el('button', {
        class: 'icon-btn',
        onclick: e => { e.stopPropagation(); logs[i].d = false; save(); render(); },
        title: 'Undo',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M4 9h11a5 5 0 015 5v0a5 5 0 01-5 5H8"/></svg>'
      }));
    }
    // Delete button for user-added extra sets only
    if (i >= ex.sets) {
      actions.appendChild(el('button', {
        class: 'icon-btn delete-set',
        onclick: e => {
          e.stopPropagation();
          logs.splice(i, 1);
          save(); render();
          toast('Set removed');
        },
        title: 'Remove set',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>'
      }));
    }
  }
  row.appendChild(actions);

  return row;
}

function makeWeightPickerRow(currentVal, onChange) {
  const list = (state.settings.dumbbellWeights || []).slice().sort((a, b) => a - b);
  const curNum = parseFloat(currentVal) || 0;

  function prevInList(v) {
    let prev = null;
    for (const x of list) { if (x < v - 0.001) prev = x; else break; }
    return prev != null ? prev : Math.max(0, +(v - 1).toFixed(2));
  }
  function nextInList(v) {
    for (const x of list) { if (x > v + 0.001) return x; }
    return +(v + 1).toFixed(2);
  }

  return el('div', { class: 'stepper-row' }, [
    el('span', { class: 'stepper-label' }, 'kg'),
    el('button', {
      class: 'stepper-btn',
      onclick: e => { e.stopPropagation(); onChange(String(prevInList(curNum))); }
    }, '−'),
    el('div', {
      class: 'stepper-value',
      style: 'cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;',
      title: 'Tap to type any weight',
      onclick: e => {
        e.stopPropagation();
        const input = prompt('Weight (kg):', String(curNum));
        if (input == null) return;
        const v = parseFloat(input);
        if (!isNaN(v) && v >= 0) onChange(String(+v.toFixed(2)));
      }
    }, String(curNum)),
    el('button', {
      class: 'stepper-btn',
      onclick: e => { e.stopPropagation(); onChange(String(nextInList(curNum))); }
    }, '+')
  ]);
}

// Resize an uploaded image down to <= maxDim on its longest side, return a JPEG data URL.
function resizeImageToDataUrl(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Not a valid image'));
      img.onload = () => {
        try {
          const ratio = Math.min(1, (maxDim || 1000) / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * ratio));
          const h = Math.max(1, Math.round(img.height * ratio));
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality || 0.78));
        } catch (e) { reject(e); }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function openImageModal(displayName) {
  const customMap = state.customExerciseImages || {};
  const customUrl = customMap[displayName] || null;
  const fallbackUrl = getImageForName(displayName);
  const url = customUrl || fallbackUrl;

  const m = el('div');
  m.appendChild(el('h3', {}, displayName));

  if (url) {
    const img = el('img', {
      class: 'modal-image',
      src: url,
      alt: '',
      onerror: e => { e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'block'); }
    });
    m.appendChild(img);
    m.appendChild(el('div', { class: 'empty', style: 'display:none;' }, 'Image not available'));

    m.appendChild(el('div', { class: 'empty' }, 'No image yet. Upload one below.'));
  }

  m.appendChild(el('div', { class: 'small dim center', style: 'margin:8px 0 14px;' },
    customUrl ? 'Your custom image · saved for this exercise'
    : (fallbackUrl ? 'Source: free-exercise-db (open source)' : 'No image source')));

  // Hidden file input + Upload button
  const fileInp = el('input', { type: 'file', accept: 'image/*', style: 'display:none' });
  fileInp.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImageToDataUrl(file, 1000, 0.78);
      if (!state.customExerciseImages) state.customExerciseImages = {};
      state.customExerciseImages[displayName] = dataUrl;
      save();
      closeModal();
      openImageModal(displayName); // reopen with the new image
      toast('Image saved for ' + displayName);
    } catch (err) {
      toast(String(err.message || 'Upload failed').slice(0, 80));
    }
  };
  m.appendChild(fileInp);

  m.appendChild(el('button', {
    class: customUrl ? 'btn secondary' : 'btn',
    onclick: () => fileInp.click()
  }, customUrl ? 'Replace with another photo' : 'Upload your own photo'));

  if (customUrl) {
    m.appendChild(el('button', {
      class: 'btn danger',
      style: 'margin-top:8px;',

        if (state.customExerciseImages) delete state.customExerciseImages[displayName];

        closeModal();
        openImageModal(displayName);

      }

  openModal(m);

    el('div', { class: 'small muted' },
      isShifted
        ? `Plan shifted by ${skips} skip${skips > 1 ? 's' : ''}`
        : '4 training days · 3 rest days · ~60 min sessions')
  ]));

  const sessions = upcomingSessions(t, 7);
  sessions.forEach(({ date, dayKey }, i) => {
    const dow = new Date(date + 'T00:00:00').getDay();
    const day = dayKey ? DAYS[dayKey] : null;
    const isToday = i === 0;
    const isSkipped = state.plan?.skippedDates?.includes(date);
    const naturalKey = DAYS[dow] ? dow : null;
    const isShiftedDay = day && dayKey !== naturalKey;

    const card = el('div', { class: 'day-card' + (day ? '' : ' rest') });
    const headerRight = isToday ? el('span', { class: 'chip accent' }, 'Today')
      : isShiftedDay ? el('span', { class: 'chip info' }, 'Shifted')
      : isSkipped ? el('span', { class: 'chip warn' }, 'Skipped')
      : day ? el('span', { class: 'chip' }, `${day.exercises.length} ex`)
      : null;
    const head = el('div', { class: 'header' }, [
      el('div', { html: `<b>${DAY_LABELS[dow]}</b> · ${day ? day.name : (isSkipped ? 'Rest (skipped)' : 'Rest')}` }),
      headerRight
    ]);
    card.appendChild(head);
    if (day) {
      const body = el('div', { class: 'body' });
      day.exercises.forEach(ex => {
        const line = el('div', {
          class: 'ex-line',
          onclick: () => openStrengthChart(ex)
        });
        line.appendChild(el('div', { class: 'name' }, ex.name));
        line.appendChild(el('div', { class: 'spec', html: `${ex.sets}×${ex.timed ? `${ex.repsMin}–${ex.repsMax}s` : `${ex.repsMin}–${ex.repsMax}`} · <b style="color:var(--text)">${ex.bw ? 'BW' : ex.weight + 'kg'}</b>` }));
        body.appendChild(line);
      });
      card.appendChild(body);
    }
    v.appendChild(card);
  });

  if (isShifted) {
    v.appendChild(el('button', {
      class: 'btn secondary',
      style: 'margin-top:14px;',
      onclick: () => {
        if (!confirm('Reset plan? All skips and session overrides will be cleared and the calendar returns to the natural Push-Pull-Legs-Upper cycle.')) return;
        resetPlanOverrides();
        render();
        toast('Plan reset to default');
      }
    }, 'Reset plan to default'));
  }
}

/* =========== FOOD =========== */
function _ensureMeals() {
  if (!Array.isArray(state.meals)) state.meals = [];
}

// Reusable food library — per-100g macros for foods the user eats often.
function ensureFoodLibrary() {
  if (!Array.isArray(state.foodLibrary)) state.foodLibrary = [];
}
function newFoodId() { return 'fd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6); }
function addFood({ name, kcal100, p100, c100, f100, note }) {
  ensureFoodLibrary();
  const cleanName = (name || '').trim();
  if (!cleanName) return null;
  const f = {
    id: newFoodId(),
    name: cleanName,
    kcal100: Math.max(0, Number(kcal100) || 0),
    p100: Math.max(0, Number(p100) || 0),
    c100: Math.max(0, Number(c100) || 0),
    f100: Math.max(0, Number(f100) || 0),
    note: (note || '').trim() || null,
    createdAt: Date.now()
  };
  state.foodLibrary.push(f);
  save();
  return f;
}
function updateFood(id, patch) {
  ensureFoodLibrary();
  const f = state.foodLibrary.find(x => x.id === id);
  if (!f) return;
  Object.assign(f, patch);
  save();
}
function deleteFood(id) {
  ensureFoodLibrary();
  state.foodLibrary = state.foodLibrary.filter(x => x.id !== id);
  save();
}
function getFoodLibrary() {
  ensureFoodLibrary();
  return state.foodLibrary.slice().sort((a, b) => a.name.localeCompare(b.name));
}

// Ask Claude to estimate per-100g macros from a name and/or photo.
async function analyzeFoodWithAI({ name, imageDataUrl }) {
  if (!state.settings.anthropicApiKey) throw new Error('Set up your Anthropic API key first');
  const sys = `You estimate per-100g macros for a food item. Output ONLY a single JSON object (no prose, no markdown fences):
{
  "name": "concise food name, capitalized (e.g. 'Cooked white rice')",
  "kcal100": number (kcal per 100g),
  "p100": number (grams of protein per 100g),
  "c100": number (grams of carbs per 100g),
  "f100": number (grams of fat per 100g),
  "note": "short cooking method or qualifier, optional"
}

Use standard USDA-like values. Default to COOKED unless the user clearly says raw / dry / uncooked.
Examples:
- Cooked white rice ≈ 130 kcal, 2.7g P, 28g C, 0.3g F.
- Cooked skinless chicken breast ≈ 165 kcal, 31g P, 0g C, 3.6g F.
- Avocado (raw, flesh) ≈ 160 kcal, 2g P, 9g C, 15g F.
Round to 1 decimal for protein/carbs/fat, integer for kcal. Don't invent numbers if truly unsure — keep them within realistic ranges.`;
  const userText = name ? ('Food: ' + name) : 'Identify the food in the image and estimate macros.';
  let raw;
  if (imageDataUrl) {
    raw = await callAnthropicVision({ system: sys, userText, imageDataUrl, maxTokens: 500 });
  } else {
    raw = await callAnthropic({ system: sys, messages: [{ role: 'user', content: userText }], maxTokens: 500 });
  }
  const cleaned = _stripJsonObjectFence(raw);
  let parsed;
  try { parsed = JSON.parse(cleaned); }
  catch (_) { throw new Error('Claude returned non-JSON: ' + raw.slice(0, 150)); }
  return parsed;
}
function mealsForDate(d) {
  _ensureMeals();
  return state.meals.filter(m => m.date === d).sort((a, b) => (a.time || '').localeCompare(b.time || ''));
}
function mealTotalsForDate(d) {
  const meals = mealsForDate(d);
  return meals.reduce((acc, m) => ({
    calories: acc.calories + (m.calories || 0),
    protein:  acc.protein  + (m.protein  || 0),
    carbs:    acc.carbs    + (m.carbs    || 0),
    fat:      acc.fat      + (m.fat      || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
}
function pruneMealPhotos() {
  _ensureMeals();
  if (state.settings.mealPrunedAt === today()) return;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const cutKey = cutoff.toISOString().slice(0, 10);
  let pruned = 0;
  for (const m of state.meals) {
    if (m.dataUrl && m.date < cutKey) { delete m.dataUrl; pruned++; }
  }
  state.settings.mealPrunedAt = today();
  if (pruned > 0) save({ skipCloud: true });
}

async function analyzeMealPhoto(dataUrl, weightG, userDescription) {
  if (!state.settings.anthropicApiKey) throw new Error('Set up Claude API key first');
  // dataUrl is "data:image/jpeg;base64,/9j/..." — split media type and base64
  const m = dataUrl.match(/^data:(image\/[a-z]+);base64,(.+)$/i);
  if (!m) throw new Error('Bad image data');
  const mediaType = m[1];
  const data = m[2];

  const weightLine = weightG
    ? `The user has weighed the meal: ${weightG} grams. Use this as the total weight for portion sizing.`
    : `The user has NOT weighed the meal. Use the photo for portion sizing.`;
  const descLine = userDescription
    ? `The user provided this description (treat as ground truth for what's in the meal — ingredients, counts, weights when given). Cross-check against the photo and refine portions Claude can see better than the user described:\n"""${userDescription}"""`
    : `The user gave no text description. Identify each visible item from the photo only.`;

  const sys = `You are a precise nutrition estimator. Given a meal photo (and possibly a user description) return calories and macros.

${weightLine}
${descLine}

Process:
1. List every distinct food item visible in the photo (and listed in the user description).
2. For each item, estimate its weight in grams from visual cues (plate diameter ≈ 25cm, slice of bread ≈ 30g, egg ≈ 50g shelled, etc.) and the user's description if any.
3. Look up typical macros per 100g for each item. Sum them.
4. Be REALISTIC, not over-cautious. A slice of bread has ~15g carbs — don't undershoot.
5. If you see bread, pasta, rice, potato, or any visible carb source, MAKE SURE carbs reflect it (12-20g per slice/100g).

Return ONLY a single JSON object with keys: name (2-5 words summarizing the meal), calories (int), protein (int grams), carbs (int grams), fat (int grams), confidence ("low"|"medium"|"high"), note (string, max 140 chars, list each item + your assumed weight, e.g. "3 eggs (150g), 1 bread slice (30g), 100g spinach, 1 tbsp butter").

No prose, no markdown, no code fences.
Example: {"name":"eggs spinach bread","calories":510,"protein":24,"carbs":22,"fat":36,"confidence":"medium","note":"3 eggs ~150g, 1 bread slice ~30g, 100g spinach, 1 tbsp butter, sprinkle of cheese"}`;

  const userText = [
    weightG ? `Total weight: ${weightG} g.` : null,
    userDescription ? `What's in it: ${userDescription}` : null,
    !userDescription && !weightG ? 'Estimate a typical serving from the photo.' : null,
  ].filter(Boolean).join('\n');

  const res = await fetch(AI_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.settings.anthropicApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 400,
      system: sys,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data } },
          { type: 'text', text: userText || ' ' }
        ]
      }]
    }),
  });
  if (!res.ok) {
    const t = await res.text().catch(() => '');
    throw new Error('Claude ' + res.status + ': ' + t.slice(0, 160));
  }
  const data2 = await res.json();
  let txt = (data2.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
  const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) txt = fence[1].trim();
  const first = txt.indexOf('{'); const last = txt.lastIndexOf('}');
  if (first >= 0 && last >= 0) txt = txt.slice(first, last + 1);
  return JSON.parse(txt);
}

// Add a food to the library. User types a name and/or attaches a photo; Claude
// fills per-100g macros which the user can edit before saving.
function openAddFoodModal() {
  let pickedDataUrl = null;
  let aiFilled = false;
  let r = { name: '', kcal100: 0, p100: 0, c100: 0, f100: 0, note: '' };

  const m = el('div');
  m.appendChild(el('h3', {}, '✨ Add food to library'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:10px;' },
    'Type the food name and/or attach a photo. Claude will fill the per-100g macros — you can tweak before saving.'));

  // Name
  m.appendChild(el('label', {}, 'Food name'));
  const nameInp = el('input', { type: 'text', placeholder: 'e.g. cooked white rice' });
  nameInp.oninput = () => { r.name = nameInp.value; };
  m.appendChild(nameInp);

  // Photo
  const fileInp = el('input', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display:none' });
  const photoBtn = el('button', { class: 'btn secondary', type: 'button', style: 'margin-top:10px;padding:8px 14px;font-size:13px;' }, '📷 Add photo (optional)');
  const photoStatus = el('span', { class: 'small muted', style: 'margin-left:8px;' }, '');
  photoBtn.onclick = () => fileInp.click();
  fileInp.onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      pickedDataUrl = await resizeImageToDataUrl(f, 900, 0.78);
      photoStatus.textContent = '✓ photo attached';
      photoStatus.style.color = 'var(--success)';
      photoBtn.textContent = '📷 Replace photo';
    } catch (err) {
      photoStatus.textContent = 'bad image';
      photoStatus.style.color = 'var(--danger)';
    }
  };
  m.appendChild(fileInp);
  m.appendChild(el('div', {}, [photoBtn, photoStatus]));

  // Status / loading
  const status = el('div', { style: 'min-height:24px;margin:10px 0 4px;' });
  m.appendChild(status);

  // Macros grid (editable, hidden until AI fills OR user opens manually)
  const macroBlock = el('div', { style: 'display:none;margin-top:6px;' });
  function buildMacroBlock() {
    macroBlock.innerHTML = '';
    macroBlock.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:6px;' }, 'Per 100g — edit if Claude got it slightly off.'));
    const grid = el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:8px;' });
    function fld(lbl, key, unit) {
      const wrap = el('div', { style: 'display:flex;flex-direction:column;gap:4px;' });
      wrap.appendChild(el('label', { style: 'margin:0;font-size:10px;' }, lbl));
      const inp = el('input', { type: 'number', step: '0.1', min: '0', value: String(r[key]) });
      inp.oninput = () => { r[key] = parseFloat(inp.value) || 0; };
      wrap.appendChild(inp);
      return wrap;
    }
    grid.appendChild(fld('Calories (kcal)', 'kcal100'));
    grid.appendChild(fld('Protein (g)', 'p100'));
    grid.appendChild(fld('Carbs (g)', 'c100'));
    grid.appendChild(fld('Fat (g)', 'f100'));
    macroBlock.appendChild(grid);
    if (r.note) {
      macroBlock.appendChild(el('div', { class: 'small muted', style: 'margin-top:6px;font-style:italic;' }, r.note));
    }
  }
  m.appendChild(macroBlock);

  // Buttons
  const analyzeBtn = el('button', {
    class: 'btn',
    style: 'margin-top:10px;',
    onclick: async () => {
      const nm = (r.name || nameInp.value || '').trim();
      if (!nm && !pickedDataUrl) { toast('Type a food name or attach a photo'); return; }
      analyzeBtn.disabled = true;
      analyzeBtn.style.opacity = '0.5';
      status.innerHTML = '<div class="ai-loading"><span class="spinner"></span><span>Asking Claude…</span></div>';
      try {
        const parsed = await analyzeFoodWithAI({ name: nm, imageDataUrl: pickedDataUrl });
        if (parsed && typeof parsed === 'object') {
          if (parsed.name && !nameInp.value) {
            nameInp.value = String(parsed.name).trim();
            r.name = nameInp.value;
          } else {
            r.name = nameInp.value || (parsed.name || '');
          }
          r.kcal100 = Math.max(0, Math.round(Number(parsed.kcal100) || 0));
          r.p100 = Math.max(0, parseFloat((Number(parsed.p100) || 0).toFixed(1)));
          r.c100 = Math.max(0, parseFloat((Number(parsed.c100) || 0).toFixed(1)));
          r.f100 = Math.max(0, parseFloat((Number(parsed.f100) || 0).toFixed(1)));
          r.note = String(parsed.note || '').trim();
          aiFilled = true;
          status.innerHTML = '<div class="small" style="color:var(--success);">✓ Filled from Claude — review and save.</div>';
          macroBlock.style.display = 'block';
          buildMacroBlock();
          saveBtn.style.display = 'block';
        } else {
          status.innerHTML = '<div class="small" style="color:var(--danger);">Couldn\'t parse macros.</div>';
        }
      } catch (err) {
        status.innerHTML = '<div class="small" style="color:var(--danger);">' + escapeHtml(String(err.message || 'Failed').slice(0, 200)) + '</div>';
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.style.opacity = '1';
      }
    }
  }, '✨ Analyze with Claude');
  m.appendChild(analyzeBtn);

  const manualBtn = el('button', {
    class: 'btn secondary',
    style: 'margin-top:8px;',
    onclick: () => {
      r.name = nameInp.value || r.name;
      macroBlock.style.display = 'block';
      buildMacroBlock();
      saveBtn.style.display = 'block';
      manualBtn.style.display = 'none';
    }
  }, 'Enter macros manually');
  m.appendChild(manualBtn);

  const saveBtn = el('button', {
    class: 'btn',
    style: 'margin-top:14px;display:none;',
    onclick: () => {
      const nm = (nameInp.value || r.name || '').trim();
      if (!nm) { toast('Add a food name'); return; }
      if (!r.kcal100 && !r.p100 && !r.c100 && !r.f100) {
        toast('Macros are all zero — fill at least one'); return;
      }
      addFood({
        name: nm,
        kcal100: r.kcal100, p100: r.p100, c100: r.c100, f100: r.f100,
        note: r.note
      });
      closeModal();
      render();
      toast('Added: ' + nm);
    }
  }, 'Save to library');
  m.appendChild(saveBtn);

  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
  setTimeout(() => nameInp.focus(), 80);
}

    inp.oninput = () => { r[key] = parseFloat(inp.value) || 0; };
    wrap.appendChild(inp);
    return wrap;
  }
  grid.appendChild(fld('Calories (kcal)', 'kcal100'));
  grid.appendChild(fld('Protein (g)', 'p100'));
  grid.appendChild(fld('Carbs (g)', 'c100'));
  grid.appendChild(fld('Fat (g)', 'f100'));
  m.appendChild(grid);

  m.appendChild(el('button', {
    class: 'btn',
    style: 'margin-top:14px;',
    onclick: () => {
      const nm = (r.name || '').trim();
      if (!nm) { toast('Add a name'); return; }
      updateFood(id, { name: nm, kcal100: Math.max(0, r.kcal100), p100: Math.max(0, r.p100), c100: Math.max(0, r.c100), f100: Math.max(0, r.f100) });

      render();
      toast('Saved');
    }
  }, 'Save'));
  m.appendChild(el('button', {
    class: 'btn danger',
    style: 'margin-top:8px;',

    }
  }, 'Delete from library'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));
  openModal(m);
}

function openAddMealModal() {
  let dataUrl = null;
  let weightG = null;
  let parsed = null; // result from Claude
  const m = el('div');
  m.appendChild(el('h3', {}, 'Add meal'));
  const form = el('div', { class: 'meal-modal-form' });

  const photoBox = el('div', { class: 'meal-photo-empty' }, '📷 Tap to add a photo (optional)');
  photoBox.style.cursor = 'pointer';
  const fileInp = el('input', { type: 'file', accept: 'image/*', style: 'display:none;' });
  photoBox.onclick = () => fileInp.click();
  fileInp.onchange = e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const W = 320, H = Math.round(W * img.height / img.width);
        const c = document.createElement('canvas');
        c.width = W; c.height = H;
        c.getContext('2d').drawImage(img, 0, 0, W, H);
        dataUrl = c.toDataURL('image/jpeg', 0.65);
        photoBox.outerHTML = '';
        const preview = el('img', { class: 'meal-photo-preview', src: dataUrl, style: 'cursor:pointer;', onclick: () => fileInp.click() });
        form.insertBefore(preview, form.firstChild);
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  };
  form.appendChild(photoBox);
  form.appendChild(fileInp);

  form.appendChild(el('label', {}, "What's in it? (optional, helps accuracy)"));
  const descInp = el('input', {
    type: 'text',
    placeholder: 'e.g. 3 eggs, 1 slice bread, 100g spinach, cheese'
  });
  form.appendChild(descInp);

  form.appendChild(el('label', {}, 'Total weight in grams (optional, only if you weighed it)'));
  const weightInp = el('input', { type: 'number', placeholder: 'e.g. 350', min: '0' });
  weightInp.oninput = () => { weightG = parseInt(weightInp.value, 10) || null; };
  form.appendChild(weightInp);

  const analyzeStatus = el('div', { class: 'small dim', style: 'min-height:18px;margin-top:8px;' });
  const analyzeBtn = el('button', {
    class: 'btn',
    style: 'margin-top:10px;width:100%;',
    onclick: async () => {
      if (!dataUrl) { toast('Add a photo first'); return; }
      if (!state.settings.anthropicApiKey) { openAIKeyModal(() => analyzeBtn.onclick && analyzeBtn.onclick()); return; }
      analyzeBtn.disabled = true;
      analyzeStatus.textContent = 'Analyzing with Claude…';
      try {
        const desc = (descInp.value || '').trim();
        parsed = await analyzeMealPhoto(dataUrl, weightG, desc || null);
        nameInp.value = parsed.name || '';
        kcalInp.value = parsed.calories || '';
        pInp.value = parsed.protein || '';
        cInp.value = parsed.carbs || '';
        fInp.value = parsed.fat || '';
        analyzeStatus.textContent = `${parsed.confidence || 'medium'} confidence · ${parsed.note || ''}`;
      } catch (err) {
        analyzeStatus.textContent = 'Failed: ' + (err.message || 'unknown').slice(0, 100);
      } finally {
        analyzeBtn.disabled = false;
      }
    }
  }, '✨ Analyze with Claude');
  form.appendChild(analyzeBtn);
  form.appendChild(analyzeStatus);

  form.appendChild(el('label', {}, 'Meal name'));
  const nameInp = el('input', { type: 'text', placeholder: 'e.g. Chicken rice broccoli' });
  form.appendChild(nameInp);

  form.appendChild(el('label', {}, 'Calories · Protein · Carbs · Fat'));
  const kcalInp = el('input', { type: 'number', placeholder: 'kcal', min: '0' });
  const pInp = el('input', { type: 'number', placeholder: 'P g', min: '0' });
  const cInp = el('input', { type: 'number', placeholder: 'C g', min: '0' });
  const fInp = el('input', { type: 'number', placeholder: 'F g', min: '0' });
  form.appendChild(el('div', { class: 'grid4' }, [kcalInp, pInp, cInp, fInp]));

  m.appendChild(form);

  m.appendChild(el('button', {
    class: 'btn',
    style: 'margin-top:14px;width:100%;',
    onclick: () => {
      const name = (nameInp.value || '').trim() || (parsed?.name || 'Meal');
      const calories = parseInt(kcalInp.value, 10) || 0;
      const protein  = parseInt(pInp.value, 10) || 0;
      const carbs    = parseInt(cInp.value, 10) || 0;
      const fat      = parseInt(fInp.value, 10) || 0;
      if (!calories && !protein && !carbs && !fat) { toast('Add macros or analyze the photo'); return; }
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const meal = {
        id: 'meal_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        date: today(), time, dataUrl: dataUrl || undefined, weightG: weightG || undefined,
        name, calories, protein, carbs, fat,
        source: parsed ? 'ai' : 'manual',
      };
      _ensureMeals();
      try {
        state.meals.push(meal);
        save();
        closeModal();
        render();
        toast('Meal added');
      } catch (err) {
        const i = state.meals.indexOf(meal);
        if (i >= 0) state.meals.splice(i, 1);
        toast('Storage full — delete old meals or photos');
      }
    }
  }, 'Save meal'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;width:100%;', onclick: closeModal }, 'Cancel'));
  openModal(m);
}

/* =========== COACH TAB =========== */
function _briefingFreshnessLabel(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const mins = Math.round(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
}

async function _generateBriefingInline(section, btn) {
  section.innerHTML = '<div class="ai-loading"><span class="spinner"></span><span>Generating today\'s briefing…</span></div>';
  if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
  try {
    await requestCoachBriefing();
    render(); // re-render to show the briefing
  } catch (err) {
    section.innerHTML = '<div class="small" style="color:var(--danger);padding:10px;">' + escapeHtml(String(err.message || 'Failed').slice(0, 200)) + '</div>';
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  }
}

function _renderBriefingBody(parent, j) {
  // Highlights first (top chips — quick scan)
  if (Array.isArray(j.highlights) && j.highlights.length) {
    const wrap = el('div', { class: 'brief-highlights', style: 'margin-bottom:10px;' });
    j.highlights.slice(0, 4).forEach(h => wrap.appendChild(el('span', { class: 'hchip' }, String(h).trim())));
    parent.appendChild(wrap);
  }
  // Strategy — the punch line
  if (j.strategy) {
    parent.appendChild(el('div', {
      class: 'b-body',
      style: 'padding:10px 12px;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:10px;margin-bottom:10px;font-weight:600;line-height:1.4;'
    }, j.strategy));
  }
  // Cautions
  if (Array.isArray(j.cautions) && j.cautions.length) {
    j.cautions.forEach(c => {
      const lvl = c.level === 'info' ? 'info' : 'warn';
      parent.appendChild(el('div', { class: 'brief-caution ' + lvl, style: 'margin-bottom:6px;' }, [el('span', {}, String(c.text || '').trim())]));
    });
  }
  // Exercise suggestions (no big section title — chips speak for themselves)
  if (Array.isArray(j.exerciseSuggestions) && j.exerciseSuggestions.length) {
    j.exerciseSuggestions.forEach(s => {
      const validVerdicts = ['bump','keep','reduce','swap','focus'];
      const verdict = validVerdicts.includes(s.verdict) ? s.verdict : 'keep';
      const row = el('div', { class: 'exsug-row', style: 'margin-top:6px;' }, [
        el('div', { class: 'exsug-name' }, String(s.name || '').trim()),
        el('span', { class: 'verdict-chip ' + verdict }, verdict),
        el('div', { class: 'exsug-advice' }, String(s.advice || '').trim())
      ]);
      parent.appendChild(row);
    });
  }
  // Progress line — single line, no subhead
  if (j.progress) {
    parent.appendChild(el('div', {
      class: 'brief-progress small dim',
      style: 'margin-top:10px;line-height:1.4;'
    }, j.progress));
  }
}

function renderCoach() {
  const v = $('view');

  // Proactive briefing block — leads the Coach tab.
  const briefingCard = el('div', { class: 'card briefing-section' });
  const head = el('div', { class: 'b-head' });
  head.appendChild(el('span', {}, '🤖 Today\'s briefing'));
  const headRight = el('div', { style: 'display:flex;align-items:center;gap:8px;' });
  briefingCard.appendChild(head);
  const body = el('div', {});
  briefingCard.appendChild(body);
  v.appendChild(briefingCard);

  const stale = shouldRefreshBriefing();
  const br = state.coachBriefing;

  if (br && br.json && !stale) {
    // Show cached briefing with refresh button
    const meta = el('span', { class: 'b-meta' }, _briefingFreshnessLabel(br.generatedAt));
    const refresh = el('button', {
      class: 'b-refresh',
      onclick: () => _generateBriefingInline(body, null)
    }, '↻ Refresh');
    headRight.appendChild(meta);
    headRight.appendChild(refresh);
    head.appendChild(headRight);
    _renderBriefingBody(body, br.json);
  } else if (br && br.json && stale) {
    // Have a previous briefing but it's stale — show it dimmed with a prominent refresh
    const refresh = el('button', {
      class: 'b-refresh',
      style: 'background:var(--accent);color:white;border-color:var(--accent);',
      onclick: () => _generateBriefingInline(body, null)
    }, '↻ Refresh');
    headRight.appendChild(el('span', { class: 'b-meta' }, 'new data since ' + _briefingFreshnessLabel(br.generatedAt)));
    headRight.appendChild(refresh);
    head.appendChild(headRight);
    body.style.opacity = '0.65';
    _renderBriefingBody(body, br.json);
  } else {
    // No briefing yet — first generation
    if (!state.settings.anthropicApiKey) {
      body.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:8px;' },
        'Set up your Anthropic API key in More → Settings to use the Coach briefing.'));
      body.appendChild(el('button', {
        class: 'btn secondary',
        onclick: openAIKeyModal
      }, 'Set up AI key'));
    } else {
      const genBtn = el('button', {
        class: 'btn',
        style: 'width:100%;background:linear-gradient(135deg, var(--accent), var(--accent-strong));',
        onclick: function() { _generateBriefingInline(body, this); }
      }, '✨ Generate today\'s briefing');
      body.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:10px;' },
        'Claude reads your last sessions, exercise history, feel logs, and today\'s plan, then writes a short briefing with cautions and per-exercise suggestions.'));
      body.appendChild(genBtn);
    }
  }

  // Session reviews — last 4 finished sessions, auto-summarised by Claude
  const lastSessions = getLastSessionsForReview(4);
  if (lastSessions.length) {
    const reviewsCard = el('div', { class: 'card briefing-section', style: 'margin-top:14px;' });
    const rHead = el('div', { class: 'b-head' });
    rHead.appendChild(el('span', {}, '📋 Last sessions review'));
    const rHeadRight = el('div', { style: 'display:flex;align-items:center;gap:8px;' });
    rHead.appendChild(rHeadRight);
    reviewsCard.appendChild(rHead);
    const rBody = el('div', {});
    reviewsCard.appendChild(rBody);
    v.appendChild(reviewsCard);

    const needsRefresh = shouldRefreshSessionReviews();
    const allCached = lastSessions.every(s => state.sessionReviews && state.sessionReviews[s.date] && state.sessionReviews[s.date].json);

    function generateReviews(targetBody) {
      targetBody.innerHTML = '<div class="ai-loading"><span class="spinner"></span><span>Writing reviews of your last sessions…</span></div>';
      requestSessionReviews()
        .then(() => render())
        .catch(err => {
          targetBody.innerHTML = '<div class="small" style="color:var(--danger);padding:10px;">' + escapeHtml(String(err.message || 'Failed').slice(0, 200)) + '</div>';
        });
    }

    if (!state.settings.anthropicApiKey) {
      rBody.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:8px;' },
        'Set up your Anthropic API key in More → Settings to use session reviews.'));
    } else if (!allCached) {
      // First-time generation
      const genBtn = el('button', {
        class: 'btn',
        style: 'width:100%;background:linear-gradient(135deg, var(--accent), var(--accent-strong));',
        onclick: () => generateReviews(rBody)
      }, '✨ Generate session reviews');
      rBody.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:10px;' },
        'Claude writes a short structured review for each of your last ' + lastSessions.length + ' finished sessions — what improved, what to watch, vs prior session of the same type.'));
      rBody.appendChild(genBtn);
    } else {
      // Render cached reviews + Refresh button if a new session is missing
      const refreshLbl = needsRefresh ? '↻ Refresh (new session)' : '↻ Refresh';
      const refreshBtn = el('button', {
        class: 'b-refresh',
        style: needsRefresh ? 'background:var(--accent);color:white;border-color:var(--accent);' : '',
        onclick: () => generateReviews(rBody)
      }, refreshLbl);
      rHeadRight.appendChild(refreshBtn);

      lastSessions.forEach(s => {
        const cached = state.sessionReviews[s.date];
        const j = cached && cached.json;
        if (!j) return;
        const card = el('div', { class: 'sr-card' });
        const head2 = el('div', { class: 'sr-head' }, [
          el('span', { class: 'sr-day' }, s.dayName),
          el('span', { class: 'sr-date' }, s.date + ' · ~' + s.mins + ' min')
        ]);
        card.appendChild(head2);
        if (j.summary) card.appendChild(el('div', { class: 'sr-summary' }, String(j.summary).trim()));
        if (Array.isArray(j.highlights) && j.highlights.length) {
          card.appendChild(el('div', { class: 'sr-section-lbl' }, 'Highlights'));
          const ul = el('ul', { class: 'sr-list' });
          j.highlights.forEach(h => ul.appendChild(el('li', {}, String(h).trim())));
          card.appendChild(ul);
        }
        if (Array.isArray(j.cautions) && j.cautions.length) {
          card.appendChild(el('div', { class: 'sr-section-lbl' }, 'Watch'));
          const ul = el('ul', { class: 'sr-list cautions' });
          j.cautions.forEach(c => ul.appendChild(el('li', {}, String(c).trim())));
          card.appendChild(ul);
        }
        if (j.progress) {
          card.appendChild(el('div', { class: 'sr-progress' }, String(j.progress).trim()));
        }
        rBody.appendChild(card);
      });
    }
  }

  // Open Coach chat — follow-up channel
  v.appendChild(el('button', {
    class: 'btn secondary',
    style: 'width:100%;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;',
    onclick: () => { coachChatHistory = []; openCoachModal(); }
  }, [
    el('span', { html: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>' }),
    el('span', {}, 'Open Coach chat for follow-up')
  ]));

  // Quick prompts
  const quick = el('div', { class: 'card' });
  quick.appendChild(el('div', { class: 'card-title', style: 'margin-bottom:10px;' }, 'Quick ask'));
  const prompts = [
    'Should I push today or back off?',
    'How am I doing this week?',
    'Plan tomorrow\'s session',
    'Am I eating enough protein?',
    'Any soreness concerns from my logs?',
  ];
  const pwrap = el('div', { style: 'display:flex;flex-direction:column;gap:6px;' });
  prompts.forEach(p => {
    pwrap.appendChild(el('button', {
      class: 'btn secondary',
      style: 'text-align:left;padding:10px 12px;font-size:13px;justify-content:flex-start;display:flex;align-items:center;gap:8px;',
      onclick: () => { coachChatHistory = []; openCoachModal(p); }
    }, [
      el('span', { style: 'opacity:0.6;font-size:14px;' }, '›'),
      el('span', {}, p)
    ]));
  });
  quick.appendChild(pwrap);
  v.appendChild(quick);

  // How I feel — quick log + recent
  const feel = el('div', { class: 'card', style: 'margin-top:14px;' });
  feel.appendChild(el('div', { class: 'card-title' }, 'How I feel'));
  feel.appendChild(el('button', {
    class: 'btn',
    style: 'width:100%;margin-top:6px;',
    onclick: openFeelLogModal
  }, 'Log how I feel today'));

  const logs = (Array.isArray(state.coachLogs) ? state.coachLogs : [])
    .filter(l => l.kind === 'feel')
    .slice(-7).reverse();
  if (logs.length) {
    const list = el('div', { style: 'margin-top:14px;' });
    logs.forEach(l => {
      const dateLine = (l.date || '') + (l.dayKey != null && DAYS[l.dayKey] ? ' · ' + DAYS[l.dayKey].name : '');
      const parts = [];
      if (l.energy != null) parts.push(`Energy ${l.energy}/5`);
      if (l.soreness != null) parts.push(`Soreness ${l.soreness}/5`);
      list.appendChild(el('div', {
        style: 'padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;'
      }, [
        el('div', { style: 'display:flex;justify-content:space-between;margin-bottom:2px;' }, [
          el('span', { class: 'small dim' }, dateLine),
          el('span', { style: 'font-weight:600;color:var(--text);' }, parts.join(' · ') || '—')
        ]),
        l.text ? el('div', { style: 'color:var(--text-muted);' }, l.text) : null
      ].filter(Boolean)));
    });
    feel.appendChild(list);
  } else {
    feel.appendChild(el('div', {
      class: 'small dim', style: 'margin-top:12px;text-align:center;'
    }, 'No logs yet — tap above to start.'));
  }
  v.appendChild(feel);
}

function buildMonthlyChart() {
  const months = getMonthlyStats();
  const now = new Date();
  const cols = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const k = d.toISOString().slice(0, 7);
    cols.push({ key: k, label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()], data: months[k] });
  }
  const totalAcross = cols.reduce((a, c) => a + (c.data?.sessions || 0), 0);
  if (totalAcross === 0) {
    const empty = el('div', { class: 'empty' }, 'Finish a workout to see monthly stats.');
    return empty;
  }
  const max = Math.max(1, ...cols.map(c => c.data?.sessions || 0));
  const grid = el('div', { class: 'month-grid' });
  cols.forEach((c, i) => {
    const sessions = c.data?.sessions || 0;
    const isCurrent = i === cols.length - 1;
    const col = el('div', { class: 'col' + (isCurrent ? ' current' : '') });
    col.appendChild(el('div', { class: 'v' }, String(sessions)));
    col.appendChild(el('div', { class: 'bar' }, [el('span', { style: `height:${sessions / max * 100}%` })]));
    col.appendChild(el('div', { class: 'lbl' }, c.label));
    grid.appendChild(col);
  });
  return grid;
}

function buildLineChart(data, unit) {
  const wrap = el('div', { class: 'chart' });
  const W = 320, H = 140;
  let points = data.slice(-30);
  if (!points.length) {
    wrap.appendChild(el('div', { class: 'empty' }, 'No data'));
    return wrap;
  }
  if (points.length === 1) points.unshift({ ...points[0] });
  const min = Math.min(...points.map(p => p.value)) - 0.5;
  const max = Math.max(...points.map(p => p.value)) + 0.5;
  const range = Math.max(0.5, max - min);
  const pad = 12;
  const xs = points.map((p, i) => pad + (i / (points.length - 1)) * (W - pad * 2));
  const ys = points.map(p => H - pad - ((p.value - min) / range) * (H - pad * 2));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[xs.length - 1].toFixed(1)},${H - pad} L${xs[0].toFixed(1)},${H - pad} Z`;
  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path class="area" d="${area}"/>
      <path class="line" d="${path}"/>
      ${xs.map((x, i) => `<circle class="dot" cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3"/>`).join('')}
      <text x="${pad}" y="${H - 2}" class="axis-text">${escapeHtml(points[0].date)}</text>
      <text x="${W - pad - 50}" y="${H - 2}" class="axis-text">${escapeHtml(points[points.length - 1].date)}</text>
    </svg>`;
  return wrap;
}

function openSessionsDiagnostic() {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Sessions data'));
  const entries = Object.entries(state.workouts).sort(([a], [b]) => a < b ? 1 : -1);
  let totalCount = 0, finishedCount = 0, hasSetsCount = 0;
  for (const [date, w] of entries) {
    totalCount++;
    if (w.finished) finishedCount++;
    let setsLogged = 0;
    for (const arr of Object.values(w.logs || {})) {
      for (const s of arr) if (s && s.d) setsLogged++;
    }
    if (setsLogged > 0) hasSetsCount++;
    const day = w.dayKey != null ? DAYS[w.dayKey] : null;
    const status = w.finished
      ? '✓ finished'
      : (setsLogged > 0 ? `${setsLogged} sets, no finish` : 'empty');
    const color = w.finished
      ? 'var(--success)'
      : (setsLogged > 0 ? 'var(--warn)' : 'var(--text-dim)');
    const row = el('div', { style: 'padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;' });
    row.appendChild(el('div', { style: 'display:flex;justify-content:space-between;gap:10px;' }, [
      el('span', {}, `${date} · ${day ? day.name : '?'}`),
      el('span', { style: `color:${color};font-weight:600;text-align:right;` }, status)
    ]));
    m.appendChild(row);
  }
  m.appendChild(el('div', {
    style: 'padding:14px 0 6px;font-size:13px;font-weight:700;color:var(--text);'
  }, `${totalCount} entries · ${finishedCount} finished · ${hasSetsCount} with logged sets`));
  m.appendChild(el('div', {
    class: 'small dim', style: 'margin-top:4px;'
  }, 'Counted by Progress: any entry with finished OR logged sets.'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
}

    m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:14px;' },
      'Today is already a rest day — nothing to skip.'));
    m.appendChild(el('button', { class: 'btn', onclick: closeModal }, 'Close'));
    openModal(m);
    return;
  }

  const todayKey = effectiveDayKey(t);
  const todayName = todayKey ? DAYS[todayKey].name : 'workout';
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' },
    `${todayName} moves to tomorrow. The rest of the week stays the same.`));

  // Logs warning
  const w = state.workouts[t];
  const hasLogs = w && w.logs && Object.values(w.logs).some(arr => arr.length);
  if (hasLogs) {
    m.appendChild(el('div', {
      class: 'small',
      style: 'margin-bottom:12px;padding:10px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#fca5a5;'
    }, '⚠ You\'ve already logged sets today. Skipping will discard them.'));
  }

  // Cascade preview — show only the changing rows (plus the skipped one).
  const previewBox = el('div', {
    style: 'margin-bottom:14px;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.7;'
  });
  let html = '';
  for (const row of cascade.slice(0, 7)) {
    const ddow = new Date(row.date + 'T00:00:00').getDay();
    const bName = row.before != null ? DAYS[row.before].name : 'Rest';
    const aName = row.after != null ? DAYS[row.after].name : 'Rest';
    const same = bName === aName;
    html += `<div style="display:flex;align-items:center;gap:8px;${same ? 'opacity:0.45;' : ''}">`
         + `<span style="min-width:30px;color:var(--text-muted);">${DAY_LABELS[ddow]}</span>`
         + `<span style="flex:1;color:var(--text-muted);">${bName}</span>`
         + `<span style="color:var(--text-muted);">→</span>`
         + `<span style="flex:1;text-align:right;color:${same ? 'var(--text-muted)' : 'var(--info)'};font-weight:${same ? '400' : '700'};">${aName}</span>`
         + `</div>`;
  }
  previewBox.innerHTML = html;
  m.appendChild(previewBox);

  m.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      planSkipCascade(t, true);
      closeModal();
      activeTab = 'home';
      activeDayKey = null;
      homeFocusExited = false;
      render();
      toast('Workout moved to tomorrow');
    }
  }, 'Skip · move to tomorrow'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));

  openModal(m);
}

const AI_MODEL = 'claude-haiku-4-5-20251001';
const AI_API_URL = 'https://api.anthropic.com/v1/messages';

// Parse a single natural-language task input via Claude.
// Returns { title, date | null, time | null, category | null } — or throws.
async function parseQuickTaskWithAI(input) {
  if (!state.settings.anthropicApiKey) throw new Error('No API key set');
  const todayStr = today();
  const now = new Date();
  const dowName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  const system = `You are a task parser. The user types a single task in natural language. Extract:
- title: the task title with all date/time/category words removed (keep verbs and the action)
- date: YYYY-MM-DD format. "today" = ${todayStr}. "tomorrow" = next day. Day names → next occurrence. If no date mentioned, return null.
- time: HH:MM in 24-hour format. "10 am" = "10:00", "10 pm" = "22:00", "16 pm" = "16:00", "noon" = "12:00", "midnight" = "00:00". If no time mentioned, return null.
- category: one of "work" | "personal" | "family" | "gym" | "health" | null

Today is ${dowName} ${todayStr}.

Return ONLY a single JSON object with these four keys. No prose, no markdown, no code fences. Example:
{"title":"call mom","date":"2026-05-05","time":"10:00","category":"family"}`;

  const out = await callAnthropic({
    system,
    messages: [{ role: 'user', content: input }],
    maxTokens: 200
  });

  let txt = (out || '').trim();
  // Strip ```json fences if present
  const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) txt = fence[1].trim();
  // Strip leading/trailing prose if model added any
  const first = txt.indexOf('{');
  const last = txt.lastIndexOf('}');
  if (first >= 0 && last >= 0) txt = txt.slice(first, last + 1);

  const obj = JSON.parse(txt);
  return {
    title: (obj.title || '').trim() || input,
    date: obj.date || null,
    time: obj.time || null,
    category: obj.category || null,
  };
}

async function callAnthropic({ system, messages, maxTokens }) {
  const key = state.settings.anthropicApiKey;
  if (!key) throw new Error('No API key set');
  const res = await fetch(AI_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: maxTokens || 2048,
      system,
      messages
    }),
  });
  if (res.status === 401 || res.status === 403) {
    const txt = await res.text().catch(() => '');
    throw new Error('Auth failed (' + res.status + '). Check your API key. ' + txt.slice(0, 120));
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('Claude API error ' + res.status + ': ' + txt.slice(0, 200));
  }
  const data = await res.json();
  // The /v1/messages response shape: { content: [ { type: 'text', text: '...' }, ... ] }
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  return txt;
}

function _stripJsonFence(s) {
  let t = String(s || '').trim();
  // Remove ```json ... ``` fences if model added them.
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '');
  // Find the array if there's leading prose.
  const start = t.indexOf('[');
  const end = t.lastIndexOf(']');
  if (start >= 0 && end > start) t = t.slice(start, end + 1);
  return t.trim();
}

// Same idea as _stripJsonFence but for a single JSON object {...}.
function _stripJsonObjectFence(s) {
  let t = String(s || '').trim();
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '');
  const start = t.indexOf('{');
  const end = t.lastIndexOf('}');
  if (start >= 0 && end > start) t = t.slice(start, end + 1);
  return t.trim();
}

// Send a JPEG/PNG dataURL image + a system prompt to Claude and parse a JSON object reply.
async function callAnthropicVision({ system, userText, imageDataUrl, maxTokens }) {
  const key = state.settings.anthropicApiKey;
  if (!key) throw new Error('No API key set');
  const dataPart = (imageDataUrl || '').split(',')[1];
  if (!dataPart) throw new Error('Bad image data');
  const mediaType = ((imageDataUrl || '').match(/^data:([^;]+);/) || [, 'image/jpeg'])[1];
  const res = await fetch(AI_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: maxTokens || 800,
      system,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: dataPart } },
          { type: 'text', text: userText || 'Analyze this image.' }
        ]
      }]
    }),
  });
  if (res.status === 401 || res.status === 403) {
    throw new Error('Auth failed (' + res.status + '). Check your API key.');
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('Claude API ' + res.status + ': ' + txt.slice(0, 180));
  }
  const data = await res.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
}
