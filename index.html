/* =========== LOCK GATE =========== */
const APP_PASSWORD = '8420';
const PIN_FLAG = 'mygym-unlocked-v1';

function _showLock() {
  document.body.classList.add('locked');
  const el = document.getElementById('lockScreen');
  if (el) {
    el.style.display = 'flex';
    setTimeout(() => document.getElementById('lockPin')?.focus(), 50);
  }
}

function _hideLock() {
  document.body.classList.remove('locked');
  const el = document.getElementById('lockScreen');
  if (el) el.style.display = 'none';
}

function _tryUnlock(pwd) {
  const errEl = document.getElementById('lockError');
  if (errEl) errEl.textContent = '';
  const p = (pwd || '').trim();
  if (!p) return;
  if (p === APP_PASSWORD) {
    localStorage.setItem(PIN_FLAG, 'yes');
    _hideLock();
  } else {
    if (errEl) errEl.textContent = 'Wrong password';
    const inp = document.getElementById('lockPin');
    if (inp) { inp.value = ''; inp.focus(); }
  }
}

function _initLockUI() {
  const btn = document.getElementById('lockUnlock');
  const pinEl = document.getElementById('lockPin');
  const submit = () => _tryUnlock(pinEl?.value || '');
  if (btn) btn.addEventListener('click', submit);
  if (pinEl) pinEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

if (localStorage.getItem(PIN_FLAG) !== 'yes') {
  _showLock();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _initLockUI);
  } else {
    _initLockUI();
  }
}

let cloudPushTimer = null;
let cloudSyncStatus = 'idle';      // 'idle' | 'syncing' | 'synced' | 'error' | 'auth-error'
let cloudLastError = '';

function cloudHeaders() {
  return {
    'Authorization': 'Bearer ' + state.settings.cloudGistToken,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

async function cloudCreateOrUpdate() {
  const token = state.settings.cloudGistToken;
  if (!token || cloudSyncStatus === 'auth-error') return { ok: false, reason: 'no-token' };
  cloudSyncStatus = 'syncing';
  refreshCloudStatusUI();

  // Don't sync the token itself — strip from payload to avoid an attacker reading the gist
  // ever finding it (and to keep the gist content portable across accounts).
  // Strip device-only / sensitive fields from the cloud payload.
  const payload = {
    ...state,
    customExerciseImages: {},
    settings: { ...state.settings, cloudGistToken: '', cloudGistId: '', cloudLastSyncAt: 0, anthropicApiKey: '' }
  };
  const body = JSON.stringify({
    description: CLOUD_GIST_DESC,
    public: false,
    files: { [CLOUD_GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } }
  });
  const id = state.settings.cloudGistId;
  const url = id ? ('https://api.github.com/gists/' + id) : 'https://api.github.com/gists';
  const method = id ? 'PATCH' : 'POST';

  try {
    const res = await fetch(url, { method, headers: cloudHeaders(), body });
    if (res.status === 401 || res.status === 403) {
      cloudSyncStatus = 'auth-error';
      cloudLastError = 'Invalid token (' + res.status + ')';
      refreshCloudStatusUI();
      return { ok: false, reason: 'auth' };
    }
    if (!res.ok) {
      cloudSyncStatus = 'error';
      cloudLastError = 'HTTP ' + res.status;
      refreshCloudStatusUI();
      return { ok: false, reason: 'http-' + res.status };
    }
    const data = await res.json();
    if (!id && data.id) state.settings.cloudGistId = data.id;
    state.settings.cloudLastSyncAt = Date.now();
    save({ skipCloud: true });
    cloudSyncStatus = 'synced';
    cloudLastError = '';
    refreshCloudStatusUI();
    return { ok: true, id: data.id };
  } catch (e) {
    cloudSyncStatus = 'error';
    cloudLastError = e.message || 'network';
    refreshCloudStatusUI();
    return { ok: false, reason: e.message };
  }
}

async function cloudPull() {
  const token = state.settings.cloudGistToken;
  const id = state.settings.cloudGistId;
  if (!token || !id) return { ok: false, reason: 'not-configured' };
  cloudSyncStatus = 'syncing';
  refreshCloudStatusUI();
  try {
    const res = await fetch('https://api.github.com/gists/' + id, { headers: cloudHeaders() });
    if (res.status === 401 || res.status === 403) {
      cloudSyncStatus = 'auth-error'; cloudLastError = 'Invalid token';
      refreshCloudStatusUI();
      return { ok: false, reason: 'auth' };
    }
    if (!res.ok) {
      cloudSyncStatus = 'error'; cloudLastError = 'HTTP ' + res.status;
      refreshCloudStatusUI();
      return { ok: false, reason: 'http-' + res.status };
    }
    const data = await res.json();
    const fileEntry = data.files && data.files[CLOUD_GIST_FILENAME];
    let content = fileEntry && fileEntry.content;
    if (!content) {
      cloudSyncStatus = 'error'; cloudLastError = 'No backup file in gist';
      refreshCloudStatusUI();
      return { ok: false, reason: 'no-content' };
    }
    // GitHub truncates inline gist content at ~1 MB. Fetch raw_url to get the full file.
    if (fileEntry.truncated && fileEntry.raw_url) {
      try {
        const rawRes = await fetch(fileEntry.raw_url, { headers: cloudHeaders() });
        if (rawRes.ok) {
          content = await rawRes.text();
        } else {
          cloudSyncStatus = 'error';
          cloudLastError = 'Could not fetch full backup (raw ' + rawRes.status + ')';
          refreshCloudStatusUI();
          return { ok: false, reason: 'raw-' + rawRes.status };
        }
      } catch (e) {
        cloudSyncStatus = 'error';
        cloudLastError = 'Raw fetch failed: ' + (e.message || 'unknown');
        refreshCloudStatusUI();
        return { ok: false, reason: 'raw-network' };
      }
    }
    let remote;
    try {
      remote = JSON.parse(content);
    } catch (e) {
      cloudSyncStatus = 'error';
      cloudLastError = 'Backup content corrupted (size: ' + Math.round(content.length / 1024) + 'KB)';
      refreshCloudStatusUI();
      return { ok: false, reason: 'parse-error', error: e.message };
    }
    // Preserve cloud creds (token + gist id stay device-local)
    const keepToken = state.settings.cloudGistToken;
    const keepId = state.settings.cloudGistId;
    state = remote;
    if (!state.settings) state.settings = {};
    state.settings.cloudGistToken = keepToken;
    state.settings.cloudGistId = keepId;
    state.settings.cloudLastSyncAt = Date.now();
    // Backfill any newer default keys
    for (const k of Object.keys(defaultState)) if (state[k] === undefined) state[k] = defaultState[k];
    for (const k of Object.keys(defaultState.settings)) if (state.settings[k] === undefined) state.settings[k] = defaultState.settings[k];
    save({ skipCloud: true });
    cloudSyncStatus = 'synced';
    cloudLastError = '';
    refreshCloudStatusUI();
    return { ok: true };
  } catch (e) {
    cloudSyncStatus = 'error'; cloudLastError = e.message || 'network';
    refreshCloudStatusUI();
    return { ok: false, reason: e.message };
  }
}

async function cloudFindExisting() {
  const token = state.settings.cloudGistToken;
  if (!token) return null;
  try {
    const res = await fetch('https://api.github.com/gists?per_page=100', { headers: cloudHeaders() });
    if (!res.ok) return null;
    const list = await res.json();
    return list.find(g => g.description === CLOUD_GIST_DESC && g.files && g.files[CLOUD_GIST_FILENAME]) || null;
  } catch (e) { return null; }
}

async function cloudConnect(token) {
  state.settings.cloudGistToken = token.trim();
  state.settings.cloudGistId = '';
  cloudSyncStatus = 'syncing';
  cloudLastError = '';
  save({ skipCloud: true });
  refreshCloudStatusUI();
  const existing = await cloudFindExisting();
  if (existing) {
    state.settings.cloudGistId = existing.id;
    save({ skipCloud: true });
    return { ok: true, foundExisting: true, updatedAt: existing.updated_at };
  }
  // No existing — push current state as the initial backup
  const r = await cloudCreateOrUpdate();
  return { ok: r.ok, foundExisting: false, ...r };
}

async function cloudDeleteGist() {
  const token = state.settings.cloudGistToken;
  const id = state.settings.cloudGistId;
  if (!token || !id) return { ok: false, reason: 'not-configured' };
  try {
    const res = await fetch('https://api.github.com/gists/' + id, {
      method: 'DELETE',
      headers: cloudHeaders(),
    });
    if (res.status === 204 || res.ok) {
      cloudDisconnect();
      return { ok: true };
    }
    if (res.status === 401 || res.status === 403) return { ok: false, reason: 'auth' };
    if (res.status === 404) {
      cloudDisconnect();
      return { ok: true, alreadyGone: true };
    }
    const t = await res.text().catch(() => '');
    return { ok: false, reason: 'http-' + res.status, body: t.slice(0, 120) };
  } catch (e) {
    return { ok: false, reason: 'network', error: e.message };
  }
}

function cloudDisconnect() {
  state.settings.cloudGistToken = '';
  state.settings.cloudGistId = '';
  state.settings.cloudLastSyncAt = 0;
  cloudSyncStatus = 'idle';
  cloudLastError = '';
  if (cloudPushTimer) { clearTimeout(cloudPushTimer); cloudPushTimer = null; }
  save({ skipCloud: true });
  refreshCloudStatusUI();
}

function scheduleCloudPush() {
  if (!state || !state.settings || !state.settings.cloudGistToken) return;
  if (cloudSyncStatus === 'auth-error') return; // stop auto-retry on bad token
  if (cloudPushTimer) clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(() => { cloudPushTimer = null; cloudCreateOrUpdate(); }, 3000);
}

function refreshCloudStatusUI() {
  // Re-render More tab if visible so the status row updates. Cheap because the More tab is small.
  if (typeof activeTab !== 'undefined' && activeTab === 'more') render();
}

function fmtCloudWhen(ts) {
  if (!ts) return 'never';
  const ms = Date.now() - ts;
  if (ms < 60000) return 'just now';
  if (ms < 3600000) return Math.floor(ms / 60000) + 'm ago';
  if (ms < 86400000) return Math.floor(ms / 3600000) + 'h ago';
  return Math.floor(ms / 86400000) + 'd ago';
}

/* Idempotent seed for past sessions through Apr 27, 2026.
   Skips dates that already exist; runs every load to repair missing data. */
function seedPastSessions() {
  const seed = [
    // Week 1 (Apr 7-13): 3 sessions, low rep range
    { date: '2026-04-07', dayKey: 2, repFloor: 'min' },
    { date: '2026-04-11', dayKey: 6, repFloor: 'min' },
    { date: '2026-04-13', dayKey: 1, repFloor: 'min' },
    // Week 2 (Apr 14-20): 3 sessions
    { date: '2026-04-14', dayKey: 2, repFloor: 'min' },
    { date: '2026-04-16', dayKey: 4, repFloor: 'min' },
    { date: '2026-04-18', dayKey: 6, repFloor: 'min' },
    // Week 3 (Apr 20-26): 4 sessions, target reps
    { date: '2026-04-20', dayKey: 1, repFloor: 'target' },
    { date: '2026-04-21', dayKey: 2, repFloor: 'target' },
    { date: '2026-04-23', dayKey: 4, repFloor: 'target' },
    { date: '2026-04-25', dayKey: 6, repFloor: 'target' },
    // Week 4 (Apr 27): Push session restored after device wipe — defaults to mid-range target reps
    { date: '2026-04-27', dayKey: 1, repFloor: 'target' }
  ];
  let added = 0;
  for (const s of seed) {
    if (state.workouts[s.date]) continue;
    const day = DAYS[s.dayKey]; if (!day) continue;
    const logs = {};
    for (const ex of day.exercises) {
      const targets = getSetTargets(ex);
      const weight = ex.bw ? '' : String(ex.weight);
      logs[ex.id] = [];
      for (let i = 0; i < ex.sets; i++) {
        const r = targets[i] ?? targets[targets.length - 1] ?? ex.repsMin;
        logs[ex.id].push({ w: weight, r: String(r), d: true });
      }
    }
    const start = new Date(s.date + 'T15:00:00').getTime();
    state.workouts[s.date] = {
      dayKey: s.dayKey, logs, notes: {}, swaps: {},
      started: start, finished: start + 60 * 60 * 1000,
      timers: { warmup: 5 * 60 * 1000, workout: 55 * 60 * 1000, cooldown: 0 },
      activePhase: null, phaseStart: null
    };
    added++;
  }
  state.settings.seededPastSessions = true;
  if (added > 0) {
    save();
    setTimeout(() => toast(`Restored ${added} past sessions`), 200);
  }
}
seedPastSessions();

// One-time migration: pad seeded 2-set logs to 3 sets after we made all exercises 3-set
function migrateThreeSets() {
  if (state.settings.migratedThreeSets) return;
  for (const [date, w] of Object.entries(state.workouts)) {
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      if (!w.logs[ex.id]) continue;
      while (w.logs[ex.id].length < ex.sets) {
        const last = w.logs[ex.id][w.logs[ex.id].length - 1];
        if (last && last.d) {
          w.logs[ex.id].push({ w: last.w, r: last.r, d: true });
        } else break;
      }
    }
  }
  state.settings.migratedThreeSets = true;
  save();
}
migrateThreeSets();

// One-time migration: cup size changed from ~250ml to ~500ml. Halve the daily target so
// the total volume stays the same (8 cups × 250ml = 2L → 4 bottles × 500ml = 2L).
function migrateWaterTo500ml() {
  if (state.settings.migratedWaterTo500ml) return;
  const cur = state.settings.waterTarget || 8;
  state.settings.waterTarget = Math.max(2, Math.round(cur / 2));
  state.settings.migratedWaterTo500ml = true;
  save({ skipCloud: true });
}
migrateWaterTo500ml();

// One-time migration: rewrite all logged reps to the 12·10·10 pyramid (skips timed exercises).
function migrateRepsToPyramid() {
  if (state.settings.migratedRepsToPyramid) return;
  for (const [date, w] of Object.entries(state.workouts)) {
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      if (ex.timed) continue;
      if (!w.logs[ex.id]) continue;
      const targets = getSetTargets(ex);
      for (let i = 0; i < w.logs[ex.id].length; i++) {
        const t = targets[i] ?? targets[targets.length - 1] ?? ex.repsMin;
        w.logs[ex.id][i].r = String(t);
      }
    }
  }
  state.settings.migratedRepsToPyramid = true;
  save();
}
migrateRepsToPyramid();

// Splice user-added custom exercises into each DAYS[k].exercises so that all the
// existing iteration code automatically picks them up (workoutProgress, renderToday,
// renderHomeFocus, swap-finder, plan tab, etc.). Call this after state loads and
// after any change to state.customDayExercises.
function refreshDayExercises() {
  Object.keys(DAYS).forEach(k => {
    if (!DAYS[k]._baseExercises) DAYS[k]._baseExercises = DAYS[k].exercises.slice();
    const customs = (state.customDayExercises && state.customDayExercises[k]) ? state.customDayExercises[k] : [];
    DAYS[k].exercises = [...DAYS[k]._baseExercises, ...customs];
  });
}
refreshDayExercises();

/* =========== HELPERS =========== */
function $(id) { return document.getElementById(id); }
function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'style') e.style.cssText = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of [].concat(children)) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function today() { return new Date().toISOString().slice(0,10); }
function todayDow() { return new Date().getDay(); }
function diffDays(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(d) {
  const dt = new Date(d);
  return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]} ${dt.getDate()}`;
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function currentWeek() { return Math.floor(diffDays(PROGRAM_START, today()) / 7) + 1; }
function currentPhase() {
  const t = today();
  for (const p of PHASES) if (t >= p.start && t <= p.end) return p;
  if (t < PHASES[0].start) return PHASES[0];
  if (t < PHASES[1].start) return PHASES[0];
  if (t < PHASES[2].start) return PHASES[1];
  if (t < PHASES[3].start) return PHASES[2];
  return PHASES[3];
}
function nextPhase() {
  const cur = currentPhase();
  return PHASES[Math.min(cur.num, PHASES.length - 1)] === cur && cur.num < PHASES.length
    ? PHASES[cur.num]
    : null;
}
function daysToNextPhase() {
  const np = nextPhase();
  if (!np) return null;
  return diffDays(today(), np.start);
}

function ensureWorkout(date, dayKey) {
  if (!state.workouts[date]) {
    state.workouts[date] = {
      dayKey, logs: {}, notes: {}, swaps: {},
      started: null, finished: null,
      timers: { warmup: 0, workout: 0, cooldown: 0 },
      activePhase: null, phaseStart: null
    };
  } else {
    if (dayKey != null && state.workouts[date].dayKey !== dayKey) state.workouts[date].dayKey = dayKey;
    if (!state.workouts[date].timers) state.workouts[date].timers = { warmup: 0, workout: 0, cooldown: 0 };
    if (!state.workouts[date].notes) state.workouts[date].notes = {};
    if (!state.workouts[date].swaps) state.workouts[date].swaps = {};
  }
  return state.workouts[date];
}
function resetTodayWorkout() {
  const date = today();
  const dayKey = activeDayKey ?? effectiveDayKey(date);
  if (!confirm("Reset today's workout? All sets, timers, and progress for today will be cleared. Other days are not affected.")) return;
  delete state.workouts[date];
  ensureWorkout(date, dayKey);
  expandedExId = null;
  editingSetKey = null;
  save();
  render();
  toast('Today reset');
}
function getSetLogs(date, dayKey, ex) {
  const w = ensureWorkout(date, dayKey);
  if (!w.logs[ex.id]) w.logs[ex.id] = Array(ex.sets).fill(0).map(() => ({ w: '', r: '', d: false }));
  while (w.logs[ex.id].length < ex.sets) w.logs[ex.id].push({ w: '', r: '', d: false });
  return w.logs[ex.id];
}

function getLastSession(exId, beforeDate) {
  const dates = Object.keys(state.workouts)
    .filter(d => d < beforeDate && (state.workouts[d].logs[exId] || []).some(s => s.d))
    .sort()
    .reverse();
  if (!dates.length) return null;
  const date = dates[0];
  const sets = (state.workouts[date].logs[exId] || []).filter(s => s.d);
  return { date, sets };
}

function epley(w, r) {
  w = parseFloat(w) || 0; r = parseFloat(r) || 0;
  if (!w || !r) return 0;
  return w * (1 + r / 30);
}

function getPR(exId, exceptDate) {
  let best = null;
  for (const [date, w] of Object.entries(state.workouts)) {
    if (date === exceptDate) continue;
    const logs = w.logs[exId] || [];
    for (const s of logs) {
      if (!s.d) continue;
      const e = epley(s.w, s.r);
      if (e <= 0) continue;
      if (!best || e > best.e) best = { date, w: parseFloat(s.w), r: parseFloat(s.r), e };
    }
  }
  return best;
}

function isCurrentSetPR(exId, date, currentSet) {
  if (!currentSet.d) return false;
  const e = epley(currentSet.w, currentSet.r);
  if (e <= 0) return false;
  const pr = getPR(exId, date);
  return !pr || e > pr.e;
}

// Per-set rep targets — default pyramid 12·10·8 for all reps-based exercises.
// Timed (planks) keeps its own range in seconds.
function getSetTargets(ex) {
  if (ex.timed) {
    const arr = []; for (let i = 0; i < ex.sets; i++) arr.push(ex.repsMin);
    return arr;
  }
  const base = [12, 10, 10];
  const arr = [];
  for (let i = 0; i < ex.sets; i++) arr.push(base[Math.min(i, base.length - 1)]);
  return arr;
}

function workoutProgress(date, dayKey) {
  const day = DAYS[dayKey]; if (!day) return { done: 0, total: 0 };
  let total = 0, done = 0;
  for (const ex of day.exercises) {
    total += ex.sets;
    const logs = state.workouts[date]?.logs?.[ex.id] || [];
    done += logs.filter(s => s.d).length;
  }
  return { done, total };
}

function sessionsInWeek(monday) {
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    if (isRealSession(state.workouts[k])) count++;
  }
  return count;
}
function getStreak() {
  // count consecutive completed weeks (4+ sessions) going back from this week
  // we don't include this week unless it's already complete
  const TARGET = 4;
  const t = new Date(); const dow = t.getDay() || 7;
  let monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  // start from previous monday
  let streak = 0;
  // also count current week if already at target
  if (sessionsInWeek(monday) >= TARGET) streak++;
  monday.setDate(monday.getDate() - 7);
  while (monday >= new Date(PROGRAM_START)) {
    if (sessionsInWeek(monday) >= TARGET) {
      streak++;
      monday.setDate(monday.getDate() - 7);
    } else break;
  }
  return streak;
}

// A "real" session = explicitly finished OR has at least one logged set.
// This makes counts include sessions where the user logged sets but
// never tapped "Finish workout".
function isRealSession(w) {
  if (!w) return false;
  if (w.finished) return true;
  if (!w.logs) return false;
  for (const arr of Object.values(w.logs)) {
    if (arr && arr.some(s => s && s.d)) return true;
  }
  return false;
}

function sessionsThisWeek() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  let count = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    if (isRealSession(state.workouts[k])) count++;
  }
  return count;
}
function totalSessions() {
  return Object.values(state.workouts).filter(isRealSession).length;
}

function getWeeklyVolume() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  const result = {}; for (const m of MUSCLES) result[m] = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const w = state.workouts[k]; if (!isRealSession(w)) continue;
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      const done = (w.logs[ex.id] || []).filter(s => s.d).length;
      for (const m of (ex.muscles || [])) result[m] = (result[m] || 0) + done;
    }
  }
  return result;
}

function getMonthlyStats() {
  const months = {};
  for (const [date, w] of Object.entries(state.workouts)) {
    if (!isRealSession(w)) continue;
    const m = date.slice(0, 7);
    if (!months[m]) months[m] = { sessions: 0, sets: 0, volume: 0 };
    months[m].sessions++;
    const day = DAYS[w.dayKey]; if (!day) continue;
    for (const ex of day.exercises) {
      const logs = (w.logs[ex.id] || []).filter(s => s.d);
      months[m].sets += logs.length;
      for (const s of logs) months[m].volume += (parseFloat(s.w) || 0) * (parseFloat(s.r) || 0);
    }
  }
  return months;
}

function getStrengthHistory(exId) {
  const out = [];
  for (const [date, w] of Object.entries(state.workouts)) {
    const logs = (w.logs[exId] || []).filter(s => s.d);
    if (!logs.length) continue;
    let best = { w: 0, r: 0, e: 0 };
    for (const s of logs) {
      const e = epley(s.w, s.r);
      if (e > best.e) best = { w: parseFloat(s.w), r: parseFloat(s.r), e };
    }
    out.push({ date, ...best });
  }
  return out.sort((a, b) => a.date.localeCompare(b.date));
}

function lastBodyWeight() { return state.bodyWeight[state.bodyWeight.length - 1] || null; }
function lastMeasurement() { return state.measurements[state.measurements.length - 1] || null; }
function prevMeasurement() { return state.measurements.length > 1 ? state.measurements[state.measurements.length - 2] : null; }
function lastSleep() { return state.sleep[state.sleep.length - 1] || null; }
function todaysSleep() { return state.sleep.find(s => s.date === today()); }
function todaysWater() { return state.water[today()] || 0; }
function todaysBag() { return state.bag[today()] || []; }
function bagToggle(id) {
  const k = today();
  const cur = new Set(state.bag[k] || []);
  if (cur.has(id)) cur.delete(id); else cur.add(id);
  state.bag[k] = [...cur];

/* =========== FLEXIBLE PLAN: skip with cascade =========== */
// Local-time YYYY-MM-DD formatter (avoids the UTC/toISOString() timezone bug).
function dateToLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function nextDateStr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return dateToLocal(d);
}

// The session a date should run.
// Priority: explicit skip → override (set when a skip cascades) → natural day-of-week mapping.
// Returns dayKey (1, 2, 4, 6) or null for rest.
function effectiveDayKey(dateStr) {
  if (state.plan?.skippedDates?.includes(dateStr)) return null;
  if (state.plan?.overrides && state.plan.overrides[dateStr] != null) return state.plan.overrides[dateStr];
  const dow = new Date(dateStr + 'T00:00:00').getDay();
  return DAYS[dow] ? dow : null;
}

// Skip a date and cascade the displaced session forward day-by-day until it lands on a rest slot.
// Example: today is Tue (Pull). Skip → Tue=rest, Wed (was rest) absorbs Pull. Thu=Legs unchanged.
// Example: skip Mon (Push) → Tue (was Pull) becomes Push, Wed (was rest) absorbs Pull, Thu=Legs unchanged.
// Returns a preview {date, before, after}[] showing what each affected day will become.
function planSkipCascade(skipDate, commit) {
  if (!state.plan) state.plan = { skippedDates: [], overrides: {} };

  // Snapshot what each upcoming day will be BEFORE the skip is applied.
  const days = [];
  let d = skipDate;
  for (let i = 0; i < 14; i++) {
    days.push({ date: d, before: effectiveDayKey(d) });
    d = nextDateStr(d);
  }
  const pendingSession = days[0].before;
  if (pendingSession == null) return null; // nothing to skip — already rest

  // Compute the cascaded "after" state without mutating state yet.
  const newSkippedDates = (state.plan.skippedDates || []).slice();
  const newOverrides = { ...(state.plan.overrides || {}) };
  if (!newSkippedDates.includes(skipDate)) newSkippedDates.push(skipDate);
  delete newOverrides[skipDate];

  let pending = pendingSession;
  for (let i = 1; i < days.length && pending != null; i++) {
    const dow = new Date(days[i].date + 'T00:00:00').getDay();
    const naturalAtThisDay = DAYS[dow] ? dow : null;
    const currentlyPlanned = days[i].before; // before the cascade

    if (currentlyPlanned == null) {
      // This was a rest day — absorbs the pending session, cascade ends.
      newOverrides[days[i].date] = pending;
      pending = null;
    } else {
      // This day already has a session — pending displaces it; old session cascades.
      newOverrides[days[i].date] = pending;
      pending = currentlyPlanned;
    }
  }

  // Build "after" view by applying our staged changes virtually.
  for (const row of days) {
    const sk = newSkippedDates.includes(row.date);
    const ov = newOverrides[row.date];
    if (sk) row.after = null;
    else if (ov != null) row.after = ov;
    else {
      const dow = new Date(row.date + 'T00:00:00').getDay();
      row.after = DAYS[dow] ? dow : null;
    }
  }

  if (commit) {
    state.plan.skippedDates = newSkippedDates;
    state.plan.overrides = newOverrides;
    delete state.workouts[skipDate];
    save();
  }
  return days;
}

// Return the next N dates' planned sessions, starting from `fromDate` inclusive.
function upcomingSessions(fromDate, n) {
  const out = [];
  let d = fromDate;
  for (let i = 0; i < n; i++) {
    out.push({ date: d, dayKey: effectiveDayKey(d) });
    d = nextDateStr(d);
  }
  return out;
}

function resetPlanOverrides() {
  if (!state.plan) state.plan = { skippedDates: [], overrides: {} };
  state.plan.skippedDates = [];
  state.plan.overrides = {};
  save();
}

/* =========== TODAY TASKS (daily reminder, AI paste-able) =========== */
// Two kinds of task:
//   • One-off: shown until tapped, then deleted forever.
//   • Recurring: defined once, auto-appears each matching day. Tapping marks
//     today's instance as "dismissed" — it disappears from today's list but
//     comes back on the next matching day.
// Stored under state.mastalifeTasks (key kept for backwards compatibility).
function ensureTasksArr() {
  if (!Array.isArray(state.mastalifeTasks)) state.mastalifeTasks = [];
}
function newTaskId() {
  return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

// Recurrence DSL evaluator. Supported rules:
//   'daily'         every day
//   'weekdays'      Mon–Fri
//   'weekly:1,3'    listed dow numbers (0=Sun ... 6=Sat)
//   'monthly:15'    every month on the Nth day
function matchesRepeat(rule, dateStr) {
  if (!rule) return false;
  const d = new Date(dateStr + 'T00:00:00');
  if (rule === 'daily') return true;
  if (rule === 'weekdays') { const dow = d.getDay(); return dow >= 1 && dow <= 5; }
  if (rule.startsWith('weekly:')) {
    const days = rule.slice(7).split(',').map(s => parseInt(s, 10)).filter(n => !isNaN(n));
    return days.includes(d.getDay());
  }
  if (rule.startsWith('monthly:')) {
    const dom = parseInt(rule.slice(8), 10);
    return !isNaN(dom) && d.getDate() === dom;
  }
  return false;
}

function describeRepeat(rule) {
  if (!rule) return '';
  if (rule === 'daily') return 'every day';
  if (rule === 'weekdays') return 'weekdays';
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if (rule.startsWith('weekly:')) {
    const days = rule.slice(7).split(',').map(s => parseInt(s, 10)).filter(n => !isNaN(n)).sort();
    return 'every ' + days.map(d => DOW[d]).join('/');
  }
  if (rule.startsWith('monthly:')) return 'monthly on ' + rule.slice(8);
  return rule;
}

function addTask({ title, time, category, repeat, date }) {
  ensureTasksArr();
  const t = (title || '').trim();
  if (!t) return null;
  const okRepeat = (typeof repeat === 'string' && /^(daily|weekdays|weekly:[\d,]+|monthly:\d+)$/.test(repeat)) ? repeat : null;
  // Date is only kept for one-off tasks. Recurring rules drive their own scheduling.
  const okDate = (!okRepeat && typeof date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(date)) ? date : null;
  const task = {
    id: newTaskId(),
    title: t,
    time: (time && /^\d{1,2}:\d{2}$/.test(time)) ? time.padStart(5, '0') : null,
    category: ['work','personal','family','gym','health'].includes(category) ? category : null,
    repeat: okRepeat,
    date: okDate,
    dismissedDates: [],
    createdAt: Date.now()
  };
  state.mastalifeTasks.push(task);
  save();
  return task;
}

// Tap-to-clear: one-off → delete; recurring → dismiss for today only.
function dismissTask(id) {
  ensureTasksArr();
  const t = state.mastalifeTasks.find(x => x.id === id);
  if (!t) return;
  if (t.repeat) {
    if (!Array.isArray(t.dismissedDates)) t.dismissedDates = [];
    const td = today();
    if (!t.dismissedDates.includes(td)) t.dismissedDates.push(td);
  } else {
    state.mastalifeTasks = state.mastalifeTasks.filter(x => x.id !== id);
  }
  save();
}

// Hard delete (used by the rare "remove this recurring task entirely" case if needed later).
function deleteTask(id) {
  ensureTasksArr();
  state.mastalifeTasks = state.mastalifeTasks.filter(t => t.id !== id);
  save();
}

// Dedupe tasks by (title, time, repeat). Returns the number of duplicates removed.
function dedupeTasks() {
  ensureTasksArr();
  const seen = new Set();
  const out = [];
  for (const t of state.mastalifeTasks) {
    const key = (t.title || '').toLowerCase().trim() + '|' + (t.time || '') + '|' + (t.repeat || '');
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(t);
  }
  const removed = state.mastalifeTasks.length - out.length;
  state.mastalifeTasks = out;
  save();
  return removed;
}

// Count duplicate tasks (same key as dedupeTasks). Used to gate the Dedupe button.
function countDuplicateTasks() {
  ensureTasksArr();
  const seen = new Set();
  let dup = 0;
  for (const t of state.mastalifeTasks) {
    const key = (t.title || '').toLowerCase().trim() + '|' + (t.time || '') + '|' + (t.repeat || '');
    if (seen.has(key)) dup++;
    else seen.add(key);
  }
  return dup;
}

function getTasks() {
  ensureTasksArr();
  const td = today();
  const out = [];
  for (const t of state.mastalifeTasks) {
    if (t.repeat) {
      if (!matchesRepeat(t.repeat, td)) continue;
      if (Array.isArray(t.dismissedDates) && t.dismissedDates.includes(td)) continue;
      out.push(t);
    } else if (t.date) {
      // Dated one-off: show only on its date. (Past-dated tasks are filtered out;
      // future-dated tasks wait until their day arrives.)
      if (t.date === td) out.push(t);
    } else {
      // Undated one-off — treat as "today / anytime".
      out.push(t);
    }
  }
  out.sort((a, b) => {
    const ta = a.time || '99:99';
    const tb = b.time || '99:99';
    if (ta !== tb) return ta < tb ? -1 : 1;
    return (a.createdAt || 0) - (b.createdAt || 0);
  });
  return out;
}

// Tasks for a specific calendar date — used by the upcoming-tasks count, if needed.
function getTasksForDate(dateStr) {
  ensureTasksArr();
  const out = [];
  for (const t of state.mastalifeTasks) {
    if (t.repeat) {
      if (!matchesRepeat(t.repeat, dateStr)) continue;
      if (Array.isArray(t.dismissedDates) && t.dismissedDates.includes(dateStr)) continue;
      out.push(t);
    } else if (t.date) {
      if (t.date === dateStr) out.push(t);
    }
  }
  return out;
}

// Keyword-based auto-categorization. Returns one of: 'family' | 'work' | 'gym' | 'health' | 'personal' | null.
// Used both at add time (persisted) and at render time (fallback for older tasks without category).
function inferCategory(title) {
  const t = (title || '').toLowerCase();
  if (!t) return null;
  // Family — \bfam matches family, familay, familly, fam, etc.
  if (/\bfam/.test(t)) return 'family';
  if (/\b(wife|husband|kids?|child|children|son|daughter|mom|mum|dad|parent|spouse|partner|girlfriend|boyfriend|date night|anniversary)\b/.test(t)) return 'family';
  // Work
  if (/\b(meeting|call|email|client|report|deck|slides?|presentation|launch|deploy|review|standup|stand-?up|1:1|one[- ]?on[- ]?one|interview|hire|deadline|project|sprint|jira|ticket|demo|kickoff|sync|q[1-4]|okr|kpi)\b/.test(t)) return 'work';
  // Gym
  if (/\b(gym|workout|run|jog|lift|cardio|stretch|push day|pull day|leg day|legs?|deadlift|squat|bench|press|curl|row)\b/.test(t)) return 'gym';
  // Health
  if (/\b(doctor|dentist|vitamin|supplement|med|medication|pill|appointment|therapy|checkup|massage|physio)\b/.test(t)) return 'health';
  return null; // unknown — won't auto-show in any focus row
}

function taskCategory(t) {
  return t.category || inferCategory(t.title);
}

let activeTab = 'home';

function applyTheme(name) {
  const valid = ['indigo', 'ocean', 'forest', 'sunset', 'oled'];
  const t = valid.includes(name) ? name : 'indigo';
  document.body.dataset.theme = t;
  state.settings.theme = t;
}

let activeDayKey = null;
let expandedExId = null;     // null = auto-expand first incomplete; 'none' = all collapsed; ex.id = manual
let editingSetKey = null;    // `${exId}-${setIdx}` while inline-editing a set
let homeFocusExited = false; // user dismissed focus takeover on Home; reset on next phase change or Home tab tap
let restTimer = null;
let restEndAt = 0;
let phaseTickInterval = null;
let wakeLockSentinel = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator) || wakeLockSentinel) return;
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
  } catch (e) { /* permission/visibility/system can deny — silently ignore */ }
}
function releaseWakeLock() {
  if (!wakeLockSentinel) return;
  try { wakeLockSentinel.release(); } catch (e) {}
  wakeLockSentinel = null;
}
async function ensureNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') {
    if (!state.settings.notifications) { state.settings.notifications = true; save(); }
    return true;
  }
  if (Notification.permission === 'denied') return false;
  try {
    const r = await Notification.requestPermission();
    state.settings.notifications = (r === 'granted'); save();
    return r === 'granted';
  } catch (e) { return false; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  const w = state.workouts[today()];
  if (w && w.activePhase) requestWakeLock();
});

/* === v0.3 helpers: alternatives, swaps, accordion === */
function getAlternatives(ex) {
  if (Array.isArray(ex.alternatives)) return ex.alternatives;
  return (ex.alt || '').split('/').map(s => s.trim()).filter(Boolean);
}
function getDisplaySwap(ex, date) {
  const dayLvl = state.workouts[date]?.swaps?.[ex.id];
  if (dayLvl != null) return dayLvl;
  return (state.exerciseSwaps && state.exerciseSwaps[ex.id]) || 0;
}
function getDisplayName(ex, date) {
  const swap = getDisplaySwap(ex, date);
  if (!swap) return ex.name;
  const alts = getAlternatives(ex);
  return alts[swap - 1] || ex.name;
}
function getActiveExId(date, dayKey) {
  const day = DAYS[dayKey]; if (!day) return null;
  if (expandedExId === 'none') return null;
  if (expandedExId && day.exercises.some(e => e.id === expandedExId)) return expandedExId;
  for (const ex of day.exercises) {
    const logs = state.workouts[date]?.logs?.[ex.id] || [];
    if (logs.filter(s => s.d).length < ex.sets) return ex.id;
  }
  return null;
}

let _pipCtx = null;
function playPip() {
  if (!state.settings.restSound) return;
  try {
    _pipCtx = _pipCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _pipCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) { /* silently ignore */ }
}

function startRest(secs) {
  secs = secs || state.settings.restSec;
  restEndAt = Date.now() + secs * 1000;
  $('restTimer').classList.add('show');
  if (restTimer) clearInterval(restTimer);
  restTimer = setInterval(updateRest, 250);
  updateRest();
}
function updateRest() {
  const left = Math.max(0, Math.round((restEndAt - Date.now()) / 1000));
  const m = Math.floor(left / 60), s = left % 60;
  $('restSecs').textContent = `${m}:${String(s).padStart(2, '0')}`;
  if (left <= 0) {
    stopRest();
    playPip();
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    toast('Rest done — next set');
    if (state.settings.notifications && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('Rest done', { body: 'Hit your next set' });
    }
  }
}
function stopRest() { if (restTimer) clearInterval(restTimer); restTimer = null; $('restTimer').classList.remove('show'); }

function checkBedtimeReminder() {
  if (!state.settings.notifications) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const target = state.settings.bedtime || '23:00';
  const [hh, mm] = target.split(':').map(Number);
  const now = new Date();
  const bed = new Date(now); bed.setHours(hh, mm, 0, 0);
  const oneHourBefore = new Date(bed.getTime() - 60 * 60 * 1000);
  const today = now.toISOString().slice(0, 10);
  if (state.settings.lastBedtimeNotifDate === today) return;
  if (now >= oneHourBefore && now < bed) {
    new Notification('Time to wind down', { body: `Bedtime in 1 hour (${target})` });
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    state.settings.lastBedtimeNotifDate = today;
    save({ skipCloud: true });
  }
}

function setPhase(date, phase) {
  const w = ensureWorkout(date, activeDayKey ?? effectiveDayKey(date) ?? todayDow());
  const now = Date.now();
  if (w.activePhase && w.phaseStart) {
    w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (now - w.phaseStart);
  }
  if (w.activePhase === phase) {
    w.activePhase = null; w.phaseStart = null;
  } else {
    w.activePhase = phase; w.phaseStart = now;
    if (!w.started) w.started = now;
  }
  if (phase === 'workout') w._warmupAdvanced = true; // prevent re-fire after manual end
  if (phase === 'warmup') w._warmupAdvanced = false;
  homeFocusExited = false;
  if (w.activePhase) requestWakeLock(); else releaseWakeLock();
  save();
  startPhaseTick();
  render();
}

function endWarmupAndStartWorkout(date) {
  const w = ensureWorkout(date, activeDayKey ?? effectiveDayKey(date) ?? todayDow());
  const now = Date.now();
  if (w.activePhase === 'warmup' && w.phaseStart) {
    w.timers.warmup = (w.timers.warmup || 0) + (now - w.phaseStart);
  }
  w.activePhase = 'workout';
  w.phaseStart = now;
  if (!w.started) w.started = now;
  w._warmupAdvanced = true;
  homeFocusExited = false;
  expandedExId = null;
  requestWakeLock();
  save();
  startPhaseTick();
  render();
}

function startPhaseTick() {
  if (phaseTickInterval) clearInterval(phaseTickInterval);
  phaseTickInterval = setInterval(() => {
    const w = state.workouts[today()];
    if (!w) return;
    const now = Date.now();
    if (w.activePhase && activeTab === 'today') {
      const els = document.querySelectorAll('.phase-btn .t');
      const phases = ['warmup', 'workout'];
      els.forEach((node, i) => {
        const p = phases[i];
        let ms = w.timers[p] || 0;
        if (w.activePhase === p && w.phaseStart) ms += now - w.phaseStart;
        node.textContent = fmtTime(ms);
      });
    }
    if (activeTab === 'home' && !homeFocusExited && w.activePhase) {
      const target = (state.settings.warmupTargetSec || 300) * 1000;
      if (w.activePhase === 'warmup') {
        const wmEl = document.getElementById('focusWarmupSecs');
        const wmBar = document.getElementById('focusWarmupBar');
        const wmPct = document.getElementById('focusWarmupPct');
        let ms = (w.timers.warmup || 0) + (w.phaseStart ? now - w.phaseStart : 0);
        const remain = Math.max(0, target - ms);
        if (wmEl) wmEl.textContent = fmtTime(remain);
        const pct = Math.min(100, ms / target * 100);
        if (wmBar) wmBar.style.width = pct + '%';
        if (wmPct) wmPct.textContent = Math.round(pct) + '%';
        if (ms >= target && !w._warmupAdvanced) {
          w._warmupAdvanced = true;
          if (navigator.vibrate) navigator.vibrate([180, 80, 180, 80, 180]);
          toast("Warmup done — let's go", 'celebrate');
          if ('Notification' in window && Notification.permission === 'granted') {
            try {
              new Notification('Warmup done', {
                body: "Time to start your first exercise",
                tag: 'mygym-warmup-done',
                icon: 'apple-touch-icon.png',
                renotify: true
              });
            } catch (e) {}
          }
          endWarmupAndStartWorkout(today());
        }
      } else if (w.activePhase === 'workout') {
        const wkEl = document.getElementById('focusWorkoutSecs');
        if (wkEl) {
          let ms = (w.timers.workout || 0) + (w.phaseStart ? now - w.phaseStart : 0);
          wkEl.textContent = fmtTime(ms);
        }
      }
    }
  }, 500);
}

function getDailyQuote() {
  const d = new Date();
  const dayNum = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return QUOTES[((dayNum % QUOTES.length) + QUOTES.length) % QUOTES.length];
}

function getNudges() {
  const out = [];
  const bw = lastBodyWeight();
  if (bw) {
    const days = diffDays(bw.date, today());
    if (days >= 5) out.push({ icon: '⚖️', text: `${days} days since last weight log`, action: openWeightModal });
  }
  const dl = daysToNextPhase(); const np = nextPhase();
  if (np && dl !== null && dl >= 0 && dl <= 7) {
    out.push({ icon: '🚀', text: `Phase ${np.num} starts in ${dl}d — review easy sets`, action: () => { activeTab = 'progress'; render(); } });
  }
  const wc = todaysWater();
  if (wc < state.settings.waterTarget && new Date().getHours() >= 14) {
    out.push({ icon: '💧', text: `Water: ${wc}/${state.settings.waterTarget} bottles today`, action: () => { activeTab = 'more'; render(); } });
  }
  const ls = lastSleep();
  if (!ls || diffDays(ls.date, today()) >= 2) {
    out.push({ icon: '😴', text: 'Log last night\'s sleep', action: openSleepModal });
  }
  return out.slice(0, 3);
}

function buildRing(opts) {
  // opts: { value, total, percent, color, valueLabel, subLabel }
  const pct = Math.min(1, opts.percent != null ? opts.percent : (opts.total > 0 ? opts.value / opts.total : 0));
  const r = 22, c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const color = opts.color || 'var(--accent)';
  const card = el('div', { class: 'ring-card' });
  const ring = el('div', { class: 'ring' });
  ring.innerHTML = `
    <svg viewBox="0 0 56 56" width="56" height="56">
      <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
      <circle class="ring-fg" cx="28" cy="28" r="${r}" style="stroke:${color}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <span class="ring-label" style="color:${color}">${Math.round(pct * 100)}%</span>`;
  card.appendChild(ring);
  card.appendChild(el('div', { class: 'ring-info' }, [
    el('div', { class: 'num' }, opts.valueLabel),
    el('div', { class: 'lbl' }, opts.subLabel)
  ]));
  return card;
}

function buildRingsRow() {

function getSleepAvgLast7() {
  if (!state.sleep.length) return null;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutKey = cutoff.toISOString().slice(0, 10);
  const recent = state.sleep.filter(s => s.date >= cutKey);
  if (!recent.length) return null;
  return recent.reduce((a, s) => a + s.hours, 0) / recent.length;
}

function getBedtimeComplianceLast7() {
  if (!state.sleep.length) return null;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutKey = cutoff.toISOString().slice(0, 10);
  const target = state.settings.bedtime || '23:00';
  const recent = state.sleep.filter(s => s.date >= cutKey && s.bedtime);
  if (!recent.length) return null;
  const onTime = recent.filter(s => s.bedtime <= target).length;
  return onTime / recent.length;
}

function getBedtimeCountdownLabel(target) {
  const [hh, mm] = (target || '23:00').split(':').map(Number);
  const now = new Date();
  const t = new Date(now); t.setHours(hh, mm, 0, 0);
  const diffMin = Math.round((t - now) / 60000);
  if (diffMin <= -60) return 'past';
  if (diffMin <= 0) return 'now';
  const h = Math.floor(diffMin / 60);
  const m = diffMin % 60;
  return h ? `in ${h}h ${m}m` : `in ${m}m`;
}

function totalTimeThisWeek() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  let total = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const w = state.workouts[k];
    if (w?.finished) total += (w.timers?.warmup || 0) + (w.timers?.workout || 0);
  }
  return total;
}

function renderHomeFocus(date, dayKey, w) {
  const v = $('view');
  const day = DAYS[dayKey];
  const target = (state.settings.warmupTargetSec || 300) * 1000;
  const wrap = el('div', { class: 'home-focus' });

  // Top row: exit link + day label
  const topRow = el('div', { class: 'focus-top' });

  topRow.appendChild(el('div', { class: 'focus-day' }, day ? `${DAY_LABELS[dayKey]} · ${day.name}` : DAY_LABELS[dayKey]));
  wrap.appendChild(topRow);

  if (w.activePhase === 'warmup') {
    const elapsed = (w.timers.warmup || 0) + (w.phaseStart ? Date.now() - w.phaseStart : 0);
    const remain = Math.max(0, target - elapsed);
    const pct = Math.min(100, elapsed / target * 100);
    wrap.appendChild(el('div', { class: 'focus-label' }, 'WARMUP'));
    wrap.appendChild(makeTimerRow({
      timerId: 'focusWarmupSecs',
      timerText: fmtTime(remain),
      onPause: () => setPhase(date, 'warmup')
    }));
    const bar = el('div', { class: 'focus-progress' }, [
      el('span', { id: 'focusWarmupBar', style: `width:${pct}%` })
    ]);
    wrap.appendChild(bar);
    wrap.appendChild(el('div', { class: 'focus-meta' }, [
      el('span', { id: 'focusWarmupPct' }, `${Math.round(pct)}%`),
      el('span', { class: 'dim' }, `target ${Math.round(target/60000)} min`)
    ]));
    wrap.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:18px;',
      onclick: () => endWarmupAndStartWorkout(date)
    }, 'End warmup early →'));
    // Status row — keeps you informed that screen will stay on + you'll get a buzz at 0:00
    const hint = el('div', { class: 'focus-hint' });
    hint.appendChild(el('span', { html: '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>' }));
    const hasNotif = ('Notification' in window) && Notification.permission === 'granted';
    hint.appendChild(el('span', {}, hasNotif ? 'Screen stays on · buzz at 0:00' : 'Screen stays on · enable notifications in Settings for a buzz'));
    wrap.appendChild(hint);
  } else if (w.activePhase === 'workout') {
    const ms = (w.timers.workout || 0) + (w.phaseStart ? Date.now() - w.phaseStart : 0);
    const prog = workoutProgress(date, dayKey);
    wrap.appendChild(el('div', { class: 'focus-label' }, 'WORKOUT'));
    wrap.appendChild(makeTimerRow({
      timerId: 'focusWorkoutSecs',
      timerText: fmtTime(ms),
      onPause: () => setPhase(date, 'workout')
    }));
    wrap.appendChild(el('div', { class: 'focus-meta' }, [
      el('span', {}, `${prog.done}/${prog.total} sets`),
      el('span', { class: 'dim' }, prog.total ? `${Math.round(prog.done/prog.total*100)}%` : '')
    ]));

    // Current exercise — honor explicit expandedExId, otherwise auto-pick first incomplete.
    let curId = null;
    const explicit = day.exercises.find(e => e.id === expandedExId);
    if (explicit) {
      curId = explicit.id;
    } else {
      for (const candidate of day.exercises) {
        const lg = w.logs?.[candidate.id] || [];
        if (lg.filter(s => s.d).length < candidate.sets) { curId = candidate.id; break; }
      }
    }

    // Exercise switcher strip — tap any chip to jump.
    const strip = el('div', {
      class: 'focus-ex-strip',
      style: 'display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch;'
    });
    day.exercises.forEach((ex, i) => {
      const lg = w.logs?.[ex.id] || [];
      const doneSets = lg.filter(s => s.d).length;
      const isDone = doneSets >= ex.sets;
      const isCurrent = ex.id === curId;
      strip.appendChild(el('button', {
        class: 'chip' + (isCurrent ? ' accent' : ''),
        style: 'padding:8px 10px;flex-shrink:0;font-size:12px;font-weight:600;' + (isDone ? 'opacity:0.6;' : ''),
        onclick: e => { e.preventDefault(); expandedExId = ex.id; render(); }
      }, `${i + 1}. ${isDone ? '✓ ' : ''}${ex.name}`));
    });
    wrap.appendChild(strip);

    if (curId) {
      const ex = day.exercises.find(e => e.id === curId);
      if (ex) wrap.appendChild(renderExercise(ex, date, dayKey));
    } else {
      wrap.appendChild(el('div', { class: 'card center', style: 'padding:24px 16px;' }, [
        el('div', { class: 'bold', style: 'margin-bottom:6px;' }, 'All sets done'),
        el('div', { class: 'small muted' }, 'Tap finish to save the session.')
      ]));
    }

    // Finish button
    wrap.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:16px;',
      onclick: () => {
        if (w.activePhase && w.phaseStart) {
          w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (Date.now() - w.phaseStart);
          w.activePhase = null; w.phaseStart = null;
        }
        w.finished = Date.now();
        save(); toast('Workout saved 🎯', 'celebrate'); stopRest();
        if (phaseTickInterval) clearInterval(phaseTickInterval);
        releaseWakeLock();
        homeFocusExited = false;
        render();
      }
    }, prog.done === prog.total ? 'Finish workout' : `Finish (${prog.done}/${prog.total} sets)`));
  } else {
    // No active phase but session has elapsed time — paused mid-flight
    const inWorkout = (w.timers?.workout || 0) > 0;
    wrap.appendChild(el('div', { class: 'focus-label' }, 'PAUSED'));
    wrap.appendChild(el('div', { class: 'focus-timer' }, fmtTime((w.timers?.warmup || 0) + (w.timers?.workout || 0))));
    wrap.appendChild(el('div', { class: 'small muted center', style: 'margin:0 0 18px;' }, inWorkout ? 'Workout paused' : 'Warmup paused'));
    if (inWorkout) {
      wrap.appendChild(el('button', {
        class: 'btn',
        onclick: () => setPhase(date, 'workout')
      }, '▶ Resume workout'));
    } else {
      wrap.appendChild(el('button', {
        class: 'btn',
        onclick: () => setPhase(date, 'warmup')
      }, '▶ Resume warmup'));
      wrap.appendChild(el('button', {
        class: 'btn secondary',
        style: 'margin-top:8px;',
        onclick: () => endWarmupAndStartWorkout(date)
      }, 'Skip to workout →'));
    }
  }

  v.appendChild(wrap);
  if (w.activePhase) {
    startPhaseTick();
    ensureFloatingPauseBtn(() => setPhase(date, w.activePhase));
  } else {
    hideFloatingPauseBtn();
  }
}

function renderHome() {
  const v = $('view');
  const date = today();
  const dow = todayDow();
  const todayKey = effectiveDayKey(date);
  const day = todayKey != null ? DAYS[todayKey] : null;
  const isSkipped = state.plan?.skippedDates?.includes(date) || false;

  // Focus takeover: while a phase is active (or session paused mid-flight), hide the rest of Home
  const wToday = state.workouts[date];
  const sessionStarted = wToday && ((wToday.timers?.warmup || 0) > 0 || (wToday.timers?.workout || 0) > 0);
  const inFocus = day && wToday && !wToday.finished && !homeFocusExited && (
    wToday.activePhase === 'warmup' || wToday.activePhase === 'workout' || sessionStarted
  );
  if (inFocus) { renderHomeFocus(date, todayKey, wToday); return; }

  // Greeting
  const hour = new Date().getHours();
  const tod = hour < 12 ? 'morning' : hour < 18 ? 'afternoon' : 'evening';
  v.appendChild(el('div', { class: 'greeting' }, [
    el('div', { class: 'name' }, `Good ${tod}, Mustapha`)
  ]));

  // Quote
  const q = getDailyQuote();
  v.appendChild(el('div', { class: 'quote-card' }, [
    el('div', { class: 'quote-text' }, q.text),
    el('div', { class: 'quote-author' }, '— ' + q.author)
  ]));

  // Phase / week / sleep rings
  v.appendChild(buildRingsRow());

  // Today CTA
  const cta = el('button', {
    class: 'today-cta' + (day ? '' : ' rest'),
    onclick: () => { activeTab = 'today'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });
  if (day) {
    const prog = workoutProgress(date, todayKey);
    const pct = prog.total ? Math.round(prog.done / prog.total * 100) : 0;
    const wkout = state.workouts[date];
    const tag = (todayKey !== dow && DAYS[dow]) ? ' <span class="plan-shifted-tag">shifted</span>' : '';
    cta.appendChild(el('div', { class: 'today-label', html: `${DAY_LABELS[dow]} · ${day.name} day${tag}` }));
    cta.appendChild(el('div', { class: 'today-stats' }, `${day.exercises.length} exercise${day.exercises.length === 1 ? '' : 's'}`));
    cta.appendChild(el('div', { class: 'today-progress' }, [
      el('div', { class: 'progress-bar' }, [el('span', { style: `width:${pct}%` })])
    ]));
    cta.appendChild(el('div', { class: 'today-cta-text' },
      wkout?.finished ? '✓ Done — view session →' :
      prog.done > 0 ? 'Continue workout →' : 'Start workout →'));
  } else {
    const restLabel = isSkipped ? 'Skipped — rest today' : 'Rest day';
    cta.appendChild(el('div', { class: 'today-label' }, `${DAY_LABELS[dow]} · ${restLabel}`));
    cta.appendChild(el('div', { class: 'today-stats' }, 'Recover · sleep early'));
    cta.appendChild(el('div', { class: 'today-cta-text' }, 'Pick a different day →'));
  }
  v.appendChild(cta);

  // Start warmup (focus mode) — only on workout days, not finished, no active phase
  if (day && !state.workouts[date]?.finished && !state.workouts[date]?.activePhase) {
    v.appendChild(el('button', {
      class: 'btn warmup-cta',
      onclick: async () => {
        await ensureNotificationPermission();
        setPhase(date, 'warmup');
      }
    }, [
      el('span', { class: 'warmup-cta-icon', html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' }),
      el('span', { class: 'warmup-cta-text' }, [
        el('span', { class: 'bold' }, '▶ Start warmup'),
        el('span', { class: 'small dim' }, `${Math.round((state.settings.warmupTargetSec || 300)/60)} min · then auto-start workout`)
      ])
    ]));

    // Skip workout — moves today's session forward by 1 calendar day
    v.appendChild(el('button', {
      class: 'skip-cta',
      onclick: () => openSkipConfirmModal()
    }, [
      el('span', { class: 'skip-icon', html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>' }),
      el('span', {}, 'Skip today · move to tomorrow')
    ]));

    // Gym bag — inline checklist (right under Skip today)
    {
      const checked = new Set(todaysBag());
      const bagDone = checked.size;
      const bagTotal = BAG_ITEMS.length;
      const bagFull = bagDone === bagTotal;
      const collapsed = !!state.settings.bagCollapsed;

      const bagCard = el('div', { class: 'card', style: 'margin-top:14px;' });
      const header = el('div', {
        class: 'row between',
        style: 'cursor:pointer;align-items:center;gap:8px;' + (collapsed ? '' : 'margin-bottom:8px;'),
        onclick: () => {
          state.settings.bagCollapsed = !state.settings.bagCollapsed;
          save(); render();
        }
      });
      header.appendChild(el('div', { class: 'row', style: 'gap:8px;align-items:center;' }, [
        el('div', { class: 'card-title', style: 'margin:0;' }, '🎒 Gym bag'),
        el('span', { class: 'chip' + (bagFull ? ' success' : '') }, bagFull ? '✓ Packed' : `${bagDone} / ${bagTotal}`)
      ]));
      const rightControls = el('div', { class: 'row', style: 'gap:8px;align-items:center;' });
      if (bagDone > 0 && !collapsed) {
        rightControls.appendChild(el('button', {
          class: 'btn small secondary',
          style: 'padding:4px 10px;font-size:11px;',
          onclick: (e) => {
            e.stopPropagation();
            state.bag[today()] = [];
            save(); render();
          }
        }, 'Clear'));
      }
      rightControls.appendChild(el('span', {
        style: 'color:var(--text-muted);font-size:14px;transition:transform 0.2s;' + (collapsed ? '' : 'transform:rotate(90deg);')
      }, '›'));
      header.appendChild(rightControls);
      bagCard.appendChild(header);

      if (!collapsed) {
        const ul = el('ul', { class: 'checklist' });
        BAG_ITEMS.forEach(it => {
          const isChecked = checked.has(it.id);
          const li = el('li', {
            class: 'bag-row' + (isChecked ? ' done' : ''),
            onclick: () => { bagToggle(it.id); render(); }
          });
          li.innerHTML = `
            <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4 12 10 18 20 6"/></svg></span>
            <span class="text">${escapeHtml(it.label)}</span>`;
          ul.appendChild(li);
        });
        bagCard.appendChild(ul);
      }
      v.appendChild(bagCard);
    }
  }

  // Stat grid — Today's sets · Calories · Last session · Last sleep
  const grid = el('div', { class: 'stat-grid' });

  // Slot 1: Last session (or Next session on rest days)
  const _lastFinDates = Object.entries(state.workouts || {})
    .filter(([d, w]) => w && w.finished && d <= today())
    .sort((a, b) => b[0].localeCompare(a[0]));
  const _lastFin = _lastFinDates[0];
  const _lastFinDate = _lastFin ? _lastFin[0] : null;
  const _lastFinW = _lastFin ? _lastFin[1] : null;
  const _lastFinMs = _lastFinW ? ((_lastFinW.timers?.warmup || 0) + (_lastFinW.timers?.workout || 0)) : 0;
  const _lastFinDay = _lastFinW && DAYS[_lastFinW.dayKey] ? DAYS[_lastFinW.dayKey] : null;
  function _agoLabel(d) {
    if (!d) return '';
    if (d === today()) return 'today';
    const td = new Date(today() + 'T00:00:00');
    const ld = new Date(d + 'T00:00:00');
    const days = Math.round((td - ld) / 86400000);
    return days === 1 ? 'yesterday' : `${days}d ago`;
  }
  if (day) {
    // Workout day → show last finished session (with timer + day name)
    grid.appendChild(el('div', {
      class: 'stat' + (_lastFinMs > 0 ? ' positive' : ''),
      style: 'cursor:pointer;',
      onclick: () => { activeTab = 'progress'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, [
      el('div', { class: 'label' }, 'Last session'),
      el('div', { class: 'value', style: 'font-size:20px;' }, _lastFinMs > 0 ? fmtTime(_lastFinMs) : '—'),
      el('div', { class: 'sub' }, _lastFinDay
        ? `${_lastFinDay.name} · ${_agoLabel(_lastFinDate)}`
        : 'no sessions yet')
    ]));
  } else {
    // Rest day → show NEXT planned session
    let nextDate = null, nextDay = null;
    let dCheck = nextDateStr(today());
    for (let i = 0; i < 7; i++) {
      const k = effectiveDayKey(dCheck);
      if (k != null) { nextDate = dCheck; nextDay = DAYS[k]; break; }
      dCheck = nextDateStr(dCheck);
    }
    const daysUntil = nextDate ? Math.round((new Date(nextDate + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000) : null;
    const untilLabel = daysUntil === 1 ? 'tomorrow' : daysUntil != null ? `in ${daysUntil}d` : '—';
    grid.appendChild(el('div', {
      class: 'stat' + (nextDay ? ' positive' : ''),
      style: nextDay ? 'cursor:pointer;' : '',
      onclick: nextDay ? (() => { activeTab = 'plan'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }) : undefined
    }, [
      el('div', { class: 'label' }, 'Next session'),
      el('div', { class: 'value', style: 'font-size:20px;' }, nextDay ? nextDay.name : '—'),
      el('div', { class: 'sub' }, nextDay ? untilLabel : 'no upcoming')
    ]));
  }

  // Slot 2: Streak
  const _streak = getStreak();
  grid.appendChild(el('div', {
    class: 'stat' + (_streak > 0 ? ' positive' : '')
  }, [
    el('div', { class: 'label' }, 'Streak'),
    el('div', { class: 'value' }, _streak > 0 ? `${_streak}w` : '—'),
    el('div', { class: 'sub' }, _streak > 0 ? 'consecutive weeks (4+/wk)' : 'hit 4 to start')
  ]));

  // Slot 3: Energy / How I feel — latest feel-log
  const _feelLogs = (Array.isArray(state.coachLogs) ? state.coachLogs : [])
    .filter(l => l && l.kind === 'feel')
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const _latestFeel = _feelLogs[0] || null;
  const _feelHasData = _latestFeel && (_latestFeel.energy != null || _latestFeel.soreness != null);
  let _feelVal = '—';
  let _feelSub = 'Tap to log how you feel';
  if (_feelHasData) {
    const e = _latestFeel.energy != null ? `E ${_latestFeel.energy}` : '—';
    const s = _latestFeel.soreness != null ? `S ${_latestFeel.soreness}` : '—';
    _feelVal = `${e} · ${s}`;
    _feelSub = _latestFeel.date === today() ? 'today · energy / soreness'
      : (_latestFeel.date ? `${_agoLabel(_latestFeel.date)} · E / S` : 'energy / soreness');
  }
  // Positive if energy is good (4-5) and soreness is low (1-2) — i.e. ready to train
  const _feelPositive = _feelHasData
    && (_latestFeel.energy != null && _latestFeel.energy >= 4)
    && (_latestFeel.soreness != null ? _latestFeel.soreness <= 2 : true);
  grid.appendChild(el('div', {
    class: 'stat' + (_feelPositive ? ' positive' : ''),
    style: 'cursor:pointer;',
    onclick: () => {
      if (typeof openFeelLogModal === 'function') openFeelLogModal();
      else { activeTab = 'coach'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }
  }, [
    el('div', { class: 'label' }, 'How I feel'),
    el('div', { class: 'value', style: 'font-size:20px;' }, _feelVal),
    el('div', { class: 'sub' }, _feelSub)
  ]));

  // Slot 4: Last sleep
  const ls = lastSleep();
  grid.appendChild(el('div', {
    class: 'stat' + (ls && ls.hours >= (state.settings.sleepTarget || 8) - 0.5 ? ' positive' : ''),
    onclick: openSleepModal,
    style: 'cursor:pointer;'
  }, [
    el('div', { class: 'label' }, 'Last sleep'),
    el('div', { class: 'value' }, ls ? `${ls.hours.toFixed(1)} h` : '—'),
    el('div', { class: 'sub' }, ls ? `${(ls.hours - state.settings.sleepTarget) >= 0 ? '+' : ''}${(ls.hours - state.settings.sleepTarget).toFixed(1)}h vs target` : 'Tap to log')
  ]));
  v.appendChild(grid);

  // Quick log
  const ql = el('div', { class: 'quick-log' });
  ql.appendChild(makeQuickBtn('Weight', '⚖️', openWeightModal));
  ql.appendChild(makeQuickBtn('Sleep', '😴', openSleepModal));
  ql.appendChild(makeQuickBtn('Meal', '🍽', openAddMealModal));
  v.appendChild(ql);

  // Today's tasks — slim daily reminder, AI paste-able. Tap to clear (recurring tasks come back next matching day).
  {
    const tlist = getTasks();
    const dupCount = countDuplicateTasks();
    const tcard = el('div', { class: 'card' });
    const headerRight = el('div', { class: 'row', style: 'align-items:center;gap:8px;' });
    if (dupCount > 0) {
      headerRight.appendChild(el('button', {
        class: 'chip warn',
        style: 'cursor:pointer;border:none;font-weight:700;',
        onclick: () => {
          const removed = dedupeTasks();
          render();
          toast(`Removed ${removed} duplicate${removed === 1 ? '' : 's'}`);
        }
      }, `Dedupe ${dupCount}`));
    }
    headerRight.appendChild(el('span', { class: 'chip' }, String(tlist.length)));
    tcard.appendChild(el('div', { class: 'row between', style: 'margin-bottom:8px;align-items:center;' }, [
      el('div', { class: 'card-title', style: 'margin:0;' }, 'Today\'s tasks'),
      headerRight
    ]));

    const hasKey = !!state.settings.anthropicApiKey;
    const aiBtn = el('button', {
      class: 'btn',
      style: 'background:linear-gradient(135deg, var(--accent), var(--accent-strong));margin-bottom:8px;',
      onclick: () => hasKey ? openAIParseModal() : openAIKeyModal(() => openAIParseModal())
    }, '✨ ' + (hasKey ? 'Paste with AI' : 'Set up AI key to paste'));
    tcard.appendChild(aiBtn);

    if (tlist.length === 0) {
      tcard.appendChild(el('div', { class: 'small muted', style: 'padding:8px 0 4px;text-align:center;' },
        'No tasks. Paste a list above.'));
    } else {
      const ul = el('ul', { class: 'task-list', style: 'list-style:none;padding:0;margin:0;' });
      tlist.forEach(t => {
        const cat = taskCategory(t);
        const isRecurring = !!t.repeat;
        const toastMsg = isRecurring ? `Done · returns ${describeRepeat(t.repeat)}` : 'Removed';
        const li = el('li', {
          class: 'task-row',
          style: 'display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--surface-2);cursor:pointer;',
          onclick: () => { dismissTask(t.id); render(); toast(toastMsg); }
        });
        // Empty checkbox (tap → clears for today)
        li.appendChild(el('span', {
          style: 'width:20px;height:20px;border-radius:6px;border:1.5px solid var(--text-dim);flex-shrink:0;'
        }));
        // Time
        li.appendChild(el('span', {
          style: 'font-size:12px;font-weight:700;color:var(--text-muted);font-variant-numeric:tabular-nums;min-width:42px;'
        }, t.time || '—'));
        // Title block (with optional recurrence subtitle)
        const titleBlk = el('div', { style: 'flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;' });
        const titleLine = el('div', { style: 'display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text);' });
        titleLine.appendChild(el('span', {}, t.title));
        if (isRecurring) titleLine.appendChild(el('span', { style: 'color:var(--accent);font-size:12px;line-height:1;' }, '↻'));
        titleBlk.appendChild(titleLine);
        if (isRecurring) titleBlk.appendChild(el('div', { style: 'font-size:11px;color:var(--text-muted);' }, describeRepeat(t.repeat)));
        li.appendChild(titleBlk);
        // Category chip (optional)
        if (cat) {
          li.appendChild(el('span', {
            class: 'cat-chip cat-' + cat,
            style: 'flex-shrink:0;'
          }, cat));
        }
        ul.appendChild(li);
      });
      // Drop top border on first row
      const firstRow = ul.firstChild;
      if (firstRow) firstRow.style.borderTop = 'none';
      tcard.appendChild(ul);
    }
    v.appendChild(tcard);
  }

  // Recent wins
  {
    const ph = currentPhase();
    const sw = sessionsThisWeek();
    const streak = getStreak();

    // Last finished session — find most recent completed workout, sum warmup+workout time.
    const finishedDates = Object.entries(state.workouts)
      .filter(([d, w]) => w && w.finished)
      .sort((a, b) => b[0].localeCompare(a[0]));
    const last = finishedDates[0];
    const lastDate = last ? last[0] : null;
    const lastW = last ? last[1] : null;
    const lastTotalMs = lastW ? ((lastW.timers?.warmup || 0) + (lastW.timers?.workout || 0)) : 0;
    const lastDayName = lastW && DAYS[lastW.dayKey] ? DAYS[lastW.dayKey].name : null;
    const lastSubLabel = (() => {
      if (!lastDate) return 'no sessions yet';
      const today_s = today();
      if (lastDate === today_s) return lastDayName ? `${lastDayName} · today` : 'today';
      const td = new Date(today_s + 'T00:00:00');
      const ld = new Date(lastDate + 'T00:00:00');
      const days = Math.round((td - ld) / 86400000);
      const ago = days === 1 ? 'yesterday' : `${days}d ago`;
      return lastDayName ? `${lastDayName} · ${ago}` : ago;
    })();

    // Latest PR — most recent set whose Epley score exceeds all earlier sets in that exercise
    const _allSets = [];
    for (const [dd, ww] of Object.entries(state.workouts || {})) {
      if (!ww || !ww.logs) continue;
      for (const [exId, arr] of Object.entries(ww.logs)) {
        for (const s of (arr || [])) {
          if (s && s.d) {
            const e = epley(s.w, s.r);
            if (e > 0) _allSets.push({ date: dd, exId, e, w: parseFloat(s.w), r: parseFloat(s.r) });
          }
        }
      }
    }
    _allSets.sort((a, b) => a.date.localeCompare(b.date));
    const _exBest = {};
    let _topPR = null;
    for (const s of _allSets) {
      if (!_exBest[s.exId] || s.e > _exBest[s.exId].e) {
        _exBest[s.exId] = s;
        _topPR = s;
      }
    }
    let _prVal = '—', _prSub = 'log a set to start';
    if (_topPR) {
      let exName = _topPR.exId;
      for (const dk of Object.keys(DAYS)) {
        const found = (DAYS[dk].exercises || []).find(x => x.id === _topPR.exId);
        if (found) { exName = found.name; break; }
      }
      _prVal = `${_topPR.w}kg`;
      _prSub = `× ${_topPR.r} · ${exName.length > 18 ? exName.slice(0, 16) + '…' : exName}`;
    }

    // Weight Δ — current vs starting body weight
    const _bw = lastBodyWeight();
    const _startBw = state.bodyWeight && state.bodyWeight[0];
    const _delta = (_bw && _startBw) ? (_bw.weight - _startBw.weight) : null;
    const _wValStr = _bw ? `${_bw.weight}kg` : '—';
    const _wSubStr = _delta != null
      ? `${_delta >= 0 ? '+' : ''}${_delta.toFixed(1)} kg from start`
      : 'log to track';

    // Calories + Water
    const _winsKcalDone = mealTotalsForDate(today()).calories;
    const _winsKcalTarget = NUTRITION.calories;
    const _winsKcalPct = Math.min(100, _winsKcalTarget ? Math.round(_winsKcalDone / _winsKcalTarget * 100) : 0);
    const _winsWDone = todaysWater();
    const _winsWTarget = state.settings.waterTarget || 4;
    const _winsWHit = _winsWDone >= _winsWTarget;

    const winsSection = el('div', { class: 'ml-section' });
    winsSection.appendChild(el('div', { class: 'ml-section-head' }, [el('span', {}, 'Recent wins')]));
    const winsRow = el('div', { class: 'wins-row' });
    winsRow.appendChild(el('div', {
      class: 'win-card' + (_winsKcalDone > 0 ? ' positive' : ''),
      style: 'cursor:pointer;',
      onclick: () => { activeTab = 'food'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, [
      el('div', { class: 'w-lbl', html: (ML_ICONS.flame || ML_ICONS.star) + ' <span>Calories</span>' }),
      el('div', { class: 'w-val' }, _winsKcalDone > 0 ? `${Math.round(_winsKcalDone)}` : '—'),
      el('div', { class: 'w-sub' }, _winsKcalDone > 0 ? `${_winsKcalPct}% of ${_winsKcalTarget}` : `target ${_winsKcalTarget} kcal`)
    ]));
    winsRow.appendChild(el('div', {
      class: 'win-card' + (_winsWHit ? ' positive' : ''),
      style: 'cursor:pointer;',
      onclick: () => { activeTab = 'more'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, [
      el('div', { class: 'w-lbl', html: (ML_ICONS.drop || ML_ICONS.star) + ' <span>Water</span>' }),
      el('div', { class: 'w-val' }, `${_winsWDone}/${_winsWTarget}`),
      el('div', { class: 'w-sub' }, _winsWHit ? '✓ Hit target' : `${(_winsWDone * 0.5).toFixed(1)}L of ${(_winsWTarget * 0.5).toFixed(1)}L`)
    ]));
    winsRow.appendChild(el('div', { class: 'win-card' + (_topPR ? ' positive' : '') }, [
      el('div', { class: 'w-lbl', html: (ML_ICONS.trend || ML_ICONS.star) + ' <span>Latest PR</span>' }),
      el('div', { class: 'w-val' }, _prVal),
      el('div', { class: 'w-sub' }, _prSub)
    ]));
    winsRow.appendChild(el('div', {
      class: 'win-card' + ((_delta != null) ? ' positive' : ''),
      style: 'cursor:pointer;',
      onclick: openWeightModal
    }, [
      el('div', { class: 'w-lbl', html: (ML_ICONS.scale || ML_ICONS.flame) + ' <span>Weight</span>' }),
      el('div', { class: 'w-val' }, _wValStr),
      el('div', { class: 'w-sub' }, _wSubStr)
    ]));
    winsSection.appendChild(winsRow);
    v.appendChild(winsSection);
  }

  // Nudges
  const nudges = getNudges();
  if (nudges.length) {
    const nc = el('div', { class: 'card' });
    nc.appendChild(el('div', { class: 'card-title' }, 'Reminders'));
    nudges.forEach(n => {
      const row = el('div', {
        class: 'nudge' + (n.action ? ' clickable' : ''),
        onclick: n.action || null
      });
      row.appendChild(el('span', { class: 'nudge-icon' }, n.icon));
      row.appendChild(el('span', { class: 'nudge-text' }, n.text));
      if (n.action) row.appendChild(el('span', { class: 'nudge-arrow' }, '›'));
      nc.appendChild(row);
    });
    v.appendChild(nc);
  }
}

/* =========== TODAY =========== */
function renderToday() {

  const date = today();
  const dayKey = activeDayKey ?? effectiveDayKey(date);
  const day = dayKey ? DAYS[dayKey] : null;

  }, [

      class: 'btn secondary',

      onclick: () => { activeTab = 'plan'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, [
      el('span', { html: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' }),

      el('span', { style: 'opacity:0.5;' }, '›')
    ]),
    el('button', {
      class: 'btn secondary',
      style: 'flex:1;padding:10px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;',
      onclick: () => { activeTab = 'progress'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, [
      el('span', { html: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>' }),

    ])

  if (!day) {

      el('div', { class: 'focus' }, 'Recover. Walk. Sleep early.'),
      el('div', { class: 'meta' }, [el('span', { class: 'chip success' }, 'Active recovery')])
    ]));

    const dl = daysToNextPhase();
