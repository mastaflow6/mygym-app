<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MyGym" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<title>MyGym</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #131316;
    --surface-2: #1c1c20;
    --surface-3: #26262b;
    --border: #2a2a30;
    --text: #fafafa;
    --text-muted: #8e8e96;
    --text-dim: #5a5a62;
    --accent: #818cf8;
    --accent-strong: #6366f1;
    --accent-soft: rgba(129, 140, 248, 0.12);
    --success: #22c55e;
    --success-soft: rgba(34, 197, 94, 0.12);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --info: #60a5fa;
    --info-soft: rgba(96, 165, 250, 0.12);
    --danger: #ef4444;
    --danger-soft: rgba(239, 68, 68, 0.12);
    --pr: #facc15;
    --pr-soft: rgba(250, 204, 21, 0.15);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --tab-h: 68px;
    --progress-from: #818cf8;
    --progress-to: #a78bfa;
  }

  body[data-theme="ocean"] {
    --bg: #050a0d; --surface: #0f1518; --surface-2: #15212a; --surface-3: #1f2d38; --border: #1e3a44;
    --accent: #22d3ee; --accent-strong: #06b6d4; --accent-soft: rgba(34,211,238,0.12);
    --progress-from: #06b6d4; --progress-to: #14b8a6;
  }
  body[data-theme="forest"] {
    --bg: #060a07; --surface: #0f1612; --surface-2: #16241a; --surface-3: #1d2f23; --border: #233b2a;
    --accent: #34d399; --accent-strong: #10b981; --accent-soft: rgba(52,211,153,0.12);
    --progress-from: #10b981; --progress-to: #84cc16;
  }
  body[data-theme="sunset"] {
    --bg: #0c0807; --surface: #1a1311; --surface-2: #261812; --surface-3: #321e16; --border: #3b261b;
    --accent: #fb923c; --accent-strong: #f97316; --accent-soft: rgba(251,146,60,0.12);
    --progress-from: #f97316; --progress-to: #ec4899;
  }
  body[data-theme="oled"] {
    --bg: #000000; --surface: #0a0a0a; --surface-2: #141414; --surface-3: #1f1f1f; --border: #262626;
    --accent: #facc15; --accent-strong: #eab308; --accent-soft: rgba(250,204,21,0.10);
    --progress-from: #facc15; --progress-to: #f59e0b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  input, button, select, textarea { font-family: inherit; color: inherit; }
  button { border: none; background: none; cursor: pointer; padding: 0; }

  .app {
    min-height: 100vh;
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
    max-width: 540px;
    margin: 0 auto;
  }
  header.topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background: rgba(10,10,11,0.82);
    backdrop-filter: saturate(140%) blur(16px);
    -webkit-backdrop-filter: saturate(140%) blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .topbar .pill {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-soft); padding: 6px 10px; border-radius: 999px;
  }
  main { padding: 16px 16px 24px; }

  nav.tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(10,10,11,0.92);
    backdrop-filter: saturate(140%) blur(20px);
    -webkit-backdrop-filter: saturate(140%) blur(20px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 40;
  }
  nav.tabs .inner {
    max-width: 540px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: repeat(5, 1fr);
  }
  nav.tabs button {
    color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 11px; font-weight: 500; height: var(--tab-h);
    transition: color 0.15s;
  }
  nav.tabs button.active { color: var(--accent); }
  nav.tabs svg { width: 22px; height: 22px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px;
  }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .grow { flex: 1; }
  .muted { color: var(--text-muted); }
  .dim { color: var(--text-dim); }
  .small { font-size: 12px; }
  .bold { font-weight: 600; }
  .center { text-align: center; }

  .hero {
    background: linear-gradient(155deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 20px; margin-bottom: 14px; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; width: 200px; height: 200px;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    top: -80px; right: -60px; pointer-events: none;
  }
  .hero .day-name { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
  .hero h2 { margin: 6px 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .hero .focus { color: var(--text-muted); font-size: 14px; }
  .hero .meta { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }

  .chip {
    font-size: 11px; font-weight: 600; padding: 5px 9px; border-radius: 8px;
    background: var(--surface-3); color: var(--text-muted);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .chip.accent { background: var(--accent-soft); color: var(--accent); }
  .chip.warn { background: var(--warn-soft); color: var(--warn); }
  .chip.success { background: var(--success-soft); color: var(--success); }
  .chip.info { background: var(--info-soft); color: var(--info); }
  .chip.pr { background: var(--pr-soft); color: var(--pr); }

  .progress { margin-top: 14px; }
  .progress-bar {
    height: 6px; background: var(--surface-3); border-radius: 999px;
    overflow: hidden; position: relative;
  }
  .progress-bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), #fbbf24);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
  }
  .progress-meta {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--text-muted);
  }

  .coach-note {
    background: var(--accent-soft); border: 1px solid rgba(129, 140, 248, 0.25);
    border-radius: 14px; padding: 12px 14px; color: #fed7aa; font-size: 13px;
    margin-bottom: 14px; display: flex; gap: 10px; align-items: flex-start;
  }
  .coach-note.warn { background: var(--warn-soft); border-color: rgba(245, 158, 11, 0.3); color: #fde68a; }
  .coach-note.info { background: rgba(96, 165, 250, 0.1); border-color: rgba(96, 165, 250, 0.3); color: #bfdbfe; }
  .coach-note svg { flex-shrink: 0; margin-top: 2px; }
  .coach-note button { margin-left: auto; color: inherit; opacity: 0.8; font-weight: 600; padding: 0 4px; }

  /* Phase timer (lab) */
  .lab-timer {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px; margin-bottom: 12px;
  }
  .lab-timer .phases {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px;
  }
  .phase-btn {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 8px; text-align: center; transition: all 0.18s;
    display: flex; flex-direction: column; gap: 2px; align-items: center;
  }
  .phase-btn .lbl { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .phase-btn .t { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .phase-btn.active { background: var(--accent-soft); border-color: var(--accent); }
  .phase-btn.active .lbl { color: var(--accent); }
  .phase-btn.done .t { color: var(--success); }

  /* Exercise card */
  .exercise {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 14px 14px 8px;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  .exercise.complete { border-color: rgba(34, 197, 94, 0.3); }
  .exercise.has-pr { border-color: rgba(250, 204, 21, 0.3); }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
  .ex-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 6px; }
  .ex-target { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .ex-target .alt { color: var(--text-dim); }
  .ex-spec { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .ex-spec b { color: var(--text); font-weight: 600; }
  .ex-icons { display: flex; gap: 6px; margin-top: 4px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px; background: var(--surface-2);
    color: var(--text-muted); display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }
  .icon-btn.has-data { color: var(--accent); border-color: rgba(129, 140, 248, 0.3); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 14px; height: 14px; }

  .last-info {
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px;
    background: var(--surface-2); padding: 7px 10px; border-radius: 8px;
    display: flex; gap: 6px; align-items: center;
  }
  .last-info b { color: var(--text); }

  .sets { display: flex; flex-direction: column; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 44px;
    gap: 8px; align-items: center; padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .set-row:first-child { border-top: none; }
  .set-row.done .set-num { background: var(--success); color: white; }
  .set-row.pr .set-num { background: var(--pr); color: #1c1c20; }
  .set-num {
    width: 28px; height: 28px; border-radius: 8px; background: var(--surface-3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-muted); transition: all 0.2s;
  }
  .set-input {
    background: var(--surface-2); border: 1px solid transparent; border-radius: 10px;
    padding: 9px 10px; font-size: 15px; font-weight: 600;
    color: var(--text); width: 100%; text-align: center;
    transition: all 0.15s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); background: var(--bg); }
  .set-input::placeholder { color: var(--text-dim); font-weight: 500; }
  .input-wrap { position: relative; }
  .input-wrap .unit {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--text-dim); pointer-events: none; font-weight: 500;
  }
  .check-btn {
    width: 44px; height: 38px; border-radius: 10px;
    background: var(--surface-2); color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; border: 1px solid var(--border);
  }
  .check-btn:active { transform: scale(0.92); }
  .check-btn.done { background: var(--success); color: white; border-color: var(--success); }
  .add-set {
    width: 100%; padding: 10px; margin-top: 4px;
    color: var(--accent); font-size: 13px; font-weight: 600;
    border-radius: 10px; background: transparent;
  }
  .add-set:active { background: var(--accent-soft); }

  .btn {
    width: 100%; padding: 14px; border-radius: 14px;
    background: var(--accent); color: white; font-weight: 700; font-size: 16px;
    transition: all 0.15s; letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn.success { background: var(--success); }
  .btn.danger { background: var(--surface-2); color: var(--danger); border: 1px solid var(--border); }
  .btn.small { padding: 9px 14px; font-size: 13px; width: auto; }

  /* Plan */
  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .day-card .header {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .day-card.rest .header { color: var(--text-dim); }
  .day-card .header b { font-size: 15px; }
  .day-card .body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .day-card .ex-line {
    padding: 10px 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 12px; font-size: 13px;
    align-items: center; cursor: pointer;
  }
  .day-card .ex-line:last-child { border-bottom: none; }
  .day-card .ex-line .name { font-weight: 500; flex: 1; }
  .day-card .ex-line .spec { color: var(--text-muted); white-space: nowrap; }

  /* Progress */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
  }
  .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.02em; }
  .stat .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat.positive .value { color: var(--success); }

  .phase-track { display: flex; flex-direction: column; gap: 12px; }
  .phase-step { display: flex; gap: 12px; align-items: flex-start; }
  .phase-step .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--surface-3); margin-top: 4px;
    border: 2px solid var(--border); flex-shrink: 0;
  }
  .phase-step.current .dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .phase-step.done .dot { background: var(--success); border-color: var(--success); }
  .phase-step .info { flex: 1; }
  .phase-step .info b { font-size: 14px; }
  .phase-step .info .when { color: var(--text-muted); font-size: 12px; }
  .phase-step .info .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .chart { height: 140px; position: relative; margin: 12px 0 8px; }
  .chart svg { width: 100%; height: 100%; }
  .chart .line { fill: none; stroke: var(--accent); stroke-width: 2; }
  .chart .area { fill: url(#areaGrad); }
  .chart .dot { fill: var(--accent); }
  .chart .axis-text { fill: var(--text-dim); font-size: 10px; }
  .empty { color: var(--text-dim); text-align: center; padding: 24px; font-size: 13px; }

  /* Bars */
  .bar-row {
    display: grid; grid-template-columns: 88px 1fr 36px;
    gap: 10px; align-items: center; padding: 5px 0;
  }
  .bar-row .lbl { font-size: 12px; color: var(--text-muted); text-transform: capitalize; }
  .bar-row .bar { height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
  .bar-row .bar > span {
    display: block; height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-row .v { font-size: 12px; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

  /* Month bars */
  .month-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; align-items: end;
    height: 110px; margin: 12px 0 4px;
  }
  .month-grid .col { display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .month-grid .col .bar {
    width: 100%; flex: 1; background: var(--surface-3); border-radius: 6px;
    position: relative; overflow: hidden; max-height: 80px;
    display: flex; align-items: flex-end;
  }
  .month-grid .col .bar > span {
    display: block; width: 100%; background: linear-gradient(180deg, var(--accent), var(--accent-strong));
    border-radius: 6px; transition: height 0.4s;
  }
  .month-grid .col .lbl { font-size: 10px; color: var(--text-dim); }
  .month-grid .col .v { font-size: 11px; font-weight: 700; }
  .month-grid .col.current .v { color: var(--accent); }

  /* Macros */
  .macro-ring {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .macro {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 8px; text-align: center;
  }
  .macro .v { font-size: 18px; font-weight: 700; }
  .macro .l { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .macro.kcal .v { color: var(--accent); }

  .food-totals { padding: 14px; }
  .food-totals .totals-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 10px; }
  .food-totals .totals-head .big { font-size: 22px; font-weight: 800; color: var(--text); }
  .food-totals .totals-head .sub { font-size: 12px; color: var(--text-muted); }
  .macro-bar { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
  .macro-bar .lbl { width: 64px; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .macro-bar .vals { width: 88px; color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .macro-bar .track { flex: 1; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
  .macro-bar .fill { display: block; height: 100%; border-radius: 999px; transition: width 0.3s ease; }
  .macro-bar.kcal .fill { background: linear-gradient(90deg, var(--progress-from, #818cf8), var(--progress-to, #a78bfa)); }
  .macro-bar.p .fill { background: #f87171; }
  .macro-bar.c .fill { background: #fbbf24; }
  .macro-bar.f .fill { background: #60a5fa; }

  .add-meal-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; margin: 14px 0;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .add-meal-btn:active { opacity: 0.85; transform: scale(0.99); }
  .add-meal-btn svg { width: 18px; height: 18px; }

  .meal-row { display: flex; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .meal-row:last-child { border-bottom: none; }
  .meal-row:active { background: var(--surface-2); }
  .meal-row .thumb { width: 56px; height: 56px; border-radius: 10px; background: var(--surface-2); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .meal-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .meal-row .thumb .ph { color: var(--text-dim); font-size: 22px; }
  .meal-row .body { flex: 1; min-width: 0; }
  .meal-row .name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .meal-row .meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
  .meal-row .meta b { color: var(--text); font-weight: 700; }
  .meal-row .time { font-size: 11px; color: var(--text-dim); margin-left: 8px; flex-shrink: 0; }
  .meal-empty { padding: 24px 14px; text-align: center; color: var(--text-muted); font-size: 13px; }

  .meal-modal-form label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .meal-modal-form input[type=text], .meal-modal-form input[type=number], .meal-modal-form textarea {
    width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; outline: none;
  }
  .meal-modal-form .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .meal-modal-form .grid4 input { padding: 8px 10px; font-size: 13px; text-align: center; }
  .meal-photo-preview {
    width: 100%; max-height: 96px; object-fit: cover; border-radius: 10px;
    background: var(--surface-2); display: block; margin-bottom: 10px;
  }
  .meal-photo-empty {
    width: 100%; padding: 12px; border: 1px dashed var(--border); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--text-muted); font-size: 13px; font-weight: 600;
    background: var(--surface-2); margin-bottom: 10px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .meal-photo-empty:hover { border-color: var(--accent); color: var(--text); }
  .meal-photo-empty:active { transform: scale(0.98); }
  .macro.p .v { color: #f87171; }
  .macro.c .v { color: #60a5fa; }
  .macro.f .v { color: #fbbf24; }

  .checklist { list-style: none; padding: 0; margin: 0; }
  .checklist li {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer;
  }
  .checklist li:first-child { border-top: none; }
  .checklist .box {
    width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--border);
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .checklist li.done .box { background: var(--success); border-color: var(--success); }
  .checklist li.done .box svg { display: block; }
  .checklist .box svg { display: none; width: 14px; height: 14px; color: white; }
  .checklist li.done .text { color: var(--text-muted); text-decoration: line-through; }
  .checklist .text b { display: block; font-size: 14px; margin-bottom: 2px; }
  .checklist .text .meta { font-size: 12px; color: var(--text-muted); }

  /* Bag-row variant: bigger tap target, single-line */
  .checklist li.bag-row { padding: 14px 0; align-items: center; }
  .checklist li.bag-row .box { width: 26px; height: 26px; margin-top: 0; }
  .checklist li.bag-row .box svg { width: 16px; height: 16px; }
  .checklist li.bag-row .text { font-size: 15px; align-self: center; }
  .checklist li.bag-row.done .text { color: var(--text-muted); text-decoration: line-through; }

  /* Skip workout button */
  .skip-cta {
    width: 100%; padding: 14px 16px; margin: 16px 0 20px;
    background: transparent; color: var(--text);
    border: 1.5px dashed var(--border); border-radius: 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s;
  }
  .skip-cta .skip-icon { color: var(--text-muted); display: inline-flex; }
  .skip-cta:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface-2); }
  .skip-cta:hover .skip-icon { color: var(--text); }
  .skip-cta:active { transform: scale(0.98); }

  /* Plan-day card with override marker */
  .plan-shifted-tag {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 6px; border-radius: 4px; background: var(--info-soft); color: var(--info);
    margin-left: 6px;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 50; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-bg.show { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface); width: 100%; max-width: 540px;
    border-radius: 24px 24px 0 0; padding: 22px 20px calc(28px + var(--safe-bottom));
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto;
  }
  .modal-bg.show .modal { transform: translateY(0); }
  .modal h3 { margin: 0 0 12px; font-size: 18px; }
  .modal-grip {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: -8px auto 14px;
  }
  .modal input[type=text], .modal input[type=search], .modal input[type=email], .modal input[type=tel], .modal input[type=password], .modal input[type=url], .modal input[type=number], .modal input[type=date], .modal input[type=time], .modal textarea {
    width: 100%; padding: 14px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 16px; margin-bottom: 12px; resize: vertical;
    color: var(--text); outline: none; font-family: inherit;
    box-sizing: border-box;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal select {
    width: 100%; padding: 12px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 16px; margin-bottom: 12px;
    color: var(--text); outline: none; font-family: inherit;
    box-sizing: border-box;
  }
  .modal textarea { min-height: 100px; font-family: inherit; }
  .modal label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Floating timer */
  .rest-timer {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: white;
    padding: 10px 16px; border-radius: 999px;
    box-shadow: 0 8px 24px rgba(129, 140, 248, 0.35);
    font-weight: 700; font-size: 14px;
    display: flex; align-items: center; gap: 10px;
    z-index: 35; opacity: 0; pointer-events: none; transition: all 0.25s;
  }
  .rest-timer.show {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .rest-timer .secs { font-variant-numeric: tabular-nums; min-width: 30px; }
  .rest-timer button { color: white; opacity: 0.85; font-weight: 600; padding: 0 4px; font-size: 13px; }

  /* Routine */
  .routine-row {
    display: grid; grid-template-columns: 56px 1fr;
    padding: 10px 0; border-top: 1px solid var(--border); gap: 10px; font-size: 13px;
  }
  .routine-row:first-child { border-top: none; }
  .routine-row .time { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }

  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 70px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface-3); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 500; z-index: 60;
    opacity: 0; pointer-events: none; transition: all 0.25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--border); cursor: pointer; gap: 12px;
  }
  .list-item:first-child { border-top: none; }
  .list-item .right { color: var(--text-muted); font-size: 13px; display: flex; align-items: center; gap: 6px; }

  /* Photo grid */
  .photo-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px;
  }
  .photo-grid .ph {
    aspect-ratio: 3/4; background: var(--surface-2); border-radius: 10px;
    background-size: cover; background-position: center; position: relative;
    cursor: pointer; border: 1px solid var(--border);
  }
  .photo-grid .ph .dt {
    position: absolute; bottom: 4px; left: 4px;
    background: rgba(0,0,0,0.55); color: white;
    font-size: 10px; padding: 2px 5px; border-radius: 4px;
  }
  .photo-grid .add {
    aspect-ratio: 3/4; background: var(--surface-2); border: 1px dashed var(--border);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 24px; cursor: pointer;
  }

  /* Water cups */
  .water-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin: 10px 0;
  }
  .cup {
    aspect-ratio: 1; border-radius: 10px; background: var(--surface-2);
    border: 1px solid var(--border); display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .cup.full { background: linear-gradient(180deg, transparent 30%, #60a5fa 30%); border-color: #60a5fa; }
  .cup svg { width: 16px; height: 16px; color: var(--text-dim); }
  .cup.full svg { color: white; }

  /* Sleep bars */
  .sleep-bars {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; align-items: end;
    height: 100px; margin: 10px 0;
  }
  .sleep-bars .col { display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .sleep-bars .col .bar {
    width: 100%; flex: 1; background: var(--surface-3); border-radius: 6px;
    position: relative; overflow: hidden; display: flex; align-items: flex-end;
  }
  .sleep-bars .col .bar > span {
    display: block; width: 100%; background: linear-gradient(180deg, #818cf8, #6366f1);
    border-radius: 6px;
  }
  .sleep-bars .col .bar.target8::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 67%;
    height: 1px; background: rgba(250, 204, 21, 0.6);
  }
  .sleep-bars .col .lbl { font-size: 10px; color: var(--text-dim); }
  .sleep-bars .col .v { font-size: 11px; font-weight: 700; }

  .measurement-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  }
  .measurement-grid .item {
    background: var(--surface-2); border-radius: 10px; padding: 10px;
  }
  .measurement-grid .item .l { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .measurement-grid .item .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .measurement-grid .item .delta { font-size: 11px; margin-top: 2px; }
  .measurement-grid .item .delta.up { color: var(--success); }
  .measurement-grid .item .delta.dn { color: var(--danger); }

  /* Plate calc result */
  .plate-result {
    background: var(--surface-2); border-radius: 12px;
    padding: 12px; margin-top: 8px; display: flex;
    flex-wrap: wrap; gap: 6px; justify-content: center;
  }
  .plate {
    padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 13px;
    color: white; min-width: 44px; text-align: center;
  }
  .p25 { background: #ef4444; }
  .p20 { background: #3b82f6; }
  .p15 { background: #facc15; color: #1c1c20; }
  .p10 { background: #22c55e; }
  .p5  { background: #f8fafc; color: #1c1c20; }
  .p2  { background: #6b7280; }
  .p1  { background: #4b5563; }

  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  /* === v0.3 accordion + new set row === */
  .exercise { padding: 0; }
  .ex-header-clickable {
    width: 100%; padding: 14px;
    display: flex; align-items: center; gap: 12px;
    text-align: left; background: transparent; cursor: pointer;
    transition: background 0.15s;
    border: none; color: inherit;
  }
  .ex-header-clickable:active { background: var(--surface-2); }
  .modal-image {
    width: 100%;
    border-radius: 14px;
    background: var(--surface-2);
    display: block;
    border: 1px solid var(--border);
    margin-bottom: 4px;
    aspect-ratio: 4 / 3;
    object-fit: cover;
  }
  .ex-status { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sets-count {
    font-size: 12px; font-weight: 700;

    background: var(--surface-2); color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .sets-count.all-done { background: var(--success-soft); color: var(--success); }
  .chevron {
    font-size: 24px; color: var(--text-dim); line-height: 1;
    transition: transform 0.2s; display: inline-block; font-weight: 300;
  }
  .chevron.open { transform: rotate(90deg); color: var(--accent); }

  .ex-body { padding: 12px 14px 14px; border-top: 1px solid var(--border); }
  .exercise.collapsed .ex-body { display: none; }

  .ex-icons-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .icon-btn-labeled {
    height: 56px; padding: 6px 8px;
    flex: 1; min-width: 60px;
    flex-direction: column; gap: 4px;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); border: 1px solid var(--border);
    background: var(--surface-2); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn-labeled:active { transform: scale(0.94); }
  .icon-btn-labeled svg { width: 18px; height: 18px; }
  .icon-btn-labeled .label { font-size: 10px; }
  .icon-btn-labeled.has-data { color: var(--accent); border-color: rgba(129, 140, 248, 0.3); }

  .sets-v2 { display: flex; flex-direction: column; }
  .set-v2 {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 0; border-top: 1px solid var(--border);
  }
  .set-v2:first-child { border-top: none; padding-top: 4px; }
  .set-badge {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface-3); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;
  }
  .set-v2.done .set-badge { background: var(--success); color: white; }

  .set-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

    font-size: 11px; color: var(--text-dim);

    font-size: 17px; font-weight: 700; color: var(--text);

    font-size: 17px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;

    grid-template-columns: 56px 44px 1fr 44px;

  .stepper-label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);

    width: 44px; height: 38px; border-radius: 10px;
    background: var(--surface-2); color: var(--text);

    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;

    background: var(--bg); border: 1px solid var(--border);

    width: 100%; background: var(--surface-2);

    align-items: flex-start; gap: 4px;
    text-align: left; position: relative;
    transition: all 0.15s; color: inherit;

  .swap-option.active { background: var(--accent-soft); border-color: var(--accent); }
  .swap-option .swap-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .swap-option .swap-tag {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700;

  /* === Home page === */
  .greeting { padding: 2px 0 12px; }
  .greeting .name {
    font-size: 16px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: -0.01em;
  }

    margin: 4px 0 14px;

  }

  }
  .day-card .d-bar-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    margin-top: 6px;
    font-weight: 500;
  }
  .day-card .d-bar-meta b { color: var(--text); font-weight: 700; }
  .quote-card {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px 16px 28px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

    content: '"';

    top: -18px; left: 8px;

    pointer-events: none;
    line-height: 1;
  }
  .quote-text {
    font-size: 16px; font-style: italic;
    line-height: 1.5; color: var(--text);
    position: relative;
  }
  .quote-author {
    font-size: 11px; color: var(--accent);
    font-weight: 700; margin-top: 8px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .today-cta {
    width: 100%;
    background: linear-gradient(155deg, var(--accent) 0%, var(--accent-strong) 100%);

    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 14px;
    text-align: left;
    border: none;
    box-shadow: 0 8px 24px rgba(129, 140, 248, 0.28);

  .today-cta:active { transform: scale(0.99); }
  .today-cta .today-label {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.1em; opacity: 0.9;
  }
  .today-cta .today-stats {
    font-size: 28px; font-weight: 700;
    margin: 6px 0 12px; letter-spacing: -0.02em;
  }
  .today-cta .today-progress { margin-bottom: 14px; }
  .today-cta .today-progress .progress-bar { background: rgba(255,255,255,0.25); }
  .today-cta .today-progress .progress-bar > span { background: white; }
  .today-cta .today-cta-text {
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .warmup-cta {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;

    box-shadow: 0 0 0 3px var(--accent-soft);

  .warmup-cta .warmup-cta-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .warmup-cta .warmup-cta-icon svg { width: 20px; height: 20px; }
  .warmup-cta .warmup-cta-text { display: flex; flex-direction: column; gap: 2px; flex: 1; }

  .home-focus {
    padding: 8px 4px 24px;
    display: flex; flex-direction: column; align-items: stretch;
  }
  .home-focus .focus-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .home-focus .focus-exit {
    color: var(--text-muted);
    font-size: 13px; font-weight: 600;
    padding: 8px 10px; margin: -8px -10px;
    border-radius: 10px;
  }
  .home-focus .focus-exit:active { background: var(--surface-2); }
  .home-focus .focus-day {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .home-focus .focus-label {
    text-align: center;
    font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .home-focus .focus-countdown,
  .home-focus .focus-timer {
    text-align: center;
    font-size: 72px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    color: var(--text);
    margin: 4px 0 18px;
    line-height: 1;
  }
  .home-focus .focus-progress {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    margin: 0 8px 10px;
  }
  .home-focus .focus-progress > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-strong));
    border-radius: 999px;
    transition: width 0.3s linear;
  }
  .home-focus .focus-meta {
    display: flex; justify-content: space-between;
    padding: 0 8px;
    font-size: 12px; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
  }
  .home-focus .focus-upnext {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .home-focus .focus-hint {
    margin-top: 14px;
    padding: 8px 12px;
    background: var(--surface-2);
    border-radius: 999px;
    display: inline-flex; align-self: center; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-weight: 500;
  }
  .home-focus .focus-hint svg { color: var(--accent); }

  /* Floating Pause FAB — always visible during an active phase, sits above the tab bar bottom-right */
  .fab-pause {
    position: fixed;
    right: 20px;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 18px);
    z-index: 50;
    height: 60px;
    padding: 0 22px 0 18px;
    border-radius: 999px;
    background: var(--accent);
    color: #1a1004;
    box-shadow: 0 10px 30px rgba(129, 140, 248, 0.42), 0 2px 6px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 8px;
    font-size: 16px; font-weight: 800;
    letter-spacing: 0.02em;
    border: none;
    transition: transform 0.12s, box-shadow 0.2s;
  }
  .fab-pause:active {
    transform: scale(0.96);
    box-shadow: 0 4px 14px rgba(129, 140, 248, 0.32);
  }
  .fab-pause svg { width: 22px; height: 22px; }
  /* When any modal is open, get the floating FABs out of the way so they don't
     overlap the modal sheet (the Pause FAB on the gym workout was blocking the
     "Ask" modal during an active session). */
  body.modal-open .fab-pause,
  body.modal-open .coach-fab { display: none !important; }

  .quick-log {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 14px;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--text);
    transition: all 0.15s;
  }
  .quick-btn:active {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: scale(0.97);
  }
  .quick-icon { font-size: 22px; line-height: 1; }
  .quick-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .nudge {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .nudge:first-child { border-top: none; padding-top: 4px; }
  .nudge.clickable { cursor: pointer; }
  .nudge.clickable:active { opacity: 0.7; }
  .nudge-icon { font-size: 18px; flex-shrink: 0; }
  .nudge-text { flex: 1; color: var(--text); }
  .nudge-arrow { color: var(--text-dim); font-size: 18px; }

  /* delete set button */
  .set-actions .icon-btn.delete-set { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

  /* Rings row (3 small circular progress cards) */
  .rings-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .ring-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .ring-card .ring {
    width: 56px; height: 56px;
    position: relative;
  }
  .ring-card .ring svg { transform: rotate(-90deg); }
  .ring-card .ring-bg { fill: none; stroke: var(--surface-3); stroke-width: 5; }
  .ring-card .ring-fg {
    fill: none; stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }
  .ring-card .ring-label {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .ring-card .ring-info { text-align: center; }
  .ring-card .ring-info .num {
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .ring-card .ring-info .lbl {
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 600; margin-top: 2px;
  }

  /* Rest-day CTA — calm green instead of training orange */
  .today-cta.rest {
    background: linear-gradient(155deg, #16a34a 0%, #15803d 100%);
    box-shadow: 0 8px 24px rgba(22, 163, 74, 0.25);
  }

  /* PR celebration toast */
  .toast.celebrate {
    background: linear-gradient(135deg, var(--pr), #fbbf24);
    color: #1c1c20; font-weight: 700;
    border: none;
    box-shadow: 0 8px 28px rgba(250, 204, 21, 0.4);
    padding: 14px 22px; font-size: 14px;
  }

  /* Workout history detail row */
  .history-ex {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
  }
  .history-ex .name { font-size: 14px; font-weight: 600; }
  .history-ex .sets { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* Manage entries list */
  .entry-list { list-style: none; padding: 0; margin: 12px 0 0; }
  .entry-list li {
    display: flex; gap: 10px; align-items: center;
    padding: 10px 0; border-top: 1px solid var(--border);
  }
  .entry-list li:first-child { border-top: none; }
  .entry-list .info { flex: 1; }
  .entry-list .date { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .entry-list .val { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .entry-list .actions { display: flex; gap: 6px; }

  .lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg); padding: 24px; gap: 14px;
  }
  .lock-screen .lock-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
  .lock-screen .lock-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 6px; }
  .lock-screen input {
    width: 220px; max-width: 80vw; text-align: center; font-size: 18px;
    padding: 14px 16px; border-radius: 12px; border: 1px solid var(--surface-2);
    background: var(--surface-1); color: var(--text); outline: none;
  }
  .lock-screen input#lockPin { letter-spacing: 8px; font-size: 22px; }
  .lock-screen input:focus { border-color: var(--accent); }
  .lock-screen button {
    margin-top: 4px; padding: 12px 32px; font-size: 16px; font-weight: 600;
    background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer;
  }
  .lock-screen .lock-error { color: var(--danger); font-size: 13px; min-height: 18px; }
  body.locked > div:not(.lock-screen), body.locked > nav { display: none !important; }

  .gym-back-link {
    display: inline-block; font-size: 12px; color: var(--text-muted);
    margin-right: 10px; cursor: pointer; user-select: none;
    padding: 4px 8px; border-radius: 8px; background: var(--surface-1);
  }
  .gym-back-link:active { background: var(--surface-2); color: var(--text); }
  .mode-pill { cursor: pointer; user-select: none; }
  .mode-pill:active { opacity: 0.7; }

  /* === MASTALIFE DASHBOARD === */
  .ml-section { margin-bottom: 14px; }
  .ml-section-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin: 0 4px 8px;
  }
  .ml-section-head .ml-section-meta { font-weight: 600; letter-spacing: 0.04em; text-transform: none; }

  .ml-card {
    background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 16px; padding: 14px 16px;
  }
  .ml-card.compact { padding: 12px 14px; }
  .ml-card-clickable { cursor: pointer; transition: background 0.15s; }
  .ml-card-clickable:active { background: var(--surface-2); }

  /* Hero "today" card */
  .ml-hero {
    display: block; width: 100%; text-align: left;
    border: 1px solid var(--surface-2); background: var(--surface-1);
    border-radius: 18px; padding: 18px 18px 16px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .ml-hero:active { background: var(--surface-2); }
  .ml-hero.is-active { border-color: var(--accent); background: linear-gradient(155deg, rgba(129,140,248,0.10), transparent); }
  .ml-hero .h-top { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .ml-hero .h-big { font-size: 22px; font-weight: 800; line-height: 1.15; margin-bottom: 10px; color: var(--text); }
  .ml-hero .h-bar { height: 6px; background: var(--surface-3); border-radius: 999px; overflow: hidden; margin-bottom: 12px; }
  .ml-hero .h-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); border-radius: 999px; transition: width 0.3s; }
  .ml-hero .h-cta { font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 4px; }

  /* TO DO TODAY list */
  .todo-list { list-style: none; padding: 0; margin: 0; }
  .todo-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-top: 1px solid var(--surface-2);
    cursor: pointer; transition: background 0.12s;
  }
  .todo-list li:first-child { border-top: none; }
  .todo-list li:active { background: var(--surface-2); }
  .todo-list li.done .t-title { color: var(--text-muted); text-decoration: line-through; }
  .todo-list .t-icon {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--text-muted);
  }
  .todo-list li.done .t-icon { background: var(--success-soft); color: var(--success); }
  .todo-list .t-icon svg { width: 18px; height: 18px; }
  .todo-list .t-body { flex: 1; min-width: 0; }
  .todo-list .t-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .todo-list .t-meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .todo-list .t-status { font-size: 12px; color: var(--text-muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .todo-list li.done .t-status { color: var(--success); }
  .todo-list .t-chev { color: var(--text-dim); }

  /* Mini stats row */
  .ml-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ml-stat {
    background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 12px; padding: 12px; text-align: left;
  }
  .ml-stat .s-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .ml-stat .s-val { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.05; }
  .ml-stat .s-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Info bar (Bedtime / Work / Gym) — bigger so each line reads easily on phone */
  .bedtime-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-radius: 16px; padding: 16px 18px; margin: 0;
    background: var(--surface-1); border: 1px solid var(--surface-2);
    text-align: left; gap: 12px; cursor: pointer;
    width: 100%;
  }
  .bedtime-bar:active { background: var(--surface-2); }
  .bedtime-bar .b-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--surface-2); color: var(--accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .bedtime-bar .b-icon svg { width: 22px; height: 22px; }
  .bedtime-bar .b-mid { flex: 1; min-width: 0; }
  .bedtime-bar .b-mid b {
    display: block; font-size: 16px; font-weight: 700; color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bedtime-bar .b-mid span { font-size: 13px; color: var(--text-muted); }
  .bedtime-bar .b-right {
    font-size: 13px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; font-weight: 600; flex-shrink: 0;
  }

  /* Tasks list */
  .tasks-add-row { display: flex; gap: 8px; align-items: center; padding: 10px 14px; }
  .tasks-add-row input {
    flex: 1; background: var(--surface-2); border: 1px solid transparent;
    color: var(--text); padding: 9px 12px; border-radius: 10px; font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .tasks-add-row input:focus { border-color: var(--accent); }
  .tasks-add-row button {
    background: var(--accent); color: white; border: none; border-radius: 10px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .tasks-add-row button:active { transform: scale(0.96); }
  .ml-task-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-top: 1px solid var(--surface-2);
  }
  .ml-task-row:first-child { border-top: none; }
  .ml-task-row .check {
    width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    cursor: pointer; transition: all 0.15s;
  }
  .ml-task-row .check svg { width: 14px; height: 14px; color: white; display: none; }
  .ml-task-row.done .check { background: var(--success); border-color: var(--success); }
  .ml-task-row.done .check svg { display: block; }
  .ml-task-row .t-text { flex: 1; font-size: 14px; color: var(--text); cursor: pointer; word-break: break-word; }
  .ml-task-row.done .t-text { color: var(--text-muted); text-decoration: line-through; }
  .ml-task-row .t-del { color: var(--text-dim); padding: 6px; cursor: pointer; }
  .ml-task-row .t-del:active { color: var(--danger); }
  .ml-task-row .t-del svg { width: 16px; height: 16px; }
  .ml-empty {
    padding: 18px 14px; text-align: center; color: var(--text-muted); font-size: 13px;
  }

  /* AI parser hero — full-width banner CTA */
  .ai-parse-cta {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 16px 18px;
    background: linear-gradient(135deg, rgba(129,140,248,0.20), rgba(99,102,241,0.20));
    color: var(--text); border: 1px solid rgba(129,140,248,0.45);
    border-radius: 16px; cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .ai-parse-cta:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(129,140,248,0.28), rgba(99,102,241,0.28));
  }
  .ai-parse-cta:active { transform: scale(0.99); }
  .ai-parse-cta .ai-spark {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0; line-height: 1;
  }
  .ai-parse-cta .ai-text {
    flex: 1; display: flex; flex-direction: column; gap: 2px;
  }
  .ai-parse-cta .ai-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .ai-parse-cta .ai-sub { font-size: 13px; color: var(--text-muted); }
  .ai-parse-cta .ai-arrow { color: var(--text-dim); flex-shrink: 0; }
  .ai-parse-cta.disabled { background: var(--surface-1); border-color: var(--surface-2); }
  .ai-parse-cta.disabled .ai-spark { background: var(--surface-2); color: var(--text-muted); }
  .ai-parse-cta.disabled .ai-title { color: var(--text-muted); }

  /* Schedule rows on dashboard / Tasks tab */
  .schedule-list { list-style: none; padding: 0; margin: 0; }
  .schedule-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-top: 1px solid var(--surface-2);
    cursor: pointer; transition: background 0.12s;
  }
  .schedule-list li:first-child { border-top: none; }
  .schedule-list li:active { background: var(--surface-2); }
  .schedule-list .s-time {
    font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text); width: 48px; flex-shrink: 0;
  }
  .schedule-list .s-time.notime { color: var(--text-dim); font-weight: 600; }
  .schedule-list .s-check {
    width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .schedule-list .s-check svg { width: 14px; height: 14px; color: white; display: none; }
  .schedule-list li.done .s-check { background: var(--success); border-color: var(--success); }
  .schedule-list li.done .s-check svg { display: block; }
  .schedule-list .s-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .schedule-list .s-title { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .schedule-list li.done .s-title { color: var(--text-muted); text-decoration: line-through; }
  .schedule-list .s-meta { font-size: 11px; color: var(--text-muted); }
  .schedule-list .s-del { color: var(--text-dim); padding: 6px; cursor: pointer; }
  .schedule-list .s-del:active { color: var(--danger); }
  .schedule-list .s-del svg { width: 16px; height: 16px; }

  /* Repeat icon + category chip */
  .repeat-ico { color: var(--accent); font-size: 12px; line-height: 1; }
  .cat-chip {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px;
  }
  .cat-work { background: rgba(96,165,250,0.18); color: #93c5fd; }
  .cat-personal { background: rgba(244,114,182,0.18); color: #f9a8d4; }
  .cat-gym { background: rgba(167,139,250,0.18); color: #c4b5fd; }
  .cat-health { background: rgba(74,222,128,0.18); color: #86efac; }
  .cat-family { background: rgba(251,191,36,0.18); color: #fcd34d; }

  /* Group headers in Tasks list */
  .group-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px 6px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
  }
  .group-head .group-meta { font-weight: 600; letter-spacing: 0.04em; text-transform: none; color: var(--text-dim); }

  /* Preview modal task rows */
  .preview-row {
    background: var(--surface-2); border: 1px solid transparent;
    border-radius: 12px; padding: 12px; margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .preview-row.skipped { opacity: 0.45; }
  .preview-row.expanded { border-color: var(--accent); }
  .preview-row .pr-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .preview-row .pr-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .preview-row .pr-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .preview-row .pr-actions button {
    background: transparent; border: 1px solid var(--surface-3); color: var(--text-muted);
    padding: 4px 10px; border-radius: 8px; font-size: 11px; cursor: pointer;
  }
  .preview-row .pr-actions button.danger { color: var(--danger); border-color: rgba(239,68,68,0.35); }
  .preview-row .pr-edit { display: flex; flex-direction: column; gap: 6px; padding-top: 6px; border-top: 1px solid var(--surface-3); }
  .preview-row .pr-edit label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin: 0; }
  .preview-row .pr-edit input, .preview-row .pr-edit select {
    background: var(--surface-1); border: 1px solid var(--surface-3); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-size: 13px;
  }

  /* AI parser textarea */
  .ai-textarea {
    width: 100%; min-height: 180px;
    background: var(--surface-2); border: 1px solid var(--surface-3); color: var(--text);
    padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5;
    font-family: inherit; resize: vertical; outline: none;
  }
  .ai-textarea:focus { border-color: var(--accent); }
  .date-context-row { display: flex; gap: 8px; margin: 12px 0; }
  .date-context-row .opt {
    flex: 1; padding: 10px; border-radius: 10px; cursor: pointer;
    background: var(--surface-2); border: 1px solid var(--surface-3); color: var(--text-muted);
    text-align: center; font-size: 13px; font-weight: 600; transition: all 0.15s;
  }
  .date-context-row .opt.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .ai-loading {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 24px; color: var(--text-muted); font-size: 13px;
  }
  .ai-loading .spinner {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--surface-3); border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Coach FAB — floating ✨ button on every screen */
  .coach-fab {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 14px);
    right: 14px;
    width: 56px; height: 56px; border-radius: 50%;
    z-index: 30;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: white;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 2px 8px rgba(129,140,248,0.4);
    cursor: pointer;
    border: none;
    font-size: 24px;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .coach-fab:active { transform: scale(0.92); }

  /* Coach briefing — proactive daily analysis card */
  .briefing-section { padding: 14px 16px; }
  .briefing-section .b-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
  }
  .briefing-section .b-head .b-meta { font-weight: 600; letter-spacing: 0.04em; color: var(--text-dim); text-transform: none; }
  .briefing-section .b-head .b-refresh {
    background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--surface-3);
    border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .briefing-section .b-head .b-refresh:active { transform: scale(0.95); }
  .briefing-section .b-body { font-size: 14px; line-height: 1.55; color: var(--text); }

  .brief-caution {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 10px; margin-top: 6px;
    font-size: 13px; line-height: 1.45;
  }
  .brief-caution.warn {
    background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.35); color: #fcd34d;
  }
  .brief-caution.info {
    background: var(--info-soft); border: 1px solid rgba(96,165,250,0.35); color: var(--info);
  }
  .brief-caution::before {
    content: '⚠'; flex-shrink: 0; font-size: 14px; margin-top: 1px; opacity: 0.85;
  }
  .brief-caution.info::before { content: 'i'; font-style: italic; font-weight: 700; font-family: serif; padding: 0 4px; }

  .exsug-row {
    display: grid; grid-template-columns: 1fr auto; gap: 6px 10px;
    padding: 10px 0; border-top: 1px solid var(--surface-2);
    align-items: start;
  }
  .exsug-row:first-of-type { border-top: none; padding-top: 4px; }
  .exsug-row .exsug-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .exsug-row .exsug-advice { grid-column: 1 / -1; font-size: 12.5px; color: var(--text-muted); line-height: 1.45; }
  .verdict-chip {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px; align-self: start; white-space: nowrap;
  }
  .verdict-chip.bump   { background: var(--success-soft); color: var(--success); }
  .verdict-chip.keep   { background: var(--surface-3); color: var(--text-muted); }
  .verdict-chip.reduce { background: var(--warn-soft); color: var(--warn); }
  .verdict-chip.swap   { background: var(--info-soft); color: var(--info); }
  .verdict-chip.focus  { background: var(--accent-soft); color: var(--accent); }

  .brief-progress {
    font-size: 13.5px; font-style: italic; line-height: 1.55; color: var(--text);
    padding: 4px 0 2px;
  }
  .brief-highlights {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .brief-highlights .hchip {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--surface-3);
    padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
  }

  /* Session review cards — one per finished session */
  .sr-card {
    padding: 14px 16px; margin-bottom: 10px;
    border: 1px solid var(--surface-2); background: var(--surface-1);
    border-radius: 14px;
  }
  .sr-card .sr-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 8px; gap: 8px;
  }
  .sr-card .sr-day { font-size: 14px; font-weight: 800; color: var(--text); }
  .sr-card .sr-date { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }
  .sr-card .sr-summary { font-size: 13.5px; color: var(--text); line-height: 1.5; }
  .sr-card .sr-section-lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted); margin: 10px 0 4px;
  }
  .sr-card .sr-list { margin: 0; padding: 0; list-style: none; }
  .sr-card .sr-list li {
    font-size: 12.5px; line-height: 1.5; color: var(--text);
    padding: 3px 0 3px 14px; position: relative;
  }
  .sr-card .sr-list li::before {
    content: '•'; position: absolute; left: 4px; color: var(--accent);
  }
  .sr-card .sr-list.cautions li::before { color: var(--warn); }
  .sr-card .sr-progress {
    margin-top: 10px; padding: 8px 10px;
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 8px; font-size: 12.5px; line-height: 1.5; color: var(--text);
    font-style: italic;
  }

  /* Coach chat */
  .coach-chat {
    display: flex; flex-direction: column; gap: 10px;
    max-height: 50vh; overflow-y: auto;
    padding: 4px 2px 8px;
    margin-bottom: 8px;
  }
  .coach-msg {
    padding: 10px 14px; border-radius: 14px;
    max-width: 88%;
    font-size: 14px; line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .coach-msg.user {
    background: var(--accent-soft); color: var(--text);
    align-self: flex-end; border-bottom-right-radius: 4px;
  }
  .coach-msg.assistant {
    background: var(--surface-2); color: var(--text);
    align-self: flex-start; border-bottom-left-radius: 4px;
    border: 1px solid var(--surface-3);
  }
  .coach-msg.thinking { font-style: italic; color: var(--text-muted); }
  .coach-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .coach-input-row textarea {
    flex: 1; background: var(--surface-2); border: 1px solid var(--surface-3);
    color: var(--text); padding: 10px 12px; border-radius: 12px;
    font-size: 14px; font-family: inherit; resize: none;
    min-height: 44px; max-height: 120px; outline: none;
    transition: border-color 0.15s;
  }
  .coach-input-row textarea:focus { border-color: var(--accent); }
  .coach-input-row .send-btn {
    background: var(--accent); color: white; border: none; border-radius: 10px;
    padding: 0 18px; height: 44px; font-size: 14px; font-weight: 700; cursor: pointer;
    flex-shrink: 0;
  }
  .coach-input-row .send-btn:disabled { opacity: 0.5; }
  .coach-input-row .send-btn:active { transform: scale(0.95); }

  /* Feel log card */
  .feel-card { padding: 14px 16px; }
  .feel-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .feel-row .label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.04em; min-width: 56px; }
  .feel-chip {
    background: var(--surface-2); border: 1px solid var(--surface-3); color: var(--text-muted);
    padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all 0.12s;
  }
  .feel-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .feel-chip:active { transform: scale(0.94); }

  /* MastaLife quote (small) */
  .ml-quote {
    font-size: 13px; font-style: italic; color: var(--text-muted);
    line-height: 1.4; margin: -6px 4px 12px;
  }
  .ml-quote .author { display: block; font-size: 11px; color: var(--text-dim); font-style: normal; margin-top: 2px; }

  /* Gratitude / focus input card — matches the info bar size */
  .focus-card {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 16px; transition: border-color 0.15s;
  }
  .focus-card:focus-within { border-color: var(--accent); }
  .focus-card .focus-ico {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--surface-2); color: var(--accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .focus-card .focus-ico svg { width: 22px; height: 22px; }
  .focus-card input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; font-weight: 600;
  }
  .focus-card input::placeholder { color: var(--text-dim); font-weight: 400; }
  .focus-card .polish-btn {
    flex-shrink: 0; background: var(--accent-soft); color: var(--accent);
    border: none; padding: 10px 14px; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; line-height: 1;
    min-width: 44px;
  }
  .focus-card .polish-btn:hover { background: rgba(129,140,248,0.22); }
  .focus-card .polish-btn:active { transform: scale(0.94); }
  .focus-card .polish-btn:disabled { opacity: 0.5; cursor: default; }

  /* Week calendar (vertical list of day cards) */
  .cal-week { display: flex; flex-direction: column; gap: 8px; }
  .cal-day {
    background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 12px; padding: 12px 14px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .cal-day:active { background: var(--surface-2); }
  .cal-day.is-today {
    border-color: var(--accent);
    background: linear-gradient(155deg, var(--accent-soft), transparent);
  }
  .cal-day.is-past { opacity: 0.65; }
  .cal-day.is-past.has-done { opacity: 1; }
  .cal-day .cd-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px; gap: 8px;
  }
  .cal-day .cd-date {
    font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text);
  }
  .cal-day.is-today .cd-date { color: var(--accent); }
  .cal-day.is-past .cd-date { color: var(--text-muted); }
  .cal-day .cd-today-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; background: var(--accent-soft); color: var(--accent);
  }
  .cal-day .cd-meta {
    font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.04em;
  }
  .cal-day .cd-items { display: flex; flex-direction: column; gap: 4px; }
  .cal-day .cd-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text); line-height: 1.3;
  }
  .cal-day .cd-item.done { color: var(--text-muted); text-decoration: line-through; }
  .cal-day .cd-icon {
    width: 14px; height: 14px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cal-day .cd-icon svg { width: 14px; height: 14px; }
  .cal-day .cd-icon.gym { color: var(--accent); }
  .cal-day .cd-icon.task { color: var(--text-dim); font-size: 11px; }
  .cal-day .cd-time {
    font-size: 11px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; min-width: 38px;
    font-weight: 600;
  }
  .cal-day .cd-empty {
    font-size: 12px; color: var(--text-dim); font-style: italic;
    padding: 2px 0;
  }
  .cal-day .cd-rep {
    font-size: 10px; color: var(--accent);
    margin-left: 2px;
  }

  /* Calendar tab — rich day cards */
  .cal-day-big {
    background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 14px; padding: 14px 16px;
    margin-bottom: 10px;
  }
  .cal-day-big.is-today {
    border-color: var(--accent);
    background: linear-gradient(155deg, var(--accent-soft), transparent);
  }
  .cal-day-big.is-past { opacity: 0.65; }
  .cal-day-big.is-past.has-done { opacity: 1; }
  .cdb-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--surface-2);
  }
  .cdb-head-left { display: flex; align-items: baseline; gap: 8px; }
  .cdb-dow { font-size: 16px; font-weight: 800; color: var(--text); }
  .cal-day-big.is-today .cdb-dow { color: var(--accent); }
  .cdb-sub {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--text-muted);
  }
  .cdb-today-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; background: var(--accent-soft); color: var(--accent);
  }
  .cdb-count { font-size: 11px; font-weight: 600; color: var(--text-dim); }
  .cdb-body { display: flex; flex-direction: column; gap: 8px; }
  .cdb-gym {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--accent-soft);
    border-radius: 10px; cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .cdb-gym:active { background: rgba(129,140,248,0.20); }
  .cdb-gym.done { opacity: 0.55; }
  .cdb-gym-icon { color: var(--accent); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .cdb-gym-icon svg { width: 18px; height: 18px; }
  .cdb-gym-body { flex: 1; min-width: 0; }
  .cdb-gym-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .cdb-gym.done .cdb-gym-title { text-decoration: line-through; }
  .cdb-gym-focus { font-size: 11px; color: var(--text-muted); }
  .cdb-task {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px;
  }
  .cdb-task.done .cdb-task-text { color: var(--text-muted); text-decoration: line-through; }
  .cdb-task-time {
    font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text-muted); min-width: 44px;
  }
  .cdb-task-text { flex: 1; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .cdb-task-check {
    width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    cursor: pointer; transition: all 0.15s;
  }
  .cdb-task-check svg { width: 14px; height: 14px; color: white; display: none; }
  .cdb-task.done .cdb-task-check { background: var(--success); border-color: var(--success); }
  .cdb-task.done .cdb-task-check svg { display: block; }
  .cdb-empty {
    font-size: 12px; color: var(--text-dim); font-style: italic; padding: 4px 0;
  }
  .cdb-group-head {
    margin: 14px 4px 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .cdb-group-head .group-meta { font-weight: 600; letter-spacing: 0.04em; text-transform: none; color: var(--text-dim); }
  .calendar-range {
    font-size: 12px; color: var(--text-muted); padding: 0 4px 8px;
  }

  /* Quick log buttons row */
  .quick-log-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .qlog-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 6px; background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 12px; cursor: pointer; color: var(--text);
    transition: all 0.15s;
  }
  .qlog-btn:active { transform: scale(0.96); background: var(--surface-2); }
  .qlog-btn .qicon {
    width: 32px; height: 32px; border-radius: 10px; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center; color: var(--accent);
  }
  .qlog-btn .qicon svg { width: 18px; height: 18px; }
  .qlog-btn .qlbl { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-muted); }

  /* Reminders (soft) — sized to match the info bars at the top */
  .reminders-list { list-style: none; padding: 0; margin: 0; }
  .reminders-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; border-top: 1px solid var(--surface-2);
    cursor: pointer; transition: background 0.12s;
  }
  .reminders-list li:first-child { border-top: none; }
  .reminders-list li:active { background: var(--surface-2); }
  .reminders-list .r-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--surface-2); color: var(--info, var(--accent));
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .reminders-list .r-icon svg { width: 22px; height: 22px; }
  .reminders-list li.met .r-icon { background: var(--success-soft); color: var(--success); }
  .reminders-list .r-body { flex: 1; min-width: 0; }
  .reminders-list .r-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .reminders-list li.met .r-title { color: var(--text-muted); }
  .reminders-list .r-meta { font-size: 13px; color: var(--text-muted); }
  .reminders-list .r-progress {
    height: 4px; background: var(--surface-3); border-radius: 999px;
    overflow: hidden; margin-top: 6px; max-width: 110px;
  }
  .reminders-list .r-progress > span { display: block; height: 100%; background: var(--info, var(--accent)); border-radius: 999px; }
  .reminders-list .r-status { font-size: 13px; color: var(--text-muted); flex-shrink: 0; font-variant-numeric: tabular-nums; font-weight: 600; }
  .reminders-list .r-water-ctrls {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .reminders-list .water-btn {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--surface-2); color: var(--text-muted);
    border: 1px solid var(--surface-3);
    font-size: 18px; font-weight: 700; line-height: 1;
    cursor: pointer; transition: all 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .reminders-list .water-btn:hover { color: var(--text); border-color: var(--accent); }
  .reminders-list .water-btn:active { transform: scale(0.92); }
  .reminders-list .water-btn.primary { background: var(--accent-soft); color: var(--accent); border-color: rgba(129,140,248,0.35); }
  .reminders-list .water-btn.primary:hover { background: rgba(129,140,248,0.22); }

  /* Recent wins */
  .wins-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .win-card {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px; background: var(--surface-1); border: 1px solid var(--surface-2);
    border-radius: 12px;
  }
  .win-card .w-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-muted); text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
  .win-card .w-lbl svg { width: 12px; height: 12px; }
  .win-card .w-val { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.05; }
  .win-card .w-sub { font-size: 11px; color: var(--text-muted); }
  .win-card.positive .w-val { color: var(--success); }
</style>
</head>
