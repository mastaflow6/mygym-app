// Build a compact markdown context block summarising the user's recent state.
function buildCoachContext() {
  const td = today();
  const ph = currentPhase();
  const wk = currentWeek();
  const todayKey = effectiveDayKey(td);
  const todayDay = todayKey ? DAYS[todayKey] : null;
  const lines = [];
  lines.push(`# Mustapha's gym context (today: ${td})`);
  lines.push(`Program: ${ph.name} · Phase ${ph.num} · Week ${wk}. 4-day split: Push (Mon) / Pull (Tue) / Legs (Thu) / Upper+Arms (Sat).`);
  if (todayDay) {
    lines.push(`Today's planned session: **${todayDay.name}** — ${todayDay.focus}.`);
  } else {
    lines.push(`Today is a rest day.`);
  }

  // Last 8 sessions (finished or with logged sets)
  const finished = Object.entries(state.workouts || {})
    .filter(([d, w]) => isRealSession(w))
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 8);
  if (finished.length) {
    lines.push('\n## Recent finished sessions');
    for (const [d, w] of finished) {
      const mins = Math.round(((w.timers?.warmup || 0) + (w.timers?.workout || 0)) / 60000);
      const sets = Object.values(w.logs || {}).reduce((s, arr) => s + arr.filter(x => x.d).length, 0);
      const dn = (DAYS[w.dayKey] && DAYS[w.dayKey].name) || '?';
      const note = w.sessionNote ? ` — note: "${w.sessionNote}"` : '';
      lines.push(`- ${d} · ${dn} · ${sets} sets · ~${mins} min${note}`);
    }
  } else {
    lines.push('\n## Recent finished sessions\n_(none)_');
  }

  // Per-exercise notes from recent workouts
  const exNotes = [];
  for (const [d, w] of Object.entries(state.workouts || {})) {
    if (!w || !w.notes) continue;
    for (const [exId, n] of Object.entries(w.notes)) {
      if (n && String(n).trim()) exNotes.push({ d, exId, n });
    }
  }
  exNotes.sort((a, b) => b.d.localeCompare(a.d));
  if (exNotes.length) {
    lines.push('\n## Recent exercise notes');
    exNotes.slice(0, 6).forEach(e => lines.push(`- ${e.d} · ${e.exId}: "${e.n}"`));
  }

  // Recent machine variants logged (so the Coach can disambiguate load drops across machines)
  const exVariants = [];
  for (const [d, w] of Object.entries(state.workouts || {})) {
    if (!w || !w.variants) continue;
    for (const [exId, v] of Object.entries(w.variants)) {
      if (v && String(v).trim()) exVariants.push({ d, exId, v });
    }
  }
  exVariants.sort((a, b) => b.d.localeCompare(a.d));
  if (exVariants.length) {
    lines.push('\n## Recent machine variants (different machine = different load scale; don\'t compare across variants)');
    exVariants.slice(0, 10).forEach(e => lines.push(`- ${e.d} · ${e.exId} = "${e.v}"`));
  }

  // Body weight
  const bw = state.bodyWeight || [];
  if (bw.length) {
    const last = bw[bw.length - 1];
    const first = bw[0];
    const delta = last.weight - first.weight;
    lines.push(`\n## Weight\nLatest: ${last.weight} kg (${last.date}). Δ from start: ${delta >= 0 ? '+' : ''}${delta.toFixed(1)} kg.`);
  }

  // Sleep last 7
  const sl = state.sleep || [];
  if (sl.length) {
    const last7 = sl.slice(-7);
    const avg = last7.reduce((s, e) => s + e.hours, 0) / last7.length;
    lines.push(`\n## Sleep\nAvg last ${last7.length} nights: ${avg.toFixed(1)}h · goal ${state.settings.sleepTarget || 8}h.`);
  }

  // Feel logs
  const logs = recentCoachLogs(6);
  if (logs.length) {
    lines.push('\n## Recent feel logs (most recent last)');
    for (const e of logs) {
      const parts = [];
      if (typeof e.energy === 'number') parts.push(`energy ${e.energy}/5`);
      if (typeof e.soreness === 'number') parts.push(`soreness ${e.soreness}/5`);
      if (e.text) parts.push(`"${e.text}"`);
      const dk = e.dayKey != null && DAYS[e.dayKey] ? ` (${DAYS[e.dayKey].name})` : '';
      lines.push(`- ${e.date}${dk} · ${parts.join(' · ') || '(no detail)'}`);
    }
  }

  // Today's planned exercises (if workout day)
  if (todayDay) {
    lines.push(`\n## Today's exercises`);
    todayDay.exercises.slice(0, 8).forEach(ex => {
      const w = ex.bw ? 'BW' : (ex.weight + 'kg');
      lines.push(`- ${ex.name} · ${ex.sets}×${ex.repsMin}-${ex.repsMax}${ex.timed ? 's' : ''} · ${w}`);
    });
  }

  return lines.join('\n');
}

// Compact per-exercise top-set history for today's planned exercises (last ~4 entries each).
// Lets the Coach say "you hit 10 reps top set last Monday — bump to +1kg."
function buildExerciseHistorySnippet() {
  const td = today();
  const todayKey = effectiveDayKey(td);
  const day = todayKey != null ? DAYS[todayKey] : null;
  if (!day || !day.exercises) return '';
  const lines = ['## Today\'s exercises · last 4 logged top sets'];
  for (const ex of day.exercises) {
    const tops = [];
    const dates = Object.keys(state.workouts || {}).sort((a, b) => b.localeCompare(a));
    for (const d of dates) {
      if (d === td) continue; // skip in-progress today
      const w = state.workouts[d];
      const logs = (w && w.logs && w.logs[ex.id]) || [];
      if (!logs.length) continue;
      // find top set by Epley estimate (w * (1 + r/30))
      let best = null;
      for (const s of logs) {
        if (!s.d) continue;
        const wv = parseFloat(s.w) || 0;
        const rv = parseInt(s.r, 10) || 0;
        if (rv < 1) continue;
        const e = (ex.bw ? rv : wv) * (1 + rv / 30);
        if (!best || e > best.e) best = { w: wv, r: rv, d, e };
      }
      if (best) {
        const wlbl = ex.bw ? `BW × ${best.r}${ex.timed ? 's' : ''}` : `${best.w}kg × ${best.r}${ex.timed ? 's' : ''}`;
        const variant = w.variants && w.variants[ex.id];
        const vtag = variant ? ` [variant: "${variant}"]` : '';
        const note = w.notes && w.notes[ex.id];
        const ntag = (note && String(note).trim()) ? ` · note: "${String(note).trim()}"` : '';
        tops.push(`${wlbl} (${best.d})${vtag}${ntag}`);
      }
      if (tops.length >= 4) break;
    }
    const tgt = ex.bw ? `BW · target ${ex.repsMin}-${ex.repsMax}` : `target ${ex.weight}kg × ${ex.repsMin}-${ex.repsMax}`;
    lines.push(`- ${ex.name} (${tgt})`);
    tops.forEach(t => lines.push(`   · ${t}`));
    if (!tops.length) lines.push('   · (no prior logs)');
  }
  return lines.join('\n');
}

- Cautions array: only include if soreness ≥4, missed reps, or recent note flags a problem. Otherwise empty array.
- Exercise suggestions: ONE row per exercise in today's plan that has prior data. Skip exercises with no history.
- 'bump' = hit top of rep range last time → +1-2.5kg.
- 'keep' = mid rep range, stay the course.
- 'reduce' = soreness/notes flag risk OR missed reps last time.
- 'swap' = recent note explicitly asked to swap.
- 'focus' = no number change, just a form cue.
- Machine differences: a number drop across sessions does NOT mean regression when machines differ. Signals:
  (a) [variant: "..."] tag attached to the top set — different tags = different machines.
  (b) Per-exercise note or session note mentioning machine change (phrases like 'different machine', 'machine 2', 'same weight different machine', 'machine 1 today', brand cues).
  If EITHER signal indicates machine change, do NOT issue 'reduce' on load grounds — use 'keep' or 'focus' and say 'different machine, not comparable'.
- Output ONLY valid JSON. No preamble, no trailing text. Be terse.

CONTEXT:

${buildCoachContext()}

${buildExerciseHistorySnippet()}`;
}

function _briefingMostRecentSignalTs() {
  let ts = 0;
  // latest finished session timestamp (use w.finished if present, else max log timestamp)
  for (const [d, w] of Object.entries(state.workouts || {})) {
    if (!w) continue;
    if (typeof w.finished === 'number' && w.finished > ts) ts = w.finished;
    if (typeof w.started === 'number' && w.started > ts) ts = w.started;
  }
  // latest feel log
  const logs = Array.isArray(state.coachLogs) ? state.coachLogs : [];
  for (const l of logs) if (typeof l.createdAt === 'number' && l.createdAt > ts) ts = l.createdAt;
  return ts;
}

function shouldRefreshBriefing() {
  const br = state.coachBriefing;
  if (!br || !br.json || br.date !== today()) return true;
  const sig = _briefingMostRecentSignalTs();
  if (sig > (br.generatedAt || 0)) return true;
  return false;
}

async function requestCoachBriefing() {
  if (!state.settings.anthropicApiKey) throw new Error('Set up your Anthropic API key first');
  const raw = await callAnthropic({
    system: buildCoachBriefingPrompt(),
    messages: [{ role: 'user', content: 'Briefing.' }],
    maxTokens: 1400
  });
  const cleaned = _stripJsonObjectFence(raw);
  let parsed;
  try { parsed = JSON.parse(cleaned); }
  catch (_) { throw new Error('Coach returned non-JSON: ' + raw.slice(0, 150)); }
  if (!parsed || typeof parsed !== 'object') throw new Error('Coach returned invalid shape');
  state.coachBriefing = { date: today(), json: parsed, generatedAt: Date.now() };
  save();
  return parsed;
}

// ---------- Session reviews (auto-generated for the last N finished sessions) ----------

// Get the last N finished sessions, most recent first, with detailed data for review.
function getLastSessionsForReview(n) {
  const out = [];
  const dates = Object.entries(state.workouts || {})
    .filter(([d, w]) => isRealSession(w))
    .sort((a, b) => b[0].localeCompare(a[0]));
  for (const [d, w] of dates) {
    if (out.length >= n) break;
    const day = DAYS[w.dayKey];
    if (!day) continue;
    const mins = Math.round(((w.timers?.warmup || 0) + (w.timers?.workout || 0)) / 60000);
    const exercises = [];
    for (const ex of day.exercises) {
      const logs = (w.logs && w.logs[ex.id]) || [];
      const sets = logs.filter(s => s.d).map(s => {
        const wt = parseFloat(s.w) || 0;
        const rp = parseInt(s.r, 10) || 0;
        return ex.bw ? `BW × ${rp}${ex.timed ? 's' : ''}` : `${wt}kg × ${rp}${ex.timed ? 's' : ''}`;
      });
      if (sets.length === 0) continue;
      const exNote = w.notes && w.notes[ex.id];
      const variant = w.variants && w.variants[ex.id];
      exercises.push({
        name: ex.name,
        sets: sets,
        note: exNote ? String(exNote).trim() : null,
        variant: variant ? String(variant).trim() : null
      });
    }
    out.push({
      date: d,
      dayName: day.name,
      dayKey: w.dayKey,
      mins,
      sessionNote: w.sessionNote ? String(w.sessionNote).trim() : null,
      exercises
    });
  }
  return out;
}

// Find the previous session of the same dayKey before a given date (for progress comparison).
function _priorSameDay(beforeDate, dayKey) {
  const dates = Object.entries(state.workouts || {})
    .filter(([d, w]) => isRealSession(w) && w.dayKey === dayKey && d < beforeDate)
    .sort((a, b) => b[0].localeCompare(a[0]));
  if (!dates.length) return null;
  const [d, w] = dates[0];
  const day = DAYS[w.dayKey];
  const mins = Math.round(((w.timers?.warmup || 0) + (w.timers?.workout || 0)) / 60000);
  const exs = [];
  for (const ex of day.exercises) {
    const logs = (w.logs && w.logs[ex.id]) || [];
    const sets = logs.filter(s => s.d).map(s => {
      const wt = parseFloat(s.w) || 0;
      const rp = parseInt(s.r, 10) || 0;
      return ex.bw ? `BW × ${rp}${ex.timed ? 's' : ''}` : `${wt}kg × ${rp}${ex.timed ? 's' : ''}`;
    });
    if (sets.length) {
      const v = w.variants && w.variants[ex.id];
      exs.push(`${ex.name}${v ? ` [variant: "${v}"]` : ''}: ${sets.join(', ')}`);
    }
  }
  return { date: d, dayName: day.name, mins, exercises: exs };
}

function buildSessionReviewPrompt(sessions) {
  const blocks = sessions.map(s => {
    const lines = [`## Session ${s.date} · ${s.dayName} · ~${s.mins} min`];
    if (s.sessionNote) lines.push(`Session note: "${s.sessionNote}"`);
    for (const ex of s.exercises) {
      const variantTag = ex.variant ? ` [variant: "${ex.variant}"]` : '';
      lines.push(`- ${ex.name}${variantTag}: ${ex.sets.join(', ')}${ex.note ? ` (note: "${ex.note}")` : ''}`);
    }
    const prior = _priorSameDay(s.date, s.dayKey);
    if (prior) {
      lines.push(`Prior ${s.dayName} session (${prior.date}, ${prior.mins}min):`);
      prior.exercises.forEach(line => lines.push(`  · ${line}`));
    }
    return lines.join('\n');
  });

  return `You are MyGym Coach. Generate short structured reviews for these recent gym sessions. Output ONLY a JSON array (no prose, no markdown fences). One object per session, IN THE SAME ORDER:

[
  {
    "date": "YYYY-MM-DD",
    "summary": "1-2 sentences: factually recap what was trained and any notable top sets.",
    "highlights": [ "short wins, max 3, e.g. 'PR 13kg × 10 on incline DB press'" ],
    "cautions": [ "short flags from notes or set drops, max 3" ],
    "progress": "1 sentence comparing this session to the prior same-day session: volume, top sets, time. If no prior data, say 'first session of this type.'"
  }
]

Rules:
- Quote real numbers and exact exercise names from the data — never invent.
- Be terse: every field is read on a phone.
- highlights/cautions can be empty arrays if nothing notable.
- IMPORTANT — Machine differences: a load drop across sessions does NOT mean regression when machines differ. Detect machine changes from EITHER of:
  (a) Explicit [variant: "..."] tag — different tags between this session and the prior one = different machines.
  (b) The per-exercise note or the session note mentioning a different machine — phrases like "different machine", "harder machine", "easier machine", "machine 2", "other machine", "same weight different machine", "machine 1 today", calibration cues. Notes are equally valid as the explicit tag, even when no [variant: "..."] is present.
  If either signal indicates a machine change, do NOT call it a load drop or regression. State "different machine — not directly comparable" or omit from cautions entirely.
  Compare loads only when the machines clearly match (same variant or both untagged AND no note conflicts).
- Output ONLY the JSON array.

SESSIONS TO REVIEW (most recent first):

${blocks.join('\n\n')}`;
}

function shouldRefreshSessionReviews() {
  if (!state.sessionReviews || typeof state.sessionReviews !== 'object') return true;
  const last4 = getLastSessionsForReview(4);
  if (!last4.length) return false;
  for (const s of last4) {
    if (!state.sessionReviews[s.date] || !state.sessionReviews[s.date].json) return true;
  }
  return false;
}

async function requestSessionReviews() {
  if (!state.settings.anthropicApiKey) throw new Error('Set up your Anthropic API key first');
  const sessions = getLastSessionsForReview(4);
  if (!sessions.length) return [];
  const raw = await callAnthropic({
    system: buildSessionReviewPrompt(sessions),
    messages: [{ role: 'user', content: 'Reviews.' }],
    maxTokens: 1800
  });
  const cleaned = _stripJsonFence(raw); // expects an array
  let parsed;
  try { parsed = JSON.parse(cleaned); }
  catch (_) { throw new Error('Coach returned non-JSON: ' + raw.slice(0, 200)); }
  if (!Array.isArray(parsed)) throw new Error('Expected an array of reviews');
  if (!state.sessionReviews || typeof state.sessionReviews !== 'object') state.sessionReviews = {};
  // Match by date; fall back to positional order if the model omitted/changed dates
  parsed.forEach((rev, idx) => {
    const target = (rev && rev.date) ? rev.date : (sessions[idx] && sessions[idx].date);
    if (!target) return;
    state.sessionReviews[target] = { json: rev, generatedAt: Date.now() };
  });
  save();
  return parsed;
}

// Multi-turn chat history kept in memory for the lifetime of the modal.
let coachChatHistory = [];

async function callCoach(userText) {
  if (!state.settings.anthropicApiKey) throw new Error('Set up your Anthropic API key first');
  const sys = `You are MyGym Coach — Mustapha's friendly, concise personal trainer who has full visibility into his training data. Keep replies short (2-4 sentences typically), practical, and grounded in the data below. Don't invent numbers. If the user mentions soreness, fatigue, or recovery concerns, factor that in. If they're progressing well, keep them on track and gently push. Use simple English. No emoji-spam.

${buildCoachContext()}`;
  coachChatHistory.push({ role: 'user', content: userText });
  const res = await fetch(AI_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.settings.anthropicApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 700,
      system: sys,
      messages: coachChatHistory.slice(-12) // last 12 turns
    }),
  });
  if (!res.ok) {
    const t = await res.text().catch(() => '');
    coachChatHistory.pop();
    throw new Error('Claude ' + res.status + ': ' + t.slice(0, 160));
  }
  const data = await res.json();
  const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
  coachChatHistory.push({ role: 'assistant', content: reply });
  return reply;
}

function openCoachModal(prefilled) {
  if (!state.settings.anthropicApiKey) { openAIKeyModal(() => openCoachModal(prefilled)); return; }

  const m = el('div');
  m.appendChild(el('div', { class: 'row between', style: 'align-items:center;margin-bottom:10px;' }, [
    el('h3', { style: 'margin:0;' }, '✨ Coach'),
    el('button', {
      class: 'btn small secondary',
      style: 'padding:4px 10px;font-size:11px;',
      onclick: () => {
        coachChatHistory = [];
        openCoachModal();
      }
    }, 'New chat')
  ]));

  const chatBox = el('div', { class: 'coach-chat' });
  function renderHistory() {
    chatBox.innerHTML = '';
    if (!coachChatHistory.length) {
      const intro = el('div', { class: 'coach-msg assistant' }, 'Hey Mustapha. Ask anything — about today\'s session, soreness, weight, whether to push or back off. I\'ve got your full history.');
      chatBox.appendChild(intro);
    } else {
      coachChatHistory.forEach(msg => {
        chatBox.appendChild(el('div', { class: 'coach-msg ' + msg.role }, msg.content));
      });
    }
    setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 30);
  }
  renderHistory();
  m.appendChild(chatBox);

  const ta = el('textarea', { placeholder: 'Ask Coach… (e.g. "Should I push on Push day or back off?", "Is +1kg OK on bench?")' });
  if (prefilled) ta.value = prefilled;
  const sendBtn = el('button', { class: 'send-btn' }, 'Send');

  async function send() {
    const txt = ta.value.trim();
    if (!txt || sendBtn.disabled) return;
    ta.value = '';
    sendBtn.disabled = true;
    renderHistory();
    chatBox.appendChild(el('div', { class: 'coach-msg assistant thinking' }, 'Thinking…'));
    chatBox.scrollTop = chatBox.scrollHeight;
    try {
      await callCoach(txt);
    } catch (err) {
      coachChatHistory.push({ role: 'assistant', content: 'Error: ' + (err.message || 'failed').slice(0, 200) });
    } finally {
      sendBtn.disabled = false;
      renderHistory();
      ta.focus();
    }
  }
  sendBtn.onclick = send;
  ta.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

  m.appendChild(el('div', { class: 'coach-input-row' }, [ta, sendBtn]));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Close'));

  openModal(m);
  setTimeout(() => ta.focus(), 80);
}

function openAIPreviewModal(parsedTasks) {
  // Each row has its own state: skipped + an editable copy.
  const validRepeat = (r) => (typeof r === 'string' && /^(daily|weekdays|weekly:[\d,]+|monthly:\d+)$/.test(r)) ? r : null;
  const validDate = (d) => (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : null;
  const rows = parsedTasks.map(t => {
    const repeat = validRepeat(t.repeat);
    return {
      title: String(t.title || '').trim() || 'Untitled',
      time: t.time && /^\d{1,2}:\d{2}$/.test(t.time) ? t.time.padStart(5, '0') : null,
      category: ['work', 'personal', 'family', 'gym', 'health'].includes(t.category) ? t.category : null,
      repeat,
      // Date is only meaningful for non-recurring tasks; clear it if AI returned both.
      date: repeat ? null : validDate(t.date),
      skipped: false,
      expanded: false
    };
  });

  const m = el('div');
  const head = el('div', { class: 'row between', style: 'align-items:center;margin-bottom:12px;' }, [
    el('h3', { style: 'margin:0;' }, 'Review tasks'),
    el('span', { class: 'chip' }, `${rows.length} found`)
  ]);
  m.appendChild(head);

  const listWrap = el('div');
  m.appendChild(listWrap);

  function rebuild() {
    listWrap.innerHTML = '';
    rows.forEach((r) => {
      const row = el('div', { class: 'preview-row' + (r.skipped ? ' skipped' : '') + (r.expanded ? ' expanded' : '') });
      row.appendChild(el('div', { class: 'pr-title' }, r.title));
      const metaParts = [];
      if (r.time) metaParts.push(r.time);
      if (r.repeat) {
        metaParts.push('<span style="color:var(--accent);">↻ ' + describeRepeat(r.repeat) + '</span>');
      } else if (r.date) {
        const td = today();
        const tom = nextDateStr(td);
        let label;
        if (r.date === td) label = 'Today';
        else if (r.date === tom) label = 'Tomorrow';
        else {
          const d = new Date(r.date + 'T00:00:00');
          const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
          label = `${dow} ${months[d.getMonth()]} ${d.getDate()}`;
        }
        metaParts.push('<span style="color:var(--accent);">📅 ' + label + '</span>');
      }
      if (r.category) metaParts.push(`<span class="cat-chip cat-${r.category}">${r.category}</span>`);
      const meta = el('div', { class: 'pr-meta' });
      meta.innerHTML = metaParts.join(' · ') || '<span style="color:var(--text-dim);">today · anytime</span>';
      row.appendChild(meta);

      const actions = el('div', { class: 'pr-actions' });
      actions.appendChild(el('button', {
        onclick: () => { r.expanded = !r.expanded; rebuild(); }
      }, r.expanded ? 'Done' : 'Edit'));
      actions.appendChild(el('button', {
        class: 'danger',
        onclick: () => { r.skipped = !r.skipped; rebuild(); }
      }, r.skipped ? 'Include' : 'Skip'));
      row.appendChild(actions);

      if (r.expanded) {
        const edit = el('div', { class: 'pr-edit' });

        edit.appendChild(el('label', {}, 'Title'));
        const titleInp = el('input', { type: 'text', value: r.title });
        titleInp.oninput = () => { r.title = titleInp.value; };
        edit.appendChild(titleInp);

        edit.appendChild(el('label', {}, 'Time (HH:MM, blank = none)'));
        const timeInp = el('input', { type: 'time', value: r.time || '' });
        timeInp.oninput = () => { r.time = timeInp.value || null; };
        edit.appendChild(timeInp);

        // Date — disabled when repeat is set, because the recurrence rule drives scheduling.
        edit.appendChild(el('label', {}, 'Date (blank = today / anytime)'));
        const dateInp = el('input', { type: 'date', value: r.date || '' });
        dateInp.disabled = !!r.repeat;
        if (r.repeat) dateInp.style.opacity = '0.5';
        dateInp.oninput = () => { r.date = dateInp.value || null; rebuild(); };
        edit.appendChild(dateInp);

        edit.appendChild(el('label', {}, 'Category'));
        const catSel = el('select');
        [['', 'None'], ['work', 'Work'], ['personal', 'Personal'], ['family', 'Family'], ['gym', 'Gym'], ['health', 'Health']].forEach(([v, lbl]) => {
          const o = el('option', { value: v }, lbl);
          if ((r.category || '') === v) o.selected = true;
          catSel.appendChild(o);
        });
        catSel.onchange = () => { r.category = catSel.value || null; };
        edit.appendChild(catSel);

        edit.appendChild(el('label', {}, 'Repeat'));
        const repSel = el('select');
        const repOpts = [
          ['', 'No repeat'],
          ['daily', 'Daily'],
          ['weekdays', 'Weekdays'],
          ['weekly:1', 'Every Mon'],
          ['weekly:2', 'Every Tue'],
          ['weekly:3', 'Every Wed'],
          ['weekly:4', 'Every Thu'],
          ['weekly:5', 'Every Fri'],
          ['weekly:6', 'Every Sat'],
          ['weekly:0', 'Every Sun']
        ];
        const presetVals = repOpts.map(o => o[0]);
        if (r.repeat && !presetVals.includes(r.repeat)) repOpts.push([r.repeat, r.repeat]);
        repOpts.forEach(([v, lbl]) => {
          const o = el('option', { value: v }, lbl);
          if ((r.repeat || '') === v) o.selected = true;
          repSel.appendChild(o);
        });
        repSel.onchange = () => {
          r.repeat = repSel.value || null;
          if (r.repeat) r.date = null; // recurrence overrides a specific date
          rebuild();
        };
        edit.appendChild(repSel);

        row.appendChild(edit);
      }

      listWrap.appendChild(row);
    });

    const keepCount = rows.filter(r => !r.skipped).length;
    saveBtn.textContent = `Save ${keepCount} task${keepCount === 1 ? '' : 's'}`;
    saveBtn.disabled = keepCount === 0;
    saveBtn.style.opacity = keepCount === 0 ? '0.5' : '1';
  }

  const saveBtn = el('button', {
    class: 'btn',
    style: 'margin-top:14px;',
    onclick: () => {
      const keep = rows.filter(r => !r.skipped);
      keep.forEach(r => addTask({ title: r.title, time: r.time, category: r.category, repeat: r.repeat, date: r.date }));
      closeModal();
      render();
      toast(`Saved ${keep.length} task${keep.length === 1 ? '' : 's'}`);
    }
  }, 'Save tasks');
  m.appendChild(saveBtn);
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));

  rebuild();
  openModal(m);
}

function openPlateModal(initial) {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Plate calculator'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, `Standard barbell ${BAR_WEIGHT}kg. Plates per side.`));
  m.appendChild(el('label', {}, 'Target weight (kg)'));
  const inp = el('input', { type: 'number', step: '0.5', placeholder: 'e.g. 60' });
  if (initial) inp.value = initial;
  m.appendChild(inp);
  const result = el('div', { class: 'plate-result' });
  m.appendChild(result);

  function calc() {
    const target = parseFloat(inp.value);
    result.innerHTML = '';
    if (!target || target < BAR_WEIGHT) {
      result.appendChild(el('div', { class: 'small muted' }, target ? `Below bar weight (${BAR_WEIGHT}kg)` : 'Enter weight'));
      return;
    }
    let perSide = (target - BAR_WEIGHT) / 2;
    const used = [];
    for (const p of PLATES) {
      while (perSide >= p - 0.001) { used.push(p); perSide -= p; }
    }
    if (perSide > 0.05) {
      result.appendChild(el('div', { class: 'small muted' }, `Closest: ${target - perSide * 2}kg (off by ${(perSide * 2).toFixed(1)}kg)`));
    }
    if (!used.length) {
      result.appendChild(el('div', { class: 'small muted' }, 'Just the bar'));
      return;
    }
    used.forEach(p => {
      const cls = p >= 25 ? 'p25' : p >= 20 ? 'p20' : p >= 15 ? 'p15' : p >= 10 ? 'p10' : p >= 5 ? 'p5' : p >= 2.5 ? 'p2' : 'p1';
      result.appendChild(el('span', { class: 'plate ' + cls }, `${p}`));
    });
  }
  inp.addEventListener('input', calc);
  calc();

  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
  setTimeout(() => inp.focus(), 100);
}

/* photo handling */
function addPhoto(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const W = 480, H = Math.round(W * img.height / img.width);
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      c.getContext('2d').drawImage(img, 0, 0, W, H);
      const dataUrl = c.toDataURL('image/jpeg', 0.7);
      const photo = { id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), date: today(), dataUrl };
      try {
        state.photos.push(photo);
        save();
        toast('Photo added');
        render();
      } catch (err) {
        // Roll back the in-memory push so state stays clean if save() threw (quota exceeded)
        const i = state.photos.indexOf(photo);
        if (i >= 0) state.photos.splice(i, 1);
        toast('Storage full — delete old photos');
      }
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

/* export / import */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mygym-${today()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('Replace current data with imported file?')) return;
        state = { ...structuredClone(defaultState), ...data };
        for (const k of Object.keys(defaultState)) if (state[k] === undefined) state[k] = defaultState[k];
        seedPastSessions();
        save(); render(); toast('Imported');
      } catch (err) { alert('Invalid file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* =========== INIT =========== */
document.querySelectorAll('#gymNav button').forEach(b => {
  b.addEventListener('click', () => {
    activeTab = b.dataset.tab;
    activeDayKey = null;
    expandedExId = null;
    editingSetKey = null;
    if (activeTab === 'home') homeFocusExited = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// One-time cleanup of orphan MastaLife localStorage keys.
['mastalife-gtab-v1', 'mastalife-mode-v1', 'mastalife-username-v1'].forEach(k => {
  try { localStorage.removeItem(k); } catch (_e) {}
});

applyTheme(state.settings.theme || 'indigo');
render();
</script>
</body>
</html>
