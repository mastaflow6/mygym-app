    }, '⚠ You\'ve already logged sets today. Skipping will discard them.'));
  }

  // Cascade preview — show only the changing rows (plus the skipped one).
  const previewBox = el('div', {
    style: 'margin-bottom:14px;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.7;'
  });
  let html = '';
  for (const row of cascade.slice(0, 7)) {
    const ddow = new Date(row.date + 'T00:00:00').getDay();
    const bName = row.before != null ? DAYS[row.before].name : 'Rest';
    const aName = row.after != null ? DAYS[row.after].name : 'Rest';
    const same = bName === aName;
    html += `<div style="display:flex;align-items:center;gap:8px;${same ? 'opacity:0.45;' : ''}">`
         + `<span style="min-width:30px;color:var(--text-muted);">${DAY_LABELS[ddow]}</span>`
         + `<span style="flex:1;color:var(--text-muted);">${bName}</span>`
         + `<span style="color:var(--text-muted);">→</span>`
         + `<span style="flex:1;text-align:right;color:${same ? 'var(--text-muted)' : 'var(--info)'};font-weight:${same ? '400' : '700'};">${aName}</span>`
         + `</div>`;
  }
  previewBox.innerHTML = html;
  m.appendChild(previewBox);

  m.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      planSkipCascade(t, true);
      closeModal();
      activeTab = 'home';
      activeDayKey = null;
      homeFocusExited = false;
      render();
      toast('Workout moved to tomorrow');
    }
  }, 'Skip · move to tomorrow'));
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));

  openModal(m);
}

const AI_MODEL = 'claude-haiku-4-5-20251001';
const AI_API_URL = 'https://api.anthropic.com/v1/messages';

async function callAnthropic({ system, messages, maxTokens }) {
  const key = state.settings.anthropicApiKey;
  if (!key) throw new Error('No API key set');
  const res = await fetch(AI_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: maxTokens || 2048,
      system,
      messages
    }),
  });
  if (res.status === 401 || res.status === 403) {
    const txt = await res.text().catch(() => '');
    throw new Error('Auth failed (' + res.status + '). Check your API key. ' + txt.slice(0, 120));
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('Claude API error ' + res.status + ': ' + txt.slice(0, 200));
  }
  const data = await res.json();
  // The /v1/messages response shape: { content: [ { type: 'text', text: '...' }, ... ] }
  const txt = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  return txt;
}

function _aiSystemPrompt(referenceDate) {
  const d = new Date(referenceDate + 'T00:00:00');
  const dowName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
  return `You convert a user's casual day plan into a JSON array of tasks. Output ONLY a valid JSON array, no prose, no markdown fences.

Schema for each task:
{
  "title": string (clean it up, fix obvious typos),
  "time": "HH:MM" (24h) or null,
  "date": "YYYY-MM-DD" or null,
  "repeat": "daily" | "weekdays" | "weekly:1,3" (dow numbers 0-6) | "monthly:15" | null,
  "category": "work" | "personal" | "family" | "gym" | "health" | null
}

Rules:
- Reference date is ${referenceDate} (${dowName}).
- "today" => reference date. "tomorrow" => reference date + 1 day. "next monday" => upcoming Monday on/after reference.
- If a recurrence is mentioned ("every monday", "daily"), set repeat AND set date to the next occurrence on/after reference date.
- Times: assume the list flows chronologically. Bare numbers like "02" or "03" appearing AFTER morning entries (8, 9, 10, 11) mean afternoon (14:00, 15:00).
- "08" or "8" first thing in the morning => 08:00. "9 breakfast" => 09:00.
- Category guesses: "gym session" / "workout" => gym; "preworkout meal" / "post workout" / "breakfast" / "meal" => health; "meeting" / "work" / "call" with colleagues => work; "family time" / "kids" / "wife" / "parents" / "dinner with family" / "with family" => family; "passport photo" / "papers" / "errand" / "shopping" => personal.
- If a line has no time, set time to null. Don't invent times.
- Skip header/preamble lines like "Tasks i have tomorrow".
- Output ONLY the JSON array, nothing before or after.`;
}

function _stripJsonFence(s) {
  let t = String(s || '').trim();
  // Remove ```json ... ``` fences if model added them.
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '');
  // Find the array if there's leading prose.
  const start = t.indexOf('[');
  const end = t.lastIndexOf(']');
  if (start >= 0 && end > start) t = t.slice(start, end + 1);
  return t.trim();
}

function openAIParseModal() {
  if (!state.settings.anthropicApiKey) { openAIKeyModal(); return; }

  const m = el('div');
  m.appendChild(el('h3', {}, '✨ Paste your day'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:10px;' },
    'Paste a casual list. Claude will parse times, dates, and repeats.'));

  const ta = el('textarea', { class: 'ai-textarea', placeholder: 'wakeup 8\n9 breakfast\nmeeting at 11 every monday\n02 preworkout meal\n03 gym session\n…' });
  m.appendChild(ta);

  // Date context: today / tomorrow
  let ctx = 'tomorrow';
  const ctxRow = el('div', { class: 'date-context-row' });
  function buildCtx() {
    ctxRow.innerHTML = '';
    ['today', 'tomorrow'].forEach(opt => {
      const b = el('div', { class: 'opt' + (ctx === opt ? ' active' : ''), onclick: () => { ctx = opt; buildCtx(); } });
      b.textContent = opt === 'today' ? 'Today' : 'Tomorrow';
      ctxRow.appendChild(b);
    });
  }
  buildCtx();
  m.appendChild(el('div', { class: 'small', style: 'color:var(--text-muted);margin-top:4px;' }, 'Date context'));
  m.appendChild(ctxRow);

  const status = el('div', { style: 'min-height:24px;margin:6px 0;' });
  m.appendChild(status);

  const parseBtn = el('button', {
    class: 'btn',
    onclick: async () => {
      const text = ta.value.trim();
      if (!text) { toast('Paste something first'); return; }
      const referenceDate = ctx === 'today' ? today() : nextDateStr(today());
      status.innerHTML = '<div class="ai-loading"><span class="spinner"></span><span>Parsing with Claude…</span></div>';
      parseBtn.disabled = true;
      parseBtn.style.opacity = '0.5';
      try {
        const raw = await callAnthropic({
          system: _aiSystemPrompt(referenceDate),
          messages: [{ role: 'user', content: text }],
          maxTokens: 2048
        });
        const json = _stripJsonFence(raw);
        let parsed;
        try { parsed = JSON.parse(json); }
        catch (_e) { throw new Error('Claude returned non-JSON: ' + raw.slice(0, 120)); }
        if (!Array.isArray(parsed)) throw new Error('Expected an array, got ' + typeof parsed);
        if (!parsed.length) { toast('Nothing parsed'); status.innerHTML = ''; parseBtn.disabled = false; parseBtn.style.opacity = '1'; return; }
        closeModal();
        openAIPreviewModal(parsed, referenceDate);
      } catch (e) {
        status.innerHTML = '<div class="small" style="color:var(--danger);">' + escapeHtml(e.message || 'Failed') + '</div>';
        parseBtn.disabled = false;
        parseBtn.style.opacity = '1';
      }
    }
  }, 'Parse with Claude');
  m.appendChild(parseBtn);
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));

  openModal(m);
  setTimeout(() => ta.focus(), 100);
}

function openAIPreviewModal(parsedTasks, referenceDate) {
  // Each row has its own state: skipped + an editable copy.
  const rows = parsedTasks.map(t => ({
    title: String(t.title || '').trim() || 'Untitled',
    time: t.time && /^\d{1,2}:\d{2}$/.test(t.time) ? t.time.padStart(5, '0') : null,
    date: t.date || referenceDate,
    repeat: t.repeat || null,
    category: ['work', 'personal', 'family', 'gym', 'health'].includes(t.category) ? t.category : null,
    skipped: false,
    expanded: false
  }));

  const m = el('div');
  const head = el('div', { class: 'row between', style: 'align-items:center;margin-bottom:12px;' }, [
    el('h3', { style: 'margin:0;' }, 'Review parsed tasks'),
    el('span', { class: 'chip' }, `${rows.length} found`)
  ]);
  m.appendChild(head);

  const listWrap = el('div');
  m.appendChild(listWrap);

  function rebuild() {
    listWrap.innerHTML = '';
    rows.forEach((r, idx) => {
      const row = el('div', { class: 'preview-row' + (r.skipped ? ' skipped' : '') + (r.expanded ? ' expanded' : '') });
      row.appendChild(el('div', { class: 'pr-title' }, r.title));
      const metaParts = [];
      if (r.time) metaParts.push(r.time);
      if (r.repeat) metaParts.push(describeRepeat(r.repeat));
      else if (r.date) metaParts.push(friendlyDateLabel(r.date));
      if (r.category) {
        const chip = `<span class="cat-chip cat-${r.category}">${r.category}</span>`;
        metaParts.push(chip);
      }
      const meta = el('div', { class: 'pr-meta' });
      meta.innerHTML = metaParts.join(' · ');
      row.appendChild(meta);

      const actions = el('div', { class: 'pr-actions' });
      actions.appendChild(el('button', {
        onclick: () => { r.expanded = !r.expanded; rebuild(); }
      }, r.expanded ? 'Done' : 'Edit'));
      actions.appendChild(el('button', {
        class: 'danger',
        onclick: () => { r.skipped = !r.skipped; rebuild(); }
      }, r.skipped ? 'Include' : 'Skip'));
      row.appendChild(actions);

      if (r.expanded) {
        const edit = el('div', { class: 'pr-edit' });

        edit.appendChild(el('label', {}, 'Title'));
        const titleInp = el('input', { type: 'text', value: r.title });
        titleInp.oninput = () => { r.title = titleInp.value; };
        edit.appendChild(titleInp);

        edit.appendChild(el('label', {}, 'Time (HH:MM, blank = none)'));
        const timeInp = el('input', { type: 'time', value: r.time || '' });
        timeInp.oninput = () => { r.time = timeInp.value || null; };
        edit.appendChild(timeInp);

        edit.appendChild(el('label', {}, 'Date'));
        const dateInp = el('input', { type: 'date', value: r.date || '' });
        dateInp.oninput = () => { r.date = dateInp.value || null; };
        edit.appendChild(dateInp);

        edit.appendChild(el('label', {}, 'Repeat'));
        const repSel = el('select');
        const repOpts = [
          ['', 'No repeat'],
          ['daily', 'Daily'],
          ['weekdays', 'Weekdays'],
          ['weekly:1', 'Every Mon'],
          ['weekly:2', 'Every Tue'],
          ['weekly:3', 'Every Wed'],
          ['weekly:4', 'Every Thu'],
          ['weekly:5', 'Every Fri'],
          ['weekly:6', 'Every Sat'],
          ['weekly:0', 'Every Sun']
        ];
        // If current repeat doesn't match a preset, add it as a custom option so it stays selectable.
        const presetVals = repOpts.map(o => o[0]);
        if (r.repeat && !presetVals.includes(r.repeat)) repOpts.push([r.repeat, r.repeat]);
        repOpts.forEach(([v, lbl]) => {
          const o = el('option', { value: v }, lbl);
          if ((r.repeat || '') === v) o.selected = true;
          repSel.appendChild(o);
        });
        repSel.onchange = () => { r.repeat = repSel.value || null; };
        edit.appendChild(repSel);

        edit.appendChild(el('label', {}, 'Category'));
        const catSel = el('select');
        [['', 'None'], ['work', 'Work'], ['personal', 'Personal'], ['family', 'Family'], ['gym', 'Gym'], ['health', 'Health']].forEach(([v, lbl]) => {
          const o = el('option', { value: v }, lbl);
          if ((r.category || '') === v) o.selected = true;
          catSel.appendChild(o);
        });
        catSel.onchange = () => { r.category = catSel.value || null; };
        edit.appendChild(catSel);

        row.appendChild(edit);
      }

      listWrap.appendChild(row);
    });

    const keepCount = rows.filter(r => !r.skipped).length;
    saveBtn.textContent = `Save ${keepCount} task${keepCount === 1 ? '' : 's'}`;
    saveBtn.disabled = keepCount === 0;
    saveBtn.style.opacity = keepCount === 0 ? '0.5' : '1';
  }

  const saveBtn = el('button', {
    class: 'btn',
    style: 'margin-top:14px;',
    onclick: () => {
      const keep = rows.filter(r => !r.skipped);
      keep.forEach(r => addMastaTask({
        title: r.title,
        time: r.time,
        date: r.repeat ? r.date : (r.date || null),
        repeat: r.repeat,
        category: r.category
      }));
      closeModal();
      render();
      toast(`Saved ${keep.length} task${keep.length === 1 ? '' : 's'}`);
    }
  }, 'Save tasks');
  m.appendChild(saveBtn);
  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:8px;', onclick: closeModal }, 'Cancel'));

  rebuild();
  openModal(m);
}

function openPlateModal(initial) {
  const m = el('div');
  m.appendChild(el('h3', {}, 'Plate calculator'));
  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' }, `Standard barbell ${BAR_WEIGHT}kg. Plates per side.`));
  m.appendChild(el('label', {}, 'Target weight (kg)'));
  const inp = el('input', { type: 'number', step: '0.5', placeholder: 'e.g. 60' });
  if (initial) inp.value = initial;
  m.appendChild(inp);
  const result = el('div', { class: 'plate-result' });
  m.appendChild(result);

  function calc() {
    const target = parseFloat(inp.value);
    result.innerHTML = '';
    if (!target || target < BAR_WEIGHT) {
      result.appendChild(el('div', { class: 'small muted' }, target ? `Below bar weight (${BAR_WEIGHT}kg)` : 'Enter weight'));
      return;
    }
    let perSide = (target - BAR_WEIGHT) / 2;
    const used = [];
    for (const p of PLATES) {
      while (perSide >= p - 0.001) { used.push(p); perSide -= p; }
    }
    if (perSide > 0.05) {
      result.appendChild(el('div', { class: 'small muted' }, `Closest: ${target - perSide * 2}kg (off by ${(perSide * 2).toFixed(1)}kg)`));
    }
    if (!used.length) {
      result.appendChild(el('div', { class: 'small muted' }, 'Just the bar'));
      return;
    }
    used.forEach(p => {
      const cls = p >= 25 ? 'p25' : p >= 20 ? 'p20' : p >= 15 ? 'p15' : p >= 10 ? 'p10' : p >= 5 ? 'p5' : p >= 2.5 ? 'p2' : 'p1';
      result.appendChild(el('span', { class: 'plate ' + cls }, `${p}`));
    });
  }
  inp.addEventListener('input', calc);
  calc();

  m.appendChild(el('button', { class: 'btn secondary', style: 'margin-top:14px;', onclick: closeModal }, 'Close'));
  openModal(m);
  setTimeout(() => inp.focus(), 100);
}

/* photo handling */
function addPhoto(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const W = 480, H = Math.round(W * img.height / img.width);
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      c.getContext('2d').drawImage(img, 0, 0, W, H);
      const dataUrl = c.toDataURL('image/jpeg', 0.7);
      state.photos.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), date: today(), dataUrl });
      try { save(); toast('Photo added'); render(); }
      catch (err) { toast('Storage full — delete old photos'); }
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

/* export / import */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mygym-${today()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('Replace current data with imported file?')) return;
        state = { ...structuredClone(defaultState), ...data };
        for (const k of Object.keys(defaultState)) if (state[k] === undefined) state[k] = defaultState[k];
        seedPastSessions();
        save(); render(); toast('Imported');
      } catch (err) { alert('Invalid file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* =========== INIT =========== */
document.querySelectorAll('#gymNav button').forEach(b => {
  b.addEventListener('click', () => {
    activeTab = b.dataset.tab;
    activeDayKey = null;
    expandedExId = null;
    editingSetKey = null;
    if (activeTab === 'home') homeFocusExited = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.querySelectorAll('#globalNav button').forEach(b => {
  b.addEventListener('click', () => {
    setGlobalTab(b.dataset.gtab);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.getElementById('gymBackLink').addEventListener('click', () => {
  setGlobalTab('home');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.getElementById('topMode').addEventListener('click', e => {
  e.stopPropagation();
  cycleMastaMode();
});

render();
</script>
