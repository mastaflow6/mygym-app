// Recurrence rule evaluator. rule is one of:
//   null            never recurs
//   'daily'         every day
//   'weekdays'      Mon–Fri
//   'weekly:1,3'    specified day-of-week numbers (0=Sun)
//   'monthly:15'    every month on the Nth day
function matchesRepeat(rule, dateStr) {
  if (!rule) return false;
  const d = new Date(dateStr + 'T00:00:00');
  if (rule === 'daily') return true;
  if (rule === 'weekdays') { const dow = d.getDay(); return dow >= 1 && dow <= 5; }
  if (rule.startsWith('weekly:')) {
    const days = rule.slice(7).split(',').map(s => parseInt(s, 10)).filter(n => !isNaN(n));
    return days.includes(d.getDay());
  }
  if (rule.startsWith('monthly:')) {
    const dom = parseInt(rule.slice(8), 10);
    return !isNaN(dom) && d.getDate() === dom;
  }
  return false;
}

// Is the task due on dateStr (i.e. should it appear on that day's schedule)?
function isTaskDueOn(task, dateStr) {
  // Recurring: must not start before the recurrence start (task.date), and must match the rule.
  if (task.repeat) {
    if (task.date && dateStr < task.date) return false;
    return matchesRepeat(task.repeat, dateStr);
  }
  // One-off with a specific date.
  if (task.date) return task.date === dateStr;
  // No date and no repeat: legacy "always pending" task. Only show on today's view if not done.
  return false;
}

// Has the task been done on dateStr?
function isTaskDoneOn(task, dateStr) {
  if (Array.isArray(task.completions) && task.completions.includes(dateStr)) return true;
  // Legacy: a one-off task with .done=true counts as done on its task.date (if any) or today.
  if (task.done && !task.repeat && (!task.date || task.date === dateStr)) return true;
  return false;
}

// Tasks due on dateStr, ordered by time (untimed last). Each entry adds a `_done` flag.
function tasksFor(dateStr) {
  _ensureTaskArr();
  const out = [];
  for (const t of state.mastalifeTasks) {
    if (!isTaskDueOn(t, dateStr)) continue;
    out.push({ ...t, _done: isTaskDoneOn(t, dateStr) });
  }
  out.sort((a, b) => {
    const ta = a.time || '99:99';
    const tb = b.time || '99:99';
    if (ta !== tb) return ta < tb ? -1 : 1;
    return a.createdAt - b.createdAt;
  });
  return out;
}

// Human-readable repeat label for UI. Returns empty string if no repeat.
function describeRepeat(rule) {
  if (!rule) return '';
  if (rule === 'daily') return 'every day';
  if (rule === 'weekdays') return 'weekdays';
  if (rule.startsWith('weekly:')) {
    const days = rule.slice(7).split(',').map(s => parseInt(s, 10)).filter(n => !isNaN(n)).sort();
    const labels = days.map(d => DAY_LABELS[d]);

  }
  if (rule.startsWith('monthly:')) {
    const dom = parseInt(rule.slice(8), 10);
    return `monthly on ${dom}`;
  }
  return rule;
}

// Friendly date label for grouping ("Today", "Tomorrow", "Mon May 5").
function friendlyDateLabel(dateStr) {
  if (!dateStr) return 'No date';
  const td = today();
  if (dateStr === td) return 'Today';

  const d = new Date(dateStr + 'T00:00:00');

  return `${DAY_LABELS[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

async function requestWakeLock() {
  if (!('wakeLock' in navigator) || wakeLockSentinel) return;
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
  } catch (e) { /* permission/visibility/system can deny — silently ignore */ }
}
function releaseWakeLock() {
  if (!wakeLockSentinel) return;
  try { wakeLockSentinel.release(); } catch (e) {}
  wakeLockSentinel = null;
}
async function ensureNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') {
    if (!state.settings.notifications) { state.settings.notifications = true; save(); }
    return true;
  }
  if (Notification.permission === 'denied') return false;
  try {
    const r = await Notification.requestPermission();
    state.settings.notifications = (r === 'granted'); save();
    return r === 'granted';
  } catch (e) { return false; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  const w = state.workouts[today()];
  if (w && w.activePhase) requestWakeLock();
});

function getAlternatives(ex) {
  if (Array.isArray(ex.alternatives)) return ex.alternatives;
  return (ex.alt || '').split('/').map(s => s.trim()).filter(Boolean);
}
function getDisplaySwap(ex, date) {

function getDisplayName(ex, date) {
  const swap = getDisplaySwap(ex, date);
  if (!swap) return ex.name;
  const alts = getAlternatives(ex);
  return alts[swap - 1] || ex.name;
}
function getActiveExId(date, dayKey) {
  const day = DAYS[dayKey]; if (!day) return null;
  if (expandedExId === 'none') return null;
  if (expandedExId && day.exercises.some(e => e.id === expandedExId)) return expandedExId;
  for (const ex of day.exercises) {
    const logs = state.workouts[date]?.logs?.[ex.id] || [];
    if (logs.filter(s => s.d).length < ex.sets) return ex.id;
  }
  return null;
}

let _pipCtx = null;
function playPip() {
  if (!state.settings.restSound) return;
  try {
    _pipCtx = _pipCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _pipCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) { /* silently ignore */ }
}

function startRest(secs) {
  secs = secs || state.settings.restSec;
  restEndAt = Date.now() + secs * 1000;
  $('restTimer').classList.add('show');
  if (restTimer) clearInterval(restTimer);
  restTimer = setInterval(updateRest, 250);
  updateRest();
}
function updateRest() {
  const left = Math.max(0, Math.round((restEndAt - Date.now()) / 1000));
  const m = Math.floor(left / 60), s = left % 60;
  $('restSecs').textContent = `${m}:${String(s).padStart(2, '0')}`;
  if (left <= 0) {
    stopRest();
    playPip();
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    toast('Rest done — next set');
    if (state.settings.notifications && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('Rest done', { body: 'Hit your next set' });
    }
  }
}
function stopRest() { if (restTimer) clearInterval(restTimer); restTimer = null; $('restTimer').classList.remove('show'); }

function checkBedtimeReminder() {
  if (!state.settings.notifications) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const target = state.settings.bedtime || '23:00';
  const [hh, mm] = target.split(':').map(Number);
  const now = new Date();
  const bed = new Date(now); bed.setHours(hh, mm, 0, 0);
  const oneHourBefore = new Date(bed.getTime() - 60 * 60 * 1000);
  const today = now.toISOString().slice(0, 10);
  if (state.settings.lastBedtimeNotifDate === today) return;
  if (now >= oneHourBefore && now < bed) {
    new Notification('Time to wind down', { body: `Bedtime in 1 hour (${target})` });
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    state.settings.lastBedtimeNotifDate = today;
    save({ skipCloud: true });
  }
}

function setPhase(date, phase) {
  const w = ensureWorkout(date, activeDayKey ?? effectiveDayKey(date) ?? todayDow());
  const now = Date.now();
  if (w.activePhase && w.phaseStart) {
    w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (now - w.phaseStart);
  }
  if (w.activePhase === phase) {
    w.activePhase = null; w.phaseStart = null;
  } else {
    w.activePhase = phase; w.phaseStart = now;
    if (!w.started) w.started = now;
  }
  if (phase === 'workout') w._warmupAdvanced = true; // prevent re-fire after manual end
  if (phase === 'warmup') w._warmupAdvanced = false;
  homeFocusExited = false;
  if (w.activePhase) requestWakeLock(); else releaseWakeLock();
  save();
  startPhaseTick();
  render();
}

function endWarmupAndStartWorkout(date) {
  const w = ensureWorkout(date, activeDayKey ?? effectiveDayKey(date) ?? todayDow());
  const now = Date.now();
  if (w.activePhase === 'warmup' && w.phaseStart) {
    w.timers.warmup = (w.timers.warmup || 0) + (now - w.phaseStart);
  }
  w.activePhase = 'workout';
  w.phaseStart = now;
  if (!w.started) w.started = now;
  w._warmupAdvanced = true;
  homeFocusExited = false;
  expandedExId = null;
  requestWakeLock();
  save();
  startPhaseTick();
  render();
}

function startPhaseTick() {
  if (phaseTickInterval) clearInterval(phaseTickInterval);
  phaseTickInterval = setInterval(() => {
    const w = state.workouts[today()];
    if (!w) return;
    const now = Date.now();
    if (w.activePhase && activeTab === 'today') {
      const els = document.querySelectorAll('.phase-btn .t');
      const phases = ['warmup', 'workout'];
      els.forEach((node, i) => {
        const p = phases[i];
        let ms = w.timers[p] || 0;
        if (w.activePhase === p && w.phaseStart) ms += now - w.phaseStart;
        node.textContent = fmtTime(ms);
      });
    }
    if (activeTab === 'home' && !homeFocusExited && w.activePhase) {
      const target = (state.settings.warmupTargetSec || 300) * 1000;
      if (w.activePhase === 'warmup') {
        const wmEl = document.getElementById('focusWarmupSecs');
        const wmBar = document.getElementById('focusWarmupBar');
        const wmPct = document.getElementById('focusWarmupPct');
        let ms = (w.timers.warmup || 0) + (w.phaseStart ? now - w.phaseStart : 0);
        const remain = Math.max(0, target - ms);
        if (wmEl) wmEl.textContent = fmtTime(remain);
        const pct = Math.min(100, ms / target * 100);
        if (wmBar) wmBar.style.width = pct + '%';
        if (wmPct) wmPct.textContent = Math.round(pct) + '%';
        if (ms >= target && !w._warmupAdvanced) {
          w._warmupAdvanced = true;
          if (navigator.vibrate) navigator.vibrate([180, 80, 180, 80, 180]);
          toast("Warmup done — let's go", 'celebrate');
          if ('Notification' in window && Notification.permission === 'granted') {
            try {
              new Notification('Warmup done', {
                body: "Time to start your first exercise",
                tag: 'mygym-warmup-done',
                icon: 'apple-touch-icon.png',
                renotify: true
              });
            } catch (e) {}
          }
          endWarmupAndStartWorkout(today());
        }
      } else if (w.activePhase === 'workout') {
        const wkEl = document.getElementById('focusWorkoutSecs');
        if (wkEl) {
          let ms = (w.timers.workout || 0) + (w.phaseStart ? now - w.phaseStart : 0);
          wkEl.textContent = fmtTime(ms);
        }
      }
    }
  }, 500);
}

function render() {
  $('view').innerHTML = '';
  hideFloatingPauseBtn(); // each tab/focus path opts back in if it wants the FAB

  const inGym = globalTab === 'gym';
  $('gymNav').style.display = inGym ? '' : 'none';
  $('globalNav').style.display = inGym ? 'none' : '';
  $('gymBackLink').style.display = inGym ? '' : 'none';
  $('topPhase').style.display = inGym ? '' : 'none';
  $('topMode').style.display = (!inGym && globalTab === 'home') ? '' : 'none';
  if (!inGym && globalTab === 'home') $('topMode').textContent = mastaMode.toUpperCase();

  if (!inGym) {
    if (globalTab === 'home') renderMastaHome();
    else if (globalTab === 'tasks') renderMastaTasks();
    else if (globalTab === 'calendar') renderMastaCalendar();
    else if (globalTab === 'more') renderMastaMore();
    else renderMastaHome();

      b.classList.toggle('active', b.dataset.gtab === globalTab);
    });
    $('topTitle').textContent = ({ home: 'Dashboard', tasks: 'Tasks', calendar: 'Calendar', more: 'More' })[globalTab] || 'Home';
    return;
  }

  if (activeTab === 'home') renderHome();
  if (activeTab === 'today') renderToday();
  if (activeTab === 'plan') renderPlan();
  if (activeTab === 'progress') renderProgress();
  if (activeTab === 'more') renderMore();

  document.querySelectorAll('#gymNav button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === activeTab);

  $('topPhase').textContent = `Phase ${currentPhase().num}`;
  $('topTitle').textContent = ({ home: 'Dashboard', today: 'Workout', plan: 'Plan', progress: 'Progress', more: 'More' })[activeTab];
}

async function polishGratitudeWithAI(raw) {

function hasUsedSupplementsRecently() {
  const t = new Date();
  for (let i = 0; i < 7; i++) {

    const k = dateToLocal(d);
    const day = state.supplements?.[k];

function buildWeekStripCells() {
  const t = new Date();
  const dow = t.getDay() || 7; // 1..7 with Mon=1
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  const td = today();
  const cells = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const dateStr = dateToLocal(d);
    const isToday = dateStr === td;
    const isPast = dateStr < td;
    const dowI = d.getDay();
    const naturalKey = effectiveDayKey(dateStr);
    const isWorkoutSlot = naturalKey != null;
    const w = state.workouts[dateStr];
    const finished = !!(w && w.finished);
    let status;
    if (finished) status = 'done';
    else if (!isWorkoutSlot) status = 'rest';
    else if (isPast) status = 'missed';
    else if (isToday) status = 'today';
    else status = 'upcoming';
    cells.push({
      dow: dowI,
      dateStr,
      label: ['S','M','T','W','T','F','S'][dowI],
      dateNum: d.getDate(),
      status,
      isToday
    });
  }
  return cells;
}

    gratInp,

  ]);
  gratSection.appendChild(gratCard);
  v.appendChild(gratSection);

  // 3. INFO BARS (Bedtime / Work / Gym) — pinned at top
  const bedtime = state.settings.bedtime || '23:00';
  const barsSection = el('div', { class: 'ml-section', style: 'display:flex;flex-direction:column;gap:8px;' });

  // Bedtime bar
  barsSection.appendChild(el('button', {
    class: 'bedtime-bar',
    onclick: () => { setGlobalTab('gym'); activeTab = 'more'; render(); }
  }, [
    el('span', { class: 'b-icon', html: ML_ICONS.moon }),
    el('span', { class: 'b-mid' }, [
      el('b', {}, 'Bedtime'),
      el('span', {}, getBedtimeCountdownLabel(bedtime))
    ]),
    el('span', { class: 'b-right' }, `goal ${bedtime}`)
  ]));

  // Work bar — next pending work task (today first, then any upcoming)
  const todayWorkTasks = tasksFor(date).filter(t => t.category === 'work');
  const workTodayPending = todayWorkTasks.filter(t => !t._done);
  const workTodayDone = todayWorkTasks.filter(t => t._done);
  let workTitle, workSub, workRight;
  if (workTodayPending.length) {
    const next = workTodayPending[0];
    workTitle = next.title;
    workSub = next.time ? `${next.time} · ${workTodayPending.length} pending today` : `${workTodayPending.length} pending today`;
    workRight = next.time || `${todayWorkTasks.length} task${todayWorkTasks.length === 1 ? '' : 's'}`;
  } else if (workTodayDone.length) {
    workTitle = 'Work';
    workSub = `✓ ${workTodayDone.length} done today`;
    workRight = 'all clear';
  } else {
    // Look ahead 7 days
    let upcoming = null;
    let dCheck = nextDateStr(date);
    for (let i = 0; i < 7; i++) {
      const ts = tasksFor(dCheck).filter(t => t.category === 'work');
      if (ts.length) { upcoming = { date: dCheck, tasks: ts }; break; }
      dCheck = nextDateStr(dCheck);
    }
    workTitle = 'Work';
    workSub = upcoming ? `Next: ${upcoming.tasks[0].title}` : 'No work tasks';
    workRight = upcoming ? friendlyDateLabel(upcoming.date) : '—';
  }
  barsSection.appendChild(el('button', {
    class: 'bedtime-bar',
    onclick: () => { setGlobalTab('tasks'); render(); }
  }, [
    el('span', { class: 'b-icon', html: ML_ICONS.briefcase }),
    el('span', { class: 'b-mid' }, [
      el('b', {}, workTitle),
      el('span', {}, workSub)
    ]),
    el('span', { class: 'b-right' }, workRight)
  ]));

  // Gym bar — today's planned session
  let gymTitle, gymSub, gymRight;
  if (day) {
    const prog = workoutProgress(date, todayKey);
    const finished = !!(wToday && wToday.finished);
    gymTitle = day.name + ' day';
    gymSub = finished ? '✓ Workout complete' : (prog.done > 0 ? 'In progress' : day.focus);
    gymRight = finished ? 'done' : `${prog.done}/${prog.total} sets`;
  } else {
    // Look ahead for next workout day
    let upcoming = null;
    let dCheck = nextDateStr(date);
    for (let i = 0; i < 7; i++) {
      const k = effectiveDayKey(dCheck);
      if (k != null) { upcoming = { date: dCheck, key: k }; break; }
      dCheck = nextDateStr(dCheck);
    }
    gymTitle = 'Rest day';
    gymSub = upcoming ? `Next: ${DAYS[upcoming.key].name}` : 'No upcoming sessions';
    gymRight = upcoming ? friendlyDateLabel(upcoming.date) : '—';
  }
  barsSection.appendChild(el('button', {
    class: 'bedtime-bar',
    onclick: () => { setGlobalTab('gym'); activeTab = 'home'; render(); }
  }, [
    el('span', { class: 'b-icon', html: ML_ICONS.dumbbell }),
    el('span', { class: 'b-mid' }, [
      el('b', {}, gymTitle),
      el('span', {}, gymSub)
    ]),
    el('span', { class: 'b-right' }, gymRight)
  ]));

  // Family bar — next pending family-category task
  const todayFamilyTasks = tasksFor(date).filter(t => t.category === 'family');
  const famTodayPending = todayFamilyTasks.filter(t => !t._done);
  const famTodayDone = todayFamilyTasks.filter(t => t._done);
  let famTitle, famSub, famRight;
  if (famTodayPending.length) {
    const next = famTodayPending[0];
    famTitle = next.title;
    famSub = next.time ? `${next.time} · ${famTodayPending.length} pending today` : `${famTodayPending.length} pending today`;
    famRight = next.time || `${todayFamilyTasks.length} task${todayFamilyTasks.length === 1 ? '' : 's'}`;
  } else if (famTodayDone.length) {
    famTitle = 'Family time';
    famSub = `✓ ${famTodayDone.length} done today`;
    famRight = 'all clear';
  } else {
    let upcoming = null;
    let dCheck = nextDateStr(date);
    for (let i = 0; i < 7; i++) {
      const ts = tasksFor(dCheck).filter(t => t.category === 'family');
      if (ts.length) { upcoming = { date: dCheck, tasks: ts }; break; }
      dCheck = nextDateStr(dCheck);
    }
    famTitle = 'Family time';
    famSub = upcoming ? `Next: ${upcoming.tasks[0].title}` : 'Add a family task to see it here';
    famRight = upcoming ? friendlyDateLabel(upcoming.date) : '—';
  }
  barsSection.appendChild(el('button', {
    class: 'bedtime-bar',
    onclick: () => { setGlobalTab('tasks'); render(); }
  }, [
    el('span', { class: 'b-icon', html: ML_ICONS.users }),
    el('span', { class: 'b-mid' }, [
      el('b', {}, famTitle),
      el('span', {}, famSub)
    ]),
    el('span', { class: 'b-right' }, famRight)
  ]));

  v.appendChild(barsSection);

  // 3. TODAY hero — next pending action
  // Build to-do items first so we know what's pending.
  const items = [];
  if (day) {
    const prog = workoutProgress(date, todayKey);
    const finished = !!(wToday && wToday.finished);
    const started = (prog.done > 0) || !!(wToday && wToday.started);
    items.push({
      icon: 'dumbbell',
      title: `${day.name} day`,
      meta: finished ? 'Workout complete' : (started ? 'In progress' : 'Not started yet'),
      status: `${prog.done} / ${prog.total}`,
      done: finished,
      onclick: () => { setGlobalTab('gym'); activeTab = 'today'; render(); }
    });
    if (BAG_ITEMS && BAG_ITEMS.length) {
      const bagDone = todaysBag().length;
      const bagTotal = BAG_ITEMS.length;
      items.push({
        icon: 'bag',
        title: 'Pack gym bag',
        meta: bagDone === bagTotal ? 'Ready to go' : 'Check your bag',
        status: `${bagDone} / ${bagTotal}`,
        done: bagDone === bagTotal,
        onclick: () => { setGlobalTab('gym'); activeTab = 'home'; state.settings.bagCollapsed = false; save(); render(); }
      });
    }
  }
  // Schedule items (timed tasks for today) merge into TO DO TODAY
  const schedule = tasksFor(date);
  schedule.forEach(t => {
    items.push({
      icon: t.category === 'gym' ? 'dumbbell' : (t.category === 'health' ? 'pill' : 'star'),
      title: t.title + (t.repeat ? ' ↻' : ''),
      meta: t.time ? t.time : (t.category || 'task'),
      status: '',
      done: !!t._done,
      onclick: () => { toggleMastaTask(t.id, date); render(); }
    });
  });
  // Untimed pending tasks (top 3)
  const pending = pendingMastaTasks().filter(t => !t.date && !t.repeat).slice(0, 3);
  pending.forEach(t => {
    items.push({
      icon: 'star',
      title: t.title,
      meta: 'task',
      status: '',
      done: false,
      onclick: () => { toggleMastaTask(t.id, date); render(); }
    });
  });

  const firstPending = items.find(it => !it.done);
  const heroIsActive = !!(firstPending && firstPending.icon === 'dumbbell');
  const hero = el('button', { class: 'ml-hero' + (heroIsActive ? ' is-active' : '') });
  if (firstPending) {
    hero.appendChild(el('div', { class: 'h-top' }, `${DAY_LABELS[dow]} · TODAY`));
    hero.appendChild(el('div', { class: 'h-big' }, firstPending.title.replace(' ↻', '')));
    const totalItems = items.length;
    const doneItems = items.filter(it => it.done).length;
    const pct = totalItems ? Math.round(doneItems / totalItems * 100) : 0;
    hero.appendChild(el('div', { class: 'h-bar' }, [el('span', { style: `width:${pct}%` })]));
    hero.appendChild(el('div', { class: 'h-cta' }, [
      el('span', {}, `${doneItems} of ${totalItems} done · tap to continue`),
      el('span', { class: 't-chev', html: ML_ICONS.arrow })
    ]));
    hero.onclick = firstPending.onclick;
  } else {
    hero.appendChild(el('div', { class: 'h-top' }, `${DAY_LABELS[dow]} · TODAY`));
    hero.appendChild(el('div', { class: 'h-big' }, 'All done for today'));
    hero.appendChild(el('div', { class: 'h-bar' }, [el('span', { style: 'width:100%' })]));
    hero.appendChild(el('div', { class: 'h-cta' }, 'Nothing left on the list'));
    hero.onclick = () => {};
  }
  v.appendChild(el('div', { class: 'ml-section' }, [hero]));

  // 4. (gratitude moved up to right after the quote)
  // 5. (week calendar moved to the Calendar tab)
  // 6. (quick log removed)

  // 7. TO DO TODAY (must-do items: workout, bag, scheduled tasks, top untimed tasks)
  const todoSection = el('div', { class: 'ml-section' });
  todoSection.appendChild(el('div', { class: 'ml-section-head' }, [
    el('span', {}, 'To do today'),
    el('span', { class: 'ml-section-meta' }, `${items.filter(i => i.done).length} / ${items.length}`)
  ]));
  const todoCard = el('div', { class: 'ml-card', style: 'padding:0;' });
  if (items.length === 0) {
    todoCard.appendChild(el('div', { class: 'ml-empty' }, 'Nothing on the list — enjoy.'));
  } else {
    const ul = el('ul', { class: 'todo-list' });
    items.forEach(it => ul.appendChild(_todoRow(it)));
    todoCard.appendChild(ul);
  }
  // AI parse — only entry point on the dashboard (manual add lives in the Tasks tab)
  todoCard.appendChild(buildAIParseBanner('margin:14px;'));
  todoSection.appendChild(todoCard);
  v.appendChild(todoSection);

  // 8. REMINDERS (soft prompts — auto-show/hide based on usage)
  const reminders = [];
  // Water — always show, with inline +/- controls (no navigation)
  const waterTarget = state.settings.waterTarget || 4;
  const waterDone = todaysWater();
  reminders.push({
    icon: 'drop',
    title: 'Drink water',
    meta: `${(waterDone * 0.5).toFixed(1)}L of ${(waterTarget * 0.5).toFixed(1)}L`,
    progress: Math.min(1, waterTarget ? waterDone / waterTarget : 0),
    status: `${waterDone}/${waterTarget}`,
    met: waterDone >= waterTarget,
    waterControls: true
  });
  // Sleep — only if last night isn't logged
  const ls = state.sleep[state.sleep.length - 1];
  const yDate = (() => { const d = new Date(date + 'T00:00:00'); d.setDate(d.getDate() - 1); return dateToLocal(d); })();
  const haveLastNight = ls && (ls.date === date || ls.date === yDate);
  if (!haveLastNight) {
    reminders.push({
      icon: 'moon',
      title: 'Log last night\'s sleep',
      meta: 'Tap to log hours',
      status: '',
      met: false,
      onclick: () => openSleepModal()
    });
  }
  // Supplements — only if used in the last 7 days
  if (hasUsedSupplementsRecently() && typeof SUPPLEMENTS !== 'undefined' && SUPPLEMENTS.length) {
    const sups = state.supplements?.[date] || {};
    const supDone = SUPPLEMENTS.filter(s => sups[s.id]).length;
    const supTotal = SUPPLEMENTS.length;
    reminders.push({
      icon: 'pill',
      title: 'Take supplements',
      meta: supDone === supTotal ? 'All taken today' : 'Check your stack',
      status: `${supDone}/${supTotal}`,
      met: supDone === supTotal,
      onclick: () => { setGlobalTab('gym'); activeTab = 'more'; render(); }
    });
  }
  if (reminders.length) {
    const remSection = el('div', { class: 'ml-section' });
    remSection.appendChild(el('div', { class: 'ml-section-head' }, [
      el('span', {}, 'Reminders'),
      el('span', { class: 'ml-section-meta' }, `${reminders.filter(r => r.met).length} / ${reminders.length}`)
    ]));
    const remCard = el('div', { class: 'ml-card', style: 'padding:0;' });
    const remUl = el('ul', { class: 'reminders-list' });
    reminders.forEach(r => {
      const li = el('li', { class: r.met ? 'met' : '', onclick: r.waterControls ? null : r.onclick });
      li.appendChild(el('span', { class: 'r-icon', html: ML_ICONS[r.icon] }));
      const body = el('div', { class: 'r-body' });
      body.appendChild(el('div', { class: 'r-title' }, r.title));
      body.appendChild(el('div', { class: 'r-meta' }, r.meta));
      if (typeof r.progress === 'number') {
        body.appendChild(el('div', { class: 'r-progress' }, [el('span', { style: `width:${Math.round(r.progress * 100)}%` })]));
      }
      li.appendChild(body);
      if (r.waterControls) {
        const controls = el('div', { class: 'r-water-ctrls' });
        const minus = el('button', {
          class: 'water-btn',
          onclick: (e) => {
            e.stopPropagation();
            const cur = todaysWater();
            if (cur <= 0) return;
            state.water[today()] = cur - 1;
            save(); render();
          }
        }, '−');
        const status = el('span', { class: 'r-status', style: 'min-width:42px;text-align:center;' }, r.status);
        const plus = el('button', {
          class: 'water-btn primary',
          onclick: (e) => {
            e.stopPropagation();
            const cur = todaysWater();
            const max = (state.settings.waterTarget || 4) * 2;
            if (cur >= max) return;
            state.water[today()] = cur + 1;
            save(); render();
          }
        }, '+');
        controls.appendChild(minus);
        controls.appendChild(status);
        controls.appendChild(plus);
        li.appendChild(controls);
      } else if (r.status) {
        li.appendChild(el('span', { class: 'r-status' }, r.status));
      }
      remUl.appendChild(li);
    });
    remCard.appendChild(remUl);
    remSection.appendChild(remCard);
    v.appendChild(remSection);
  }

}

function _scheduleRow(t, dateForToggle) {
  const isDone = t._done != null ? t._done : isTaskDoneOn(t, dateForToggle || today());
  const li = el('li', { class: isDone ? 'done' : '' });

  // Time column
  const timeEl = el('div', { class: 't-time' });
  // We use plain spans inside, so mark .s-time class on a span to use CSS
  const timeSpan = el('span', { class: 's-time' + (t.time ? '' : ' notime') }, t.time || '—');
  li.appendChild(timeSpan);

  // Check
  const check = el('span', {
    class: 's-check', html: ML_ICONS.check,
    onclick: (e) => { e.stopPropagation(); toggleMastaTask(t.id, dateForToggle || today()); render(); }
  });
  li.appendChild(check);

  // Body (title + meta)
  const body = el('div', { class: 's-body' });
  const titleEl = el('div', { class: 's-title' });
  titleEl.appendChild(el('span', {}, t.title));
  if (t.repeat) titleEl.appendChild(el('span', { class: 'repeat-ico', html: '↻' }));
  if (t.category) titleEl.appendChild(el('span', { class: 'cat-chip cat-' + t.category }, t.category));
  body.appendChild(titleEl);
  const metaParts = [];
  if (t.repeat) metaParts.push(describeRepeat(t.repeat));
  if (metaParts.length) body.appendChild(el('div', { class: 's-meta' }, metaParts.join(' · ')));
  body.onclick = () => { toggleMastaTask(t.id, dateForToggle || today()); render(); };
  li.appendChild(body);

  // Delete
  const del = el('span', {
    class: 's-del', html: ML_ICONS.trash,
    onclick: (e) => { e.stopPropagation(); deleteMastaTask(t.id); render(); }
  });
  li.appendChild(del);

  return li;
}

function renderMastaTasks() {
  const v = $('view');
  _ensureTaskArr();
  const all = state.mastalifeTasks;
  const hasKey = !!state.settings.anthropicApiKey;

  // Hero — Paste & parse with AI
  v.appendChild(buildAIParseBanner('margin-bottom:14px;'));

  // Manual add row
  const addCard = el('div', { class: 'ml-card', style: 'padding:0;margin-bottom:14px;' });
  const addInp = el('input', { type: 'text', placeholder: 'Add a task…', maxlength: '120' });
  const addBtn = el('button', {}, 'Add');
  const submit = () => {
    const v2 = addInp.value.trim();
    if (!v2) return;
    addMastaTask({ title: v2, date: today() });
    addInp.value = '';
    render();
  };
  addBtn.onclick = submit;
  addInp.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
  addCard.appendChild(el('div', { class: 'tasks-add-row' }, [addInp, addBtn]));
  v.appendChild(addCard);

  // Build groups: by date for tasks with a date or recurrence; "No date" otherwise.
  // Recurring tasks live under their next-due-from-today bucket.
  const td = today();
  const groups = new Map(); // dateStr → { label, tasks: [], sortKey }
  let noDate = [];
  let allDone = [];
  function nextDueFrom(task, fromStr) {
    if (!task.repeat) return task.date || null;
    let d = fromStr;
    for (let i = 0; i < 90; i++) {
      if (matchesRepeat(task.repeat, d) && d >= (task.date || fromStr)) return d;
      d = nextDateStr(d);
    }
    return null;
  }
  for (const t of all) {
    // Legacy task (no date, no repeat, but has done flag): treat as one-off "no date"
    if (!t.date && !t.repeat) {
      if (t.done) allDone.push(t);
      else noDate.push(t);
      continue;
    }
    let bucketDate;
    if (t.repeat) bucketDate = nextDueFrom(t, td);
    else bucketDate = t.date;
    if (!bucketDate) { noDate.push(t); continue; }
    // Hide bucket if all instances on/before today are completed (only for one-off tasks)
    if (!t.repeat && t.date < td && isTaskDoneOn(t, t.date)) { allDone.push(t); continue; }
    const key = bucketDate;
    if (!groups.has(key)) groups.set(key, { label: friendlyDateLabel(key), tasks: [], sortKey: key });
    groups.get(key).tasks.push(t);
  }

  // Render groups in date order
  const sorted = [...groups.values()].sort((a, b) => a.sortKey.localeCompare(b.sortKey));
  if (sorted.length === 0 && noDate.length === 0) {
    v.appendChild(el('div', { class: 'ml-card' }, [
      el('div', { class: 'ml-empty' }, hasKey ? 'No tasks yet. Paste a list above or add one.' : 'No tasks yet. Add one above.')
    ]));
  }
  for (const g of sorted) {
    const head = el('div', { class: 'group-head' }, [
      el('span', {}, g.label),
      el('span', { class: 'group-meta' }, `${g.tasks.length}`)
    ]);
    v.appendChild(head);
    const card = el('div', { class: 'ml-card', style: 'padding:0;margin-bottom:14px;' });
    const ul = el('ul', { class: 'schedule-list' });
    // Sort by time within group (untimed last)
    g.tasks.sort((a, b) => {
      const ta = a.time || '99:99', tb = b.time || '99:99';
      if (ta !== tb) return ta < tb ? -1 : 1;
      return (a.createdAt || 0) - (b.createdAt || 0);
    });
    g.tasks.forEach(t => ul.appendChild(_scheduleRow(t, g.sortKey)));
    card.appendChild(ul);
    v.appendChild(card);
  }

  if (noDate.length) {
    v.appendChild(el('div', { class: 'group-head' }, [
      el('span', {}, 'No date'),
      el('span', { class: 'group-meta' }, `${noDate.length}`)
    ]));
    const card = el('div', { class: 'ml-card', style: 'padding:0;margin-bottom:14px;' });
    const ul = el('ul', { class: 'schedule-list' });
    noDate.forEach(t => ul.appendChild(_scheduleRow(t)));
    card.appendChild(ul);
    v.appendChild(card);
  }

  // Done section — legacy + recently completed
  const doneSorted = allDone.sort((a, b) => (b.doneAt || 0) - (a.doneAt || 0)).slice(0, 30);
  if (doneSorted.length) {
    v.appendChild(el('div', { class: 'group-head' }, [
      el('span', {}, 'Done'),
      el('span', { class: 'group-meta' }, `${doneSorted.length}`)
    ]));
    const card = el('div', { class: 'ml-card', style: 'padding:0;' });
    const ul = el('ul', { class: 'schedule-list' });
    doneSorted.forEach(t => ul.appendChild(_scheduleRow(t)));
    card.appendChild(ul);
    v.appendChild(card);
  }
}

function renderMastaCalendar() {
  const v = $('view');
  const td = today();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dowFull = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // Build 14 days from today
  const days = [];
  let d = td;
  for (let i = 0; i < 14; i++) {
    days.push(d);
    d = nextDateStr(d);
  }
  const startD = new Date(days[0] + 'T00:00:00');
  const endD = new Date(days[13] + 'T00:00:00');

  // Range subtitle
  const rangeStr = `${months[startD.getMonth()]} ${startD.getDate()} – ${months[endD.getMonth()]} ${endD.getDate()}`;
  v.appendChild(el('div', { class: 'calendar-range' }, rangeStr));

  // AI parse hero — quick way to populate days
  v.appendChild(buildAIParseBanner('margin-bottom:14px;'));

  // Determine grouping: today, rest of this week (Mon-start), next week
  // We use a "this week ends Sunday" boundary based on today.
  const todayDate = new Date(td + 'T00:00:00');
  const todayDow0 = todayDate.getDay(); // 0=Sun..6=Sat
  // Days remaining including today through Sunday (this week)
  const thisWeekRemaining = (todayDow0 === 0) ? 1 : (7 - todayDow0 + 1); // includes today

  function buildDayCard(dStr) {
    const dKey = effectiveDayKey(dStr);
    const dDay = dKey != null ? DAYS[dKey] : null;
    const w = state.workouts[dStr];
    const finished = !!(w && w.finished);
    const dayTasks = tasksFor(dStr);
    const isToday = dStr === td;
    const isPast = dStr < td;
    const hasDone = finished || dayTasks.some(t => t._done);
    const dDate = new Date(dStr + 'T00:00:00');
    const itemCount = (dDay ? 1 : 0) + dayTasks.length;

    const card = el('div', {
      class: 'cal-day-big' + (isToday ? ' is-today' : '') + (isPast && !isToday ? ' is-past' : '') + (hasDone ? ' has-done' : '')
    });

    // Header
    const head = el('div', { class: 'cdb-head' });
    const left = el('div', { class: 'cdb-head-left' });
    left.appendChild(el('span', { class: 'cdb-dow' }, dowFull[dDate.getDay()]));
    left.appendChild(el('span', { class: 'cdb-sub' }, `${months[dDate.getMonth()]} ${dDate.getDate()}`));
    head.appendChild(left);
    if (isToday) head.appendChild(el('span', { class: 'cdb-today-badge' }, 'Today'));
    else if (itemCount) head.appendChild(el('span', { class: 'cdb-count' }, `${itemCount} item${itemCount === 1 ? '' : 's'}`));
    card.appendChild(head);

    // Body
    const body = el('div', { class: 'cdb-body' });

    // Gym session block
    if (dDay) {
      const gym = el('div', {
        class: 'cdb-gym' + (finished ? ' done' : ''),
        onclick: (e) => { e.stopPropagation(); setGlobalTab('gym'); activeTab = isToday ? 'today' : 'plan'; render(); }
      });
      gym.appendChild(el('span', { class: 'cdb-gym-icon', html: ML_ICONS.dumbbell }));
      const gBody = el('div', { class: 'cdb-gym-body' });
      gBody.appendChild(el('div', { class: 'cdb-gym-title' }, dDay.name + ' day' + (finished ? ' ✓' : '')));
      gBody.appendChild(el('div', { class: 'cdb-gym-focus' }, `${dDay.focus} · ${dDay.exercises.length} exercises`));
      gym.appendChild(gBody);
      body.appendChild(gym);
    }

    // Split tasks: recurring tasks render as prominent blocks (like gym), one-offs as small rows.
    const recurringTasks = dayTasks.filter(t => t.repeat);
    const oneOffTasks = dayTasks.filter(t => !t.repeat);

    // Recurring task blocks — same UI as the gym block, category-mapped icon.
    recurringTasks.forEach(t => {
      const catIcon = t.category === 'work' ? 'briefcase'
        : t.category === 'gym' ? 'dumbbell'
        : t.category === 'health' ? 'pill'
        : t.category === 'family' ? 'users'
        : 'briefcase';
      const block = el('div', {
        class: 'cdb-gym' + (t._done ? ' done' : ''),
        onclick: (e) => { e.stopPropagation(); toggleMastaTask(t.id, dStr); render(); }
      });
      block.appendChild(el('span', { class: 'cdb-gym-icon', html: ML_ICONS[catIcon] }));
      const tBody = el('div', { class: 'cdb-gym-body' });
      const titlePrefix = t.time ? t.time + ' · ' : '';
      tBody.appendChild(el('div', { class: 'cdb-gym-title' }, titlePrefix + t.title + (t._done ? ' ✓' : '')));
      const subParts = [describeRepeat(t.repeat)];
      if (t.category) subParts.push(t.category);
      tBody.appendChild(el('div', { class: 'cdb-gym-focus' }, subParts.join(' · ')));
      block.appendChild(tBody);
      body.appendChild(block);
    });

    // One-off task rows
    oneOffTasks.forEach(t => {
      const row = el('div', { class: 'cdb-task' + (t._done ? ' done' : '') });
      row.appendChild(el('span', { class: 'cdb-task-time' }, t.time || '—'));
      const txt = el('span', { class: 'cdb-task-text' });
      txt.appendChild(el('span', {}, t.title));
      if (t.category) txt.appendChild(el('span', { class: 'cat-chip cat-' + t.category }, t.category));
      row.appendChild(txt);
      const check = el('span', {
        class: 'cdb-task-check', html: ML_ICONS.check,
        onclick: (e) => { e.stopPropagation(); toggleMastaTask(t.id, dStr); render(); }
      });
      row.appendChild(check);
      body.appendChild(row);
    });

    // Empty state
    if (!dDay && dayTasks.length === 0) {
      body.appendChild(el('div', { class: 'cdb-empty' }, 'Rest day · nothing scheduled'));
    }

    card.appendChild(body);
    return card;
  }

  // Group: TODAY
  v.appendChild(el('div', { class: 'cdb-group-head' }, [el('span', {}, 'Today')]));
  v.appendChild(buildDayCard(td));

  // Group: REST OF THIS WEEK (tomorrow → Sunday)
  if (thisWeekRemaining > 1) {
    v.appendChild(el('div', { class: 'cdb-group-head' }, [
      el('span', {}, 'This week'),
      el('span', { class: 'group-meta' }, `${thisWeekRemaining - 1} days left`)
    ]));
    for (let i = 1; i < thisWeekRemaining && i < days.length; i++) {
      v.appendChild(buildDayCard(days[i]));
    }
  }

  // Group: NEXT WEEK
  if (days.length > thisWeekRemaining) {
    v.appendChild(el('div', { class: 'cdb-group-head' }, [
      el('span', {}, 'Next week'),
      el('span', { class: 'group-meta' }, '7 days')
    ]));
    for (let i = thisWeekRemaining; i < days.length; i++) {
      v.appendChild(buildDayCard(days[i]));
    }
  }
}

function buildRing(opts) {
  // opts: { value, total, percent, color, valueLabel, subLabel }
  const pct = Math.min(1, opts.percent != null ? opts.percent : (opts.total > 0 ? opts.value / opts.total : 0));
  const r = 22, c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const color = opts.color || 'var(--accent)';
  const card = el('div', { class: 'ring-card' });
  const ring = el('div', { class: 'ring' });
  ring.innerHTML = `
    <svg viewBox="0 0 56 56" width="56" height="56">
      <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
      <circle class="ring-fg" cx="28" cy="28" r="${r}" style="stroke:${color}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <span class="ring-label" style="color:${color}">${Math.round(pct * 100)}%</span>`;
  card.appendChild(ring);
  card.appendChild(el('div', { class: 'ring-info' }, [
    el('div', { class: 'num' }, opts.valueLabel),
    el('div', { class: 'lbl' }, opts.subLabel)
  ]));
  return card;
}

function buildRingsRow() {
  const row = el('div', { class: 'rings-row' });

  // Phase progress — kept orange as the program's signature accent
  const total = totalSessions();
  const ph = currentPhase();
  const PHASE_TARGETS = { 1: 16, 2: 24, 3: 32, 4: 48 };
  const phaseTarget = PHASE_TARGETS[ph.num] || 16;
  row.appendChild(buildRing({
    value: total, total: phaseTarget,
    color: '#fb923c',
    valueLabel: `${total} / ${phaseTarget}`,
    subLabel: `Phase ${ph.num}`
  }));

  // This week
  const sw = sessionsThisWeek();
  row.appendChild(buildRing({

    subLabel: 'This week'
  }));

  // Bedtime: live countdown + 7-night compliance vs target time
  const bedtime = state.settings.bedtime || '23:00';
  const compliance = getBedtimeComplianceLast7();
  const countdown = getBedtimeCountdownLabel(bedtime);
  row.appendChild(buildRing({
    percent: compliance ?? 0,

    valueLabel: countdown,

  }));

function getSleepAvgLast7() {
  if (!state.sleep.length) return null;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutKey = cutoff.toISOString().slice(0, 10);
  const recent = state.sleep.filter(s => s.date >= cutKey);
  if (!recent.length) return null;
  return recent.reduce((a, s) => a + s.hours, 0) / recent.length;
}

function getBedtimeComplianceLast7() {
  if (!state.sleep.length) return null;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const cutKey = cutoff.toISOString().slice(0, 10);
  const target = state.settings.bedtime || '23:00';
  const recent = state.sleep.filter(s => s.date >= cutKey && s.bedtime);
  if (!recent.length) return null;
  const onTime = recent.filter(s => s.bedtime <= target).length;
  return onTime / recent.length;
}

function getBedtimeCountdownLabel(target) {
  const [hh, mm] = (target || '23:00').split(':').map(Number);
  const now = new Date();
  const t = new Date(now); t.setHours(hh, mm, 0, 0);
  const diffMin = Math.round((t - now) / 60000);
  if (diffMin <= -60) return 'past';
  if (diffMin <= 0) return 'now';
  const h = Math.floor(diffMin / 60);
  const m = diffMin % 60;
  return h ? `in ${h}h ${m}m` : `in ${m}m`;
}

function totalTimeThisWeek() {
  const t = new Date(); const dow = t.getDay() || 7;
  const monday = new Date(t); monday.setDate(t.getDate() - (dow - 1));
  let total = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const w = state.workouts[k];
    if (w?.finished) total += (w.timers?.warmup || 0) + (w.timers?.workout || 0);
  }
  return total;
}

    ]);

    wrap.appendChild(el('div', { class: 'focus-meta' }, [
      el('span', { id: 'focusWarmupPct' }, `${Math.round(pct)}%`),

    ]));

    const prog = workoutProgress(date, dayKey);
    wrap.appendChild(el('div', { class: 'focus-label' }, 'WORKOUT'));
    wrap.appendChild(makeTimerRow({
      timerId: 'focusWorkoutSecs',
      timerText: fmtTime(ms),
      onPause: () => setPhase(date, 'workout')
    }));
    wrap.appendChild(el('div', { class: 'focus-meta' }, [
      el('span', {}, `${prog.done}/${prog.total} sets`),
      el('span', { class: 'dim' }, prog.total ? `${Math.round(prog.done/prog.total*100)}%` : '')
    ]));

    // Current exercise — honor explicit expandedExId, otherwise auto-pick first incomplete.
    let curId = null;
    const explicit = day.exercises.find(e => e.id === expandedExId);
    if (explicit) {
      curId = explicit.id;
    } else {
      for (const candidate of day.exercises) {
        const lg = w.logs?.[candidate.id] || [];
        if (lg.filter(s => s.d).length < candidate.sets) { curId = candidate.id; break; }
      }
    }

    // Exercise switcher strip — tap any chip to jump.
    const strip = el('div', {
      class: 'focus-ex-strip',
      style: 'display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch;'
    });
    day.exercises.forEach((ex, i) => {
      const lg = w.logs?.[ex.id] || [];
      const doneSets = lg.filter(s => s.d).length;
      const isDone = doneSets >= ex.sets;
      const isCurrent = ex.id === curId;
      strip.appendChild(el('button', {
        class: 'chip' + (isCurrent ? ' accent' : ''),
        style: 'padding:8px 10px;flex-shrink:0;font-size:12px;font-weight:600;' + (isDone ? 'opacity:0.6;' : ''),
        onclick: e => { e.preventDefault(); expandedExId = ex.id; render(); }
      }, `${i + 1}. ${isDone ? '✓ ' : ''}${ex.name}`));
    });
    wrap.appendChild(strip);

    if (curId) {
      const ex = day.exercises.find(e => e.id === curId);
      if (ex) wrap.appendChild(renderExercise(ex, date, dayKey));
    } else {
      wrap.appendChild(el('div', { class: 'card center', style: 'padding:24px 16px;' }, [
        el('div', { class: 'bold', style: 'margin-bottom:6px;' }, 'All sets done'),
        el('div', { class: 'small muted' }, 'Tap finish to save the session.')
      ]));
    }

    // Finish button
    wrap.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:16px;',
      onclick: () => {
        if (w.activePhase && w.phaseStart) {
          w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (Date.now() - w.phaseStart);
          w.activePhase = null; w.phaseStart = null;
        }
        w.finished = Date.now();
        save(); toast('Workout saved 🎯', 'celebrate'); stopRest();
        if (phaseTickInterval) clearInterval(phaseTickInterval);
        releaseWakeLock();
        homeFocusExited = false;
        render();
      }
    }, prog.done === prog.total ? 'Finish workout' : `Finish (${prog.done}/${prog.total} sets)`));
  } else {
    // No active phase but session has elapsed time — paused mid-flight
    const inWorkout = (w.timers?.workout || 0) > 0;
    wrap.appendChild(el('div', { class: 'focus-label' }, 'PAUSED'));
    wrap.appendChild(el('div', { class: 'focus-timer' }, fmtTime((w.timers?.warmup || 0) + (w.timers?.workout || 0))));
    wrap.appendChild(el('div', { class: 'small muted center', style: 'margin:0 0 18px;' }, inWorkout ? 'Workout paused' : 'Warmup paused'));
    if (inWorkout) {
      wrap.appendChild(el('button', {
        class: 'btn',
        onclick: () => setPhase(date, 'workout')
      }, '▶ Resume workout'));
    } else {
      wrap.appendChild(el('button', {
        class: 'btn',
        onclick: () => setPhase(date, 'warmup')
      }, '▶ Resume warmup'));
      wrap.appendChild(el('button', {
        class: 'btn secondary',
        style: 'margin-top:8px;',
        onclick: () => endWarmupAndStartWorkout(date)
      }, 'Skip to workout →'));
    }
  }

  v.appendChild(wrap);
  if (w.activePhase) {
    startPhaseTick();
    ensureFloatingPauseBtn(() => setPhase(date, w.activePhase));
  } else {
    hideFloatingPauseBtn();
  }
}

      style: 'cursor:pointer;align-items:center;gap:8px;' + (collapsed ? '' : 'margin-bottom:8px;'),
      onclick: () => {
        state.settings.bagCollapsed = !state.settings.bagCollapsed;
        save(); render();
      }
    });
    header.appendChild(el('div', { class: 'row', style: 'gap:8px;align-items:center;' }, [
      el('div', { class: 'card-title', style: 'margin:0;' }, '🎒 Gym bag'),
      el('span', { class: 'chip' + (bagFull ? ' success' : '') }, bagFull ? '✓ Packed' : `${bagDone} / ${bagTotal}`)
    ]));
    const rightControls = el('div', { class: 'row', style: 'gap:8px;align-items:center;' });
    if (bagDone > 0 && !collapsed) {
      rightControls.appendChild(el('button', {
        class: 'btn small secondary',
        style: 'padding:4px 10px;font-size:11px;',
        onclick: (e) => {
          e.stopPropagation();
          state.bag[today()] = [];
          save(); render();
        }
      }, 'Clear'));
    }
    rightControls.appendChild(el('span', {
      style: 'color:var(--text-muted);font-size:14px;transition:transform 0.2s;' + (collapsed ? '' : 'transform:rotate(90deg);')
    }, '›'));
    header.appendChild(rightControls);
    bagCard.appendChild(header);

    if (!collapsed) {
      const ul = el('ul', { class: 'checklist' });
      BAG_ITEMS.forEach(it => {
        const isChecked = checked.has(it.id);
        const li = el('li', {
          class: 'bag-row' + (isChecked ? ' done' : ''),
          onclick: () => { bagToggle(it.id); render(); }
        });
        li.innerHTML = `
          <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4 12 10 18 20 6"/></svg></span>
          <span class="text">${escapeHtml(it.label)}</span>`;
        ul.appendChild(li);
      });
      bagCard.appendChild(ul);
    }
    v.appendChild(bagCard);
  }

  // Recent wins (moved from MastaLife dashboard)
  {
    const ph = currentPhase();
    const sw = sessionsThisWeek();
    const streak = getStreak();
    const bw = lastBodyWeight();
    const startBw = state.bodyWeight[0];
    const wkd = bw && startBw ? (bw.weight - startBw.weight) : null;
    const winsSection = el('div', { class: 'ml-section' });
    winsSection.appendChild(el('div', { class: 'ml-section-head' }, [el('span', {}, 'Recent wins')]));
    const winsRow = el('div', { class: 'wins-row' });
    winsRow.appendChild(el('div', { class: 'win-card' + (sw >= 4 ? ' positive' : '') }, [
      el('div', { class: 'w-lbl', html: ML_ICONS.flame + ' <span>This week</span>' }),
      el('div', { class: 'w-val' }, `${sw} / 4`),
      el('div', { class: 'w-sub' }, sw >= 4 ? '✓ on target' : `${4 - sw} to go`)
    ]));
    winsRow.appendChild(el('div', { class: 'win-card' + (streak > 0 ? ' positive' : '') }, [
      el('div', { class: 'w-lbl', html: ML_ICONS.star + ' <span>Streak</span>' }),
      el('div', { class: 'w-val' }, `${streak}w`),
      el('div', { class: 'w-sub' }, streak > 0 ? 'consecutive weeks' : 'start one')
    ]));
    winsRow.appendChild(el('div', { class: 'win-card' + ((wkd != null && wkd <= 0) ? ' positive' : '') }, [
      el('div', { class: 'w-lbl', html: ML_ICONS.trend + ' <span>Weight</span>' }),
      el('div', { class: 'w-val' }, bw ? `${bw.weight}kg` : '—'),
      el('div', { class: 'w-sub' }, wkd != null ? `${wkd >= 0 ? '+' : ''}${wkd.toFixed(1)} from start` : 'log to start')
    ]));
    winsRow.appendChild(el('div', { class: 'win-card' }, [
      el('div', { class: 'w-lbl', html: ML_ICONS.target + ' <span>Phase</span>' }),
      el('div', { class: 'w-val' }, `P${ph.num}`),
      el('div', { class: 'w-sub' }, `Wk ${currentWeek()}`)
    ]));
    winsSection.appendChild(winsRow);
    v.appendChild(winsSection);
  }

  // Nudges
  const nudges = getNudges();
  if (nudges.length) {
    const nc = el('div', { class: 'card' });
    nc.appendChild(el('div', { class: 'card-title' }, 'Reminders'));
    nudges.forEach(n => {
      const row = el('div', {
        class: 'nudge' + (n.action ? ' clickable' : ''),
        onclick: n.action || null
      });
      row.appendChild(el('span', { class: 'nudge-icon' }, n.icon));
      row.appendChild(el('span', { class: 'nudge-text' }, n.text));
      if (n.action) row.appendChild(el('span', { class: 'nudge-arrow' }, '›'));
      nc.appendChild(row);
    });
    v.appendChild(nc);
  }
}

/* =========== TODAY =========== */
function renderToday() {
  const v = $('view');
  const dow = todayDow();
  const date = today();
  const dayKey = activeDayKey ?? effectiveDayKey(date);
  const day = dayKey ? DAYS[dayKey] : null;

  if (!day) {
    v.appendChild(el('div', { class: 'hero' }, [
      el('div', { class: 'day-name' }, DAY_LABELS[dow]),
      el('h2', {}, 'Rest day'),
      el('div', { class: 'focus' }, 'Recover. Walk. Sleep early.'),
      el('div', { class: 'meta' }, [el('span', { class: 'chip success' }, 'Active recovery')])
    ]));

    const dl = daysToNextPhase();
    if (dl !== null && dl >= 0 && dl <= 7) {
      v.appendChild(makePhaseAlert());
    }

    v.appendChild(el('div', { class: 'card' }, [
      el('div', { class: 'card-title' }, 'Train a different day?'),
      el('div', { class: 'row wrap', style: 'gap:8px;' },
        Object.entries(DAYS).map(([k, d]) =>
          el('button', { class: 'btn secondary', style: 'flex:1;min-width:42%;', onclick: () => { activeDayKey = +k; expandedExId = null; editingSetKey = null; render(); } }, d.name)
        )
      )
    ]));
    return;
  }

  const prog = workoutProgress(date, dayKey);
  const pct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;
  const w = ensureWorkout(date, dayKey);

  // Hero
  const hero = el('div', { class: 'hero' });
  hero.appendChild(el('div', { class: 'day-name' }, `${DAY_LABELS[dow]} · ${date}`));
  hero.appendChild(el('h2', {}, day.name));
  hero.appendChild(el('div', { class: 'focus' }, day.focus));
  const meta = el('div', { class: 'meta' });
  meta.appendChild(el('span', { class: 'chip accent' }, `Week ${currentWeek()}`));
  meta.appendChild(el('span', { class: 'chip' }, `${day.exercises.length} exercises`));
  if (w.finished) meta.appendChild(el('span', { class: 'chip success' }, '✓ Done'));
  hero.appendChild(meta);

  const progEl = el('div', { class: 'progress' });
  progEl.appendChild(el('div', { class: 'progress-bar' }, [el('span', { style: `width:${pct}%` })]));
  progEl.appendChild(el('div', { class: 'progress-meta' }, [
    el('span', {}, `${prog.done}/${prog.total} sets`),
    el('span', {}, `${pct}%`)
  ]));
  hero.appendChild(progEl);
  v.appendChild(hero);

  // Phase alert
  const dl = daysToNextPhase();
  if (dl !== null && dl >= 0 && dl <= 7) v.appendChild(makePhaseAlert());

  // Coach note
  v.appendChild(el('div', { class: 'coach-note' + (day.warn ? ' warn' : ''), html: `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <span>${escapeHtml(day.note)}</span>` }));

  // Lab timer
  v.appendChild(buildLabTimer(date, w));

  // Day switcher
  const sw = el('div', { class: 'row', style: 'gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;' });
  Object.entries(DAYS).forEach(([k, d]) => {
    sw.appendChild(el('button', {
      class: 'chip' + (+k === dayKey ? ' accent' : ''),
      style: 'padding:8px 12px;font-size:12px;flex-shrink:0;',
      onclick: () => { activeDayKey = +k; expandedExId = null; editingSetKey = null; render(); }
    }, d.name));
  });
  v.appendChild(sw);

  // Reset today (only when there's something to reset)
  const hasProgress = prog.done > 0 || w.started || w.activePhase ||
    (w.timers && (w.timers.warmup || w.timers.workout || w.timers.cooldown));
  if (hasProgress && !w.finished) {
    v.appendChild(el('div', { class: 'row', style: 'justify-content:flex-end;margin-bottom:8px;' }, [
      el('button', {
        class: 'btn secondary',
        style: 'font-size:12px;padding:6px 12px;color:var(--danger);',
        onclick: resetTodayWorkout
      }, '↺ Reset today')
    ]));
  }

  // Exercises
  day.exercises.forEach(ex => v.appendChild(renderExercise(ex, date, dayKey)));

  // Finish button
  if (!w.finished) {
    v.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:16px;',
      onclick: () => {
        if (w.activePhase && w.phaseStart) {
          w.timers[w.activePhase] = (w.timers[w.activePhase] || 0) + (Date.now() - w.phaseStart);
          w.activePhase = null; w.phaseStart = null;
        }
        w.finished = Date.now();
        save(); toast('Workout saved 🎯'); stopRest();
        if (phaseTickInterval) clearInterval(phaseTickInterval);
        releaseWakeLock();
        render();
      }
    }, prog.done === prog.total ? 'Finish workout' : `Finish (${prog.done}/${prog.total} sets)`));
  } else {
    v.appendChild(el('button', {
      class: 'btn secondary', style: 'margin-top:16px;',
      onclick: () => { w.finished = null; save(); render(); }
    }, 'Reopen workout'));
  }

  if (w.activePhase) startPhaseTick();
}

function makePhaseAlert() {
  const dl = daysToNextPhase();
  const np = nextPhase();
  if (!np) return null;
  return el('div', { class: 'coach-note info', html: `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>
    <span><b>Phase ${np.num} starts in ${dl} day${dl === 1 ? '' : 's'}</b> — ${escapeHtml(np.desc)}. Have all sets felt easy for 2 weeks?</span>
  ` });
}

function buildLabTimer(date, w) {
  const card = el('div', { class: 'lab-timer' });
  card.appendChild(el('div', { class: 'card-title', style: 'margin:0 0 4px;' }, 'Workout timer'));
  card.appendChild(el('div', { class: 'small muted' }, w.activePhase ? `Tracking: ${w.activePhase}` : 'Tap a phase to start tracking time'));
  const phases = el('div', { class: 'phases', style: 'grid-template-columns: repeat(2, 1fr);' });
  ['warmup', 'workout'].forEach(p => {
    let ms = w.timers[p] || 0;
    if (w.activePhase === p && w.phaseStart) ms += Date.now() - w.phaseStart;
    const isActive = w.activePhase === p;
    const isDone = !isActive && ms > 0;
    phases.appendChild(el('button', {
      class: 'phase-btn' + (isActive ? ' active' : '') + (isDone ? ' done' : ''),
      onclick: () => setPhase(date, p)
    }, [
      el('span', { class: 'lbl' }, p),
      el('span', { class: 't' }, fmtTime(ms))
    ]));
  });
  card.appendChild(phases);

  // Add session note
  const noteRow = el('div', { class: 'row', style: 'margin-top:10px;gap:8px;' });
  noteRow.appendChild(el('button', {
    class: 'btn secondary small',
    style: 'flex:1;',
    onclick: () => openSessionNoteModal(date)
  }, w.sessionNote ? '✎ Edit session note' : '+ Add session note'));
  if (w.sessionNote) {
    noteRow.appendChild(el('span', { class: 'chip accent' }, 'Has note'));
  }
  card.appendChild(noteRow);
  return card;
}

function renderExercise(ex, date, dayKey) {
  const logs = getSetLogs(date, dayKey, ex);
  const allDone = logs.every(s => s.d);
  const lastSession = getLastSession(ex.id, date);
  const w = ensureWorkout(date, dayKey);
  const note = w.notes[ex.id] || '';
  const hasPRThisSession = logs.some(s => isCurrentSetPR(ex.id, date, s));
  const isExpanded = getActiveExId(date, dayKey) === ex.id;
  const displayName = getDisplayName(ex, date);
  const swapIdx = getDisplaySwap(ex, date);
  const doneCount = logs.filter(s => s.d).length;

  const card = el('div', {
    class: 'exercise ' + (isExpanded ? 'expanded' : 'collapsed') +
      (allDone ? ' complete' : '') + (hasPRThisSession ? ' has-pr' : '')
  });

  // Clickable header (always visible)
  const header = el('button', {
    class: 'ex-header-clickable',
    onclick: () => {
      expandedExId = isExpanded ? 'none' : ex.id;
      editingSetKey = null;
      render();
    }
  });
  const headerLeft = el('div', { class: 'grow', style: 'min-width:0;' });
  const nameEl = el('div', { class: 'ex-name' });
  nameEl.appendChild(document.createTextNode(displayName));
  if (swapIdx > 0) nameEl.appendChild(el('span', { class: 'chip', style: 'margin-left:6px;font-size:10px;' }, 'swapped'));
  if (hasPRThisSession) nameEl.appendChild(el('span', { class: 'chip pr', style: 'margin-left:6px;' }, '★ PR'));
  headerLeft.appendChild(nameEl);
  headerLeft.appendChild(el('div', { class: 'ex-target' }, ex.target));
  header.appendChild(headerLeft);

  const headerRight = el('div', { class: 'ex-status' });
  headerRight.appendChild(el('span', {
    class: 'sets-count' + (allDone ? ' all-done' : '')
  }, `${doneCount}/${ex.sets}`));
  headerRight.appendChild(el('span', { class: 'chevron' + (isExpanded ? ' open' : '') }, '›'));
  header.appendChild(headerRight);
  card.appendChild(header);

  if (!isExpanded) return card;

  // Expanded body
  const body = el('div', { class: 'ex-body' });

  // Action icon row
  const icons = el('div', { class: 'ex-icons-row' });
  icons.appendChild(makeActionBtn('Demo',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
    () => openVideoSearch(displayName)));
  icons.appendChild(makeActionBtn('Swap',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4v16M17 20V4M3 8l4-4 4 4M21 16l-4 4-4-4"/></svg>',
    () => openSwapModal(ex, date),
    swapIdx > 0));
  icons.appendChild(makeActionBtn('Image',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
    () => openImageModal(displayName)));
  icons.appendChild(makeActionBtn('Note',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>',
    () => openExerciseNoteModal(date, dayKey, ex),
    !!note));
  icons.appendChild(makeActionBtn('History',
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/></svg>',
    () => openStrengthChart(ex)));
  body.appendChild(icons);

  if (ex.warn) {
    body.appendChild(el('div', { class: 'coach-note warn', style: 'font-size:12px;padding:8px 10px;margin:6px 0;' }, [el('span', {}, '⚠ ' + ex.warn)]));
  }

  const setsCont = el('div', { class: 'sets-v2' });
  logs.forEach((_, i) => setsCont.appendChild(renderSetRow(ex, date, dayKey, logs, i, lastSession)));
  body.appendChild(setsCont);

  body.appendChild(el('button', {
    class: 'add-set',
    onclick: e => { e.stopPropagation(); logs.push({ w: '', r: '', d: false }); save(); render(); }

  return card;

  ]);

function renderSetRow(ex, date, dayKey, logs, i, lastSession) {
  const s = logs[i];
  const setKey = `${ex.id}-${i}`;
  const isEditing = editingSetKey === setKey;
  const lastSet = lastSession?.sets[i];
  const w = ensureWorkout(date, dayKey);
  const isPR = s.d && isCurrentSetPR(ex.id, date, s);

  const row = el('div', {
    class: 'set-v2' + (s.d ? ' done' : '') + (isPR ? ' pr' : '') + (isEditing ? ' editing' : '')
  });
  row.appendChild(el('div', { class: 'set-badge' }, s.d ? '✓' : (isPR ? '★' : String(i + 1))));

  const body = el('div', { class: 'set-body' });

  if (isEditing) {
    if (!s.w && !ex.bw) s.w = String(lastSet?.w ?? ex.weight);
    if (!s.r) s.r = String(lastSet?.r ?? getSetTargets(ex)[i] ?? ex.repsMin);

    if (!ex.bw && !ex.timed) {
      if (ex.barbell) {
        body.appendChild(makeStepperRow('kg', s.w, 2.5, val => { logs[i].w = val; save(); render(); }));
      } else {
        body.appendChild(makeWeightPickerRow(s.w, val => { logs[i].w = val; save(); render(); }));
      }
    }
    body.appendChild(makeStepperRow(ex.timed ? 'sec' : 'reps', s.r, 1, val => { logs[i].r = val; save(); render(); }));
    body.appendChild(el('button', {
      class: 'btn',
      style: 'margin-top:4px;padding:11px;font-size:14px;',
      onclick: e => {
        e.stopPropagation();
        const prevPR = getPR(ex.id, date);
        logs[i].d = true;
        editingSetKey = null;
        if (!w.started) w.started = Date.now();
        save(); render();
        startRest();
        if (navigator.vibrate) navigator.vibrate(20);
        const e1 = epley(logs[i].w, logs[i].r);
        if (e1 > 0 && (!prevPR || e1 > prevPR.e)) {
          const lift = ex.bw ? `BW × ${logs[i].r}` : `${logs[i].w}kg × ${logs[i].r}`;
          toast(`★ NEW PR · ${lift}`, 'celebrate');
          if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 100]);
        }
      }
    }, s.d ? 'Save' : 'Log set'));
  } else if (s.d) {
    const lbl = ex.bw ? `BW × ${s.r}${ex.timed ? 's' : ''}` : `${s.w} kg × ${s.r}${ex.timed ? 's' : ''}`;
    body.appendChild(el('div', { class: 'set-summary' }, lbl));
    if (isPR) body.appendChild(el('span', { class: 'small', style: 'color:var(--pr);font-weight:700;' }, '★ Personal record'));
  } else {
    if (lastSet) {
      body.appendChild(el('div', { class: 'last-hint' }, `Last: ${ex.bw ? 'BW' : lastSet.w + 'kg'} × ${lastSet.r}${ex.timed ? 's' : ''}`));
    }
    const tapW = parseFloat(s.w) || lastSet?.w || ex.weight;
    const tapR = parseFloat(s.r) || lastSet?.r || getSetTargets(ex)[i] || ex.repsMin;
    const tapVal = ex.bw ? `BW × ${tapR}${ex.timed ? 's' : ''}` : `${tapW} kg × ${tapR}${ex.timed ? 's' : ''}`;
    body.appendChild(el('button', {
      class: 'tap-to-log',
      onclick: e => {
        e.stopPropagation();
        if (!logs[i].w && !ex.bw) logs[i].w = String(tapW);
        if (!logs[i].r) logs[i].r = String(tapR);
        editingSetKey = setKey;
        save(); render();
      }
    }, [
      el('span', { class: 'tap-label' }, 'Tap to edit'),
      el('span', { class: 'tap-value' }, tapVal)
    ]));
  }
  row.appendChild(body);

  const actions = el('div', { class: 'set-actions' });
  if (isEditing) {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = null; render(); },
      title: 'Cancel',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    }));
  } else {
    actions.appendChild(el('button', {
      class: 'icon-btn',
      onclick: e => { e.stopPropagation(); editingSetKey = setKey; render(); },
      title: 'Edit',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18 2l4 4-10 10H8v-4L18 2z"/></svg>'
    }));
    if (s.d) {
      actions.appendChild(el('button', {
        class: 'icon-btn',
        onclick: e => { e.stopPropagation(); logs[i].d = false; save(); render(); },
        title: 'Undo',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M4 9h11a5 5 0 015 5v0a5 5 0 01-5 5H8"/></svg>'
      }));
    }
    // Delete button for user-added extra sets only
    if (i >= ex.sets) {
      actions.appendChild(el('button', {
        class: 'icon-btn delete-set',
        onclick: e => {
          e.stopPropagation();
          logs.splice(i, 1);
          save(); render();
          toast('Set removed');
        },
        title: 'Remove set',
        html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>'
      }));
    }
  }
  row.appendChild(actions);

  return row;
}

function makeStepperRow(label, value, step, onChange) {
  return el('div', { class: 'stepper-row' }, [
    el('span', { class: 'stepper-label' }, label),
    el('button', {
      class: 'stepper-btn',
      onclick: e => {
        e.stopPropagation();
        const cur = parseFloat(value) || 0;
        onChange(String(Math.max(0, +(cur - step).toFixed(2))));
      }
    }, '−'),
    el('div', { class: 'stepper-value' }, String(value)),
    el('button', {
      class: 'stepper-btn',
      onclick: e => {
        e.stopPropagation();
        const cur = parseFloat(value) || 0;
        onChange(String(+(cur + step).toFixed(2)));
      }
    }, '+')
  ]);
}

function makeWeightPickerRow(currentVal, onChange) {
  const list = (state.settings.dumbbellWeights || []).slice().sort((a, b) => a - b);
  const curNum = parseFloat(currentVal) || 0;

  function prevInList(v) {
    let prev = null;
    for (const x of list) { if (x < v - 0.001) prev = x; else break; }
    return prev != null ? prev : Math.max(0, +(v - 1).toFixed(2));
  }
  function nextInList(v) {
    for (const x of list) { if (x > v + 0.001) return x; }
    return +(v + 1).toFixed(2);
  }

  return el('div', { class: 'stepper-row' }, [
    el('span', { class: 'stepper-label' }, 'kg'),
    el('button', {

/* =========== PLAN =========== */
function renderPlan() {
  const v = $('view');
  const t = today();
  const skips = state.plan?.skippedDates?.length || 0;
  const isShifted = skips > 0;

  v.appendChild(el('div', { class: 'card', style: 'padding:14px 16px;' }, [
    el('div', { class: 'card-title', style: 'margin-bottom:6px;' }, 'Next 7 days'),
    el('div', { class: 'small muted' },
      isShifted
        ? `Plan shifted by ${skips} skip${skips > 1 ? 's' : ''}`
        : '4 training days · 3 rest days · ~60 min sessions')
  ]));

  const sessions = upcomingSessions(t, 7);
  sessions.forEach(({ date, dayKey }, i) => {
    const dow = new Date(date + 'T00:00:00').getDay();
    const day = dayKey ? DAYS[dayKey] : null;
    const isToday = i === 0;
    const isSkipped = state.plan?.skippedDates?.includes(date);
    const naturalKey = DAYS[dow] ? dow : null;
    const isShiftedDay = day && dayKey !== naturalKey;

    const card = el('div', { class: 'day-card' + (day ? '' : ' rest') });
    const headerRight = isToday ? el('span', { class: 'chip accent' }, 'Today')
      : isShiftedDay ? el('span', { class: 'chip info' }, 'Shifted')
      : isSkipped ? el('span', { class: 'chip warn' }, 'Skipped')
      : day ? el('span', { class: 'chip' }, `${day.exercises.length} ex`)
      : null;
    const head = el('div', { class: 'header' }, [
      el('div', { html: `<b>${DAY_LABELS[dow]}</b> · ${day ? day.name : (isSkipped ? 'Rest (skipped)' : 'Rest')}` }),
      headerRight
    ]);
    card.appendChild(head);
    if (day) {
      const body = el('div', { class: 'body' });
      day.exercises.forEach(ex => {
        const line = el('div', {
          class: 'ex-line',
          onclick: () => openStrengthChart(ex)
        });
        line.appendChild(el('div', { class: 'name' }, ex.name));
        line.appendChild(el('div', { class: 'spec', html: `${ex.sets}×${ex.timed ? `${ex.repsMin}–${ex.repsMax}s` : `${ex.repsMin}–${ex.repsMax}`} · <b style="color:var(--text)">${ex.bw ? 'BW' : ex.weight + 'kg'}</b>` }));
        body.appendChild(line);
      });
      card.appendChild(body);
    }
    v.appendChild(card);
  });

  if (isShifted) {
    v.appendChild(el('button', {
      class: 'btn secondary',
      style: 'margin-top:14px;',
      onclick: () => {
        if (!confirm('Reset plan? All skips and session overrides will be cleared and the calendar returns to the natural Push-Pull-Legs-Upper cycle.')) return;
        resetPlanOverrides();
        render();
        toast('Plan reset to default');
      }
    }, 'Reset plan to default'));
  }
}

/* =========== PROGRESS =========== */
function renderProgress() {
  const v = $('view');
  const sessionsThis = sessionsThisWeek();
  const total = totalSessions();
  const bw = lastBodyWeight();
  const startBw = state.bodyWeight[0];

  const grid = el('div', { class: 'stat-grid' });
  // Trained this week — total time
  const weekMs = totalTimeThisWeek();
  const wH = Math.floor(weekMs / 3600000);
  const wM = Math.floor((weekMs % 3600000) / 60000);
  grid.appendChild(el('div', { class: 'stat' }, [
    el('div', { class: 'label' }, 'Trained this week'),
    el('div', { class: 'value' }, weekMs ? (wH ? `${wH}h ${wM}m` : `${wM}m`) : '—'),
    el('div', { class: 'sub' }, `${sessionsThis} session${sessionsThis === 1 ? '' : 's'}`)
  ]));
  grid.appendChild(el('div', { class: 'stat' }, [
    el('div', { class: 'label' }, 'Total sessions'),
    el('div', { class: 'value' }, String(total)),
    el('div', { class: 'sub' }, `Week ${currentWeek()} of program`)
  ]));
  grid.appendChild(el('div', { class: 'stat' }, [
    el('div', { class: 'label' }, 'Current weight'),
    el('div', { class: 'value' }, bw ? `${bw.weight} kg` : '—'),
    el('div', { class: 'sub' }, bw && startBw ? `${(bw.weight - startBw.weight >= 0 ? '+' : '')}${(bw.weight - startBw.weight).toFixed(1)} kg from start` : '—')
  ]));
  grid.appendChild(el('div', { class: 'stat' }, [
    el('div', { class: 'label' }, 'Phase'),
    el('div', { class: 'value' }, String(currentPhase().num)),
    el('div', { class: 'sub' }, currentPhase().name)
  ]));
  v.appendChild(grid);

  // Monthly progress
  const monthCard = el('div', { class: 'card' });
  monthCard.appendChild(el('div', { class: 'card-title' }, 'Sessions per month'));
  monthCard.appendChild(buildMonthlyChart());
  v.appendChild(monthCard);

  // Weekly volume per muscle (sorted descending, helpful overview)
  const volCard = el('div', { class: 'card' });
  const vol = getWeeklyVolume();
  const totalSets = Object.values(vol).reduce((a, x) => a + x, 0);
  volCard.appendChild(el('div', { class: 'row between', style: 'margin-bottom:10px;' }, [
    el('div', { class: 'card-title', style: 'margin:0;' }, 'This week — sets per muscle'),
    el('span', { class: 'chip accent' }, `${totalSets} sets`)
  ]));
  if (totalSets === 0) {
    volCard.appendChild(el('div', { class: 'empty' }, 'No sets logged this week yet.'));
  } else {
    const entries = MUSCLES.map(m => [m, vol[m] || 0]).sort((a, b) => b[1] - a[1]);
    const max = Math.max(1, ...entries.map(e => e[1]));
    entries.forEach(([m, val]) => {
      if (val === 0) return; // hide muscles with no sets this week
      const row = el('div', { class: 'bar-row' });
      row.appendChild(el('div', { class: 'lbl' }, m));
      row.appendChild(el('div', { class: 'bar' }, [el('span', { style: `width:${(val / max * 100)}%` })]));
      row.appendChild(el('div', { class: 'v' }, String(val)));
      volCard.appendChild(row);
    });
  }
  v.appendChild(volCard);

  // Phase track
  const phaseCard = el('div', { class: 'card' });
  phaseCard.appendChild(el('div', { class: 'card-title' }, 'Program roadmap'));
  const track = el('div', { class: 'phase-track' });
  const nowPh = currentPhase().num;
  PHASES.forEach(p => {
    const cls = p.num < nowPh ? 'done' : p.num === nowPh ? 'current' : '';
    track.appendChild(el('div', { class: 'phase-step ' + cls }, [
      el('div', { class: 'dot' }),
      el('div', { class: 'info' }, [
        el('b', {}, `Phase ${p.num} — ${p.name}`),
        el('div', { class: 'when' }, `${p.start} → ${p.end}`),
        el('div', { class: 'desc' }, p.desc)
      ])
    ]));
  });
  phaseCard.appendChild(track);
  v.appendChild(phaseCard);

  // Body weight chart
  const bwCard = el('div', { class: 'card' });
  bwCard.appendChild(el('div', { class: 'row between', style: 'margin-bottom:6px;gap:6px;' }, [
    el('div', { class: 'card-title', style: 'margin:0;' }, 'Body weight'),
    el('div', { class: 'row', style: 'gap:6px;' }, [
      el('button', { class: 'btn small secondary', onclick: openWeightHistoryModal }, 'Manage'),
      el('button', { class: 'btn small', onclick: openWeightModal }, '+ Log')
    ])
  ]));
  if (state.bodyWeight.length >= 1) {
    bwCard.appendChild(buildLineChart(state.bodyWeight.map(b => ({ date: b.date, value: b.weight })), 'kg'));
    const last = state.bodyWeight[state.bodyWeight.length - 1];
    bwCard.appendChild(el('div', { class: 'small muted' }, `Last log: ${last.weight} kg on ${last.date}`));
  } else {
    bwCard.appendChild(el('div', { class: 'empty' }, 'No body weight logged yet.'));
  }
  v.appendChild(bwCard);

  // Recent sessions
  const recentCard = el('div', { class: 'card' });
  recentCard.appendChild(el('div', { class: 'card-title' }, 'Recent sessions'));
  const finished = Object.entries(state.workouts)
    .filter(([_, w]) => w.finished)
    .sort((a, b) => b[0].localeCompare(a[0])).slice(0, 8);
  if (!finished.length) {
    recentCard.appendChild(el('div', { class: 'empty' }, 'Finish a workout to see it here.'));
  } else {
    finished.forEach(([date, w]) => {
      const day = DAYS[w.dayKey];

function buildMonthlyChart() {
  const months = getMonthlyStats();
  const now = new Date();
  const cols = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const k = d.toISOString().slice(0, 7);
    cols.push({ key: k, label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()], data: months[k] });
  }
  const totalAcross = cols.reduce((a, c) => a + (c.data?.sessions || 0), 0);
  if (totalAcross === 0) {
    const empty = el('div', { class: 'empty' }, 'Finish a workout to see monthly stats.');
    return empty;
  }
  const max = Math.max(1, ...cols.map(c => c.data?.sessions || 0));
  const grid = el('div', { class: 'month-grid' });
  cols.forEach((c, i) => {
    const sessions = c.data?.sessions || 0;
    const isCurrent = i === cols.length - 1;
    const col = el('div', { class: 'col' + (isCurrent ? ' current' : '') });
    col.appendChild(el('div', { class: 'v' }, String(sessions)));
    col.appendChild(el('div', { class: 'bar' }, [el('span', { style: `height:${sessions / max * 100}%` })]));
    col.appendChild(el('div', { class: 'lbl' }, c.label));
    grid.appendChild(col);
  });
  return grid;
}

function buildLineChart(data, unit) {
  const wrap = el('div', { class: 'chart' });
  const W = 320, H = 140;
  let points = data.slice(-30);
  if (!points.length) {
    wrap.appendChild(el('div', { class: 'empty' }, 'No data'));
    return wrap;
  }
  if (points.length === 1) points.unshift({ ...points[0] });
  const min = Math.min(...points.map(p => p.value)) - 0.5;
  const max = Math.max(...points.map(p => p.value)) + 0.5;
  const range = Math.max(0.5, max - min);
  const pad = 12;
  const xs = points.map((p, i) => pad + (i / (points.length - 1)) * (W - pad * 2));
  const ys = points.map(p => H - pad - ((p.value - min) / range) * (H - pad * 2));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = `${path} L${xs[xs.length - 1].toFixed(1)},${H - pad} L${xs[0].toFixed(1)},${H - pad} Z`;
  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path class="area" d="${area}"/>
      <path class="line" d="${path}"/>
      ${xs.map((x, i) => `<circle class="dot" cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3"/>`).join('')}
      <text x="${pad}" y="${H - 2}" class="axis-text">${escapeHtml(points[0].date)}</text>
      <text x="${W - pad - 50}" y="${H - 2}" class="axis-text">${escapeHtml(points[points.length - 1].date)}</text>
    </svg>`;
  return wrap;
}

  m.appendChild(el('div', { class: 'small muted', style: 'margin-bottom:12px;' },
    `${todayName} moves to tomorrow. The rest of the week stays the same.`));

  // Logs warning
